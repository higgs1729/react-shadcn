<!DOCTYPE html>
<!-- MicroENV紹介ページ: Fake REST API候補のリクエスト例を表示する。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>MicroENV Fake REST</title><style>body{margin:0;min-height:100vh;font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;background:linear-gradient(135deg,#f6f7fb,#eef8f4);color:#202536}main{width:min(900px,100%);margin:auto;padding:34px 18px}.panel{background:#fff;border:1px solid #dde5ef;border-radius:15px;padding:18px}button{border:0;border-radius:10px;padding:12px 16px;background:#1f8a70;color:#fff;font:inherit;font-weight:700}pre{padding:14px;border-radius:12px;background:#172033;color:#dbe8ff;white-space:pre-wrap}p{color:#667086;line-height:1.7}a{color:#1f8a70}</style></head><body><main><h1>MicroENV Fake REST</h1><p>開発用のFake REST API候補です。公開仕様が変動するため、プロトタイプ用のリクエスト例を表示します。</p><section class="panel"><button id="show">リクエスト例</button><pre id="out"></pre><p>Docs: <a href="https://microenv.com/" target="_blank" rel="noreferrer">microenv.com</a></p></section></main><script>document.getElementById("show").onclick=()=>{document.getElementById("out").textContent=JSON.stringify({method:"GET",endpoint:"https://microenv.com/api/...",purpose:"Fake REST API for prototyping",fallback:true},null,2)};</script></body></html>
