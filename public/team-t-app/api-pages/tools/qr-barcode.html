<!DOCTYPE html>
<!-- QR & Barcode紹介ページ: QR/バーコード画像生成API候補。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>QR & Barcode Generator</title><style>body{font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;margin:0;min-height:100vh;background:#f6f7fb;color:#202536}main{width:min(900px,100%);margin:auto;padding:34px 18px}.grid{display:grid;grid-template-columns:320px 1fr;gap:16px}.panel{background:#fff;border:1px solid #dde5ef;border-radius:15px;padding:18px}input,select,button{width:100%;font:inherit;border-radius:10px;padding:11px 12px;margin-top:10px}input,select{border:1px solid #dde5ef}button{border:0;background:#2f6ef0;color:#fff;font-weight:700}.preview{display:flex;align-items:center;justify-content:center;min-height:320px;background:#eaf1ff;border-radius:14px}img{max-width:100%}p{color:#667086;line-height:1.7}a{color:#2f6ef0}@media(max-width:760px){.grid{grid-template-columns:1fr}}</style></head><body><main><h1>QR & Barcode Generator</h1><p>QRコードやバーコードをPNG/SVGで生成するAPI候補です。</p><section class="grid"><section class="panel"><input id="text" value="https://example.com"><select id="type"><option value="qr">QR</option><option value="code128">Code128</option></select><button id="make">生成</button><p>Docs: <a href="https://solsigs.com/qrapi/" target="_blank" rel="noreferrer">solsigs qrapi</a></p></section><section class="panel"><div class="preview"><img id="img" alt="generated"></div></section></section></main><script>document.getElementById("make").onclick=()=>{const t=encodeURIComponent(document.getElementById("text").value);document.getElementById("img").src=`https://api.qrserver.com/v1/create-qr-code/?size=260x260&data=${t}`};document.getElementById("make").click();</script></body></html>
