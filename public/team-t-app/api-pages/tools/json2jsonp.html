<!DOCTYPE html>
<!-- JSON 2 JSONP紹介ページ: JSON URLをJSONP URLに変換するAPI候補。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>JSON 2 JSONP Builder</title><style>
body{margin:0;min-height:100vh;font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;background:linear-gradient(135deg,#f6f7fb,#eef7ff);color:#202536}main{width:min(900px,100%);margin:auto;padding:34px 18px}h1{font-size:clamp(24px,4vw,38px);letter-spacing:0}input,button{width:100%;font:inherit;border-radius:10px;padding:11px 12px;margin-top:10px}input{border:1px solid #dde5ef}button{border:0;background:#2f6ef0;color:#fff;font-weight:700}.panel{background:#fff;border:1px solid #dde5ef;border-radius:15px;padding:18px}.box{margin-top:14px;padding:14px;border-radius:12px;background:#172033;color:#dbe8ff;word-break:break-all}p{color:#667086;line-height:1.7}a{color:#2f6ef0}</style></head><body><main><h1>JSON 2 JSONP Builder</h1><p>JSON API URLをJSONP形式で呼ぶためのURL生成候補です。古いブラウザ連携やCORS回避の学習に使えます。</p><section class="panel"><input id="url" value="https://httpbin.org/json"><input id="cb" value="callback"><button id="build">変換URLを作る</button><div class="box" id="out"></div><p>Docs: <a href="https://json2jsonp.com/" target="_blank" rel="noreferrer">json2jsonp.com</a></p></section></main><script>
document.getElementById("build").onclick=()=>{const u=encodeURIComponent(document.getElementById("url").value),cb=encodeURIComponent(document.getElementById("cb").value||"callback");document.getElementById("out").textContent=`https://json2jsonp.com/?url=${u}&callback=${cb}`};
</script></body></html>
