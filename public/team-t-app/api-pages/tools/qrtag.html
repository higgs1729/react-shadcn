<!DOCTYPE html>
<!-- QRTag紹介ページ: QRコードと短縮URL系API候補。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>QRTag QR Maker</title><style>body{font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;margin:0;min-height:100vh;background:#f6f7fb;color:#202536;text-align:center}main{width:min(820px,100%);margin:auto;padding:34px 18px}input,button{font:inherit;border-radius:10px;padding:11px 12px;margin:8px;width:min(520px,100%)}input{border:1px solid #dde5ef}button{border:0;background:#1f8a70;color:#fff;font-weight:700}img{margin-top:18px;max-width:280px;background:#fff;padding:12px;border-radius:16px}p{color:#667086;line-height:1.7}a{color:#1f8a70}</style></head><body><main><h1>QRTag QR Maker</h1><p>QRTagのQR生成API候補です。ここではQR画像URLを組み立てます。</p><input id="text" value="teamT WebAPI Gallery"><button id="make">QR生成</button><br><img id="img" alt="qr"><p>Docs: <a href="https://www.qrtag.net/api/" target="_blank" rel="noreferrer">qrtag api</a></p></main><script>document.getElementById("make").onclick=()=>{document.getElementById("img").src=`https://www.qrtag.net/api/qr_6.png?url=${encodeURIComponent(document.getElementById("text").value)}`};document.getElementById("make").click();</script></body></html>
