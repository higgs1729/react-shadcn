<!DOCTYPE html>
<!-- Keyvalue紹介ページ: シンプルなkey-value REST API候補。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Keyvalue Store Demo</title><style>
body{margin:0;min-height:100vh;font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;background:linear-gradient(135deg,#f6f7fb,#eef8f4);color:#202536}main{width:min(900px,100%);margin:auto;padding:34px 18px}.panel{background:#fff;border:1px solid #dde5ef;border-radius:15px;padding:18px}h1{font-size:clamp(24px,4vw,38px);letter-spacing:0}input,textarea,button{width:100%;font:inherit;border-radius:10px;padding:11px 12px;margin-top:10px}input,textarea{border:1px solid #dde5ef}button{border:0;background:#1f8a70;color:#fff;font-weight:700}pre{padding:14px;border-radius:12px;background:#172033;color:#dbe8ff;white-space:pre-wrap}p{color:#667086;line-height:1.7}a{color:#1f8a70}</style></head><body><main><h1>Keyvalue Store Demo</h1><p>簡易key-valueストレージAPI候補です。取得できない場合はlocalStorageに保存します。</p><section class="panel"><input id="key" value="teamt-demo"><textarea id="value">hello keyvalue</textarea><button id="save">保存</button><button id="load">読込</button><pre id="out">未実行です。</pre><p>Docs: <a href="https://keyvalue.immanuel.co/" target="_blank" rel="noreferrer">keyvalue.immanuel.co</a></p></section></main><script>
const out=document.getElementById("out");document.getElementById("save").onclick=async()=>{const k=document.getElementById("key").value,v=document.getElementById("value").value;try{const r=await fetch(`https://keyvalue.immanuel.co/api/KeyVal/UpdateValue/${encodeURIComponent(k)}/${encodeURIComponent(v)}`);if(!r.ok)throw new Error(`HTTP ${r.status}`);out.textContent=await r.text()}catch(e){localStorage.setItem(`keyvalue-${k}`,v);out.textContent=JSON.stringify({fallback:true,saved:k,message:e.message},null,2)}};document.getElementById("load").onclick=()=>{const k=document.getElementById("key").value;out.textContent=localStorage.getItem(`keyvalue-${k}`)||"localStorageに値がありません"};
</script></body></html>
