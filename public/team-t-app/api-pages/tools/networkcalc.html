<!DOCTYPE html>
<!-- NetworkCalc紹介ページ: subnet/DNS等のネットワーク計算API候補。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>NetworkCalc Subnet Helper</title><style>body{margin:0;min-height:100vh;font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;background:linear-gradient(135deg,#f6f7fb,#eef8f4);color:#202536}main{width:min(900px,100%);margin:auto;padding:34px 18px}.panel{background:#fff;border:1px solid #dde5ef;border-radius:15px;padding:18px}input,button{width:100%;font:inherit;border-radius:10px;padding:11px 12px;margin-top:10px}input{border:1px solid #dde5ef}button{border:0;background:#1f8a70;color:#fff;font-weight:700}pre{padding:14px;border-radius:12px;background:#172033;color:#dbe8ff;white-space:pre-wrap}p{color:#667086;line-height:1.7}a{color:#1f8a70}</style></head><body><main><h1>NetworkCalc Subnet Helper</h1><p>サブネット、DNS、バイナリ変換などを扱うAPI候補です。ここではCIDR計算のリクエスト例を表示します。</p><section class="panel"><input id="cidr" value="192.168.1.0/24"><button id="show">計算例を表示</button><pre id="out"></pre><p>Docs: <a href="https://networkcalc.com/api/docs" target="_blank" rel="noreferrer">NetworkCalc API docs</a></p></section></main><script>document.getElementById("show").onclick=()=>{const cidr=document.getElementById("cidr").value;document.getElementById("out").textContent=JSON.stringify({endpoint:"https://networkcalc.com/api/...",cidr,note:"公式docsでcalculator endpointを確認して利用"},null,2)};</script></body></html>
