<!DOCTYPE html>
<!-- QuickChart紹介ページ: Chart.js設定から画像URLを生成する。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>QuickChart Image Generator</title><style>body{font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;margin:0;min-height:100vh;background:#f6f7fb;color:#202536}main{width:min(980px,100%);margin:auto;padding:34px 18px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}.panel{background:#fff;border:1px solid #dde5ef;border-radius:15px;padding:18px}textarea,button{width:100%;font:inherit;border-radius:10px;padding:11px 12px;margin-top:10px}textarea{min-height:280px;border:1px solid #dde5ef;font-family:Consolas,monospace}button{border:0;background:#2f6ef0;color:#fff;font-weight:700}img{max-width:100%}p{color:#667086;line-height:1.7}a{color:#2f6ef0}@media(max-width:760px){.grid{grid-template-columns:1fr}}</style></head><body><main><h1>QuickChart Image Generator</h1><p>Chart.js設定をURLに渡してグラフ画像を生成します。</p><section class="grid"><section class="panel"><textarea id="cfg">{"type":"bar","data":{"labels":["A","B","C"],"datasets":[{"label":"API","data":[12,19,8]}]}}</textarea><button id="make">生成</button><p>Docs: <a href="https://quickchart.io/" target="_blank" rel="noreferrer">quickchart.io</a></p></section><section class="panel"><img id="img" alt="chart"></section></section></main><script>document.getElementById("make").onclick=()=>{document.getElementById("img").src=`https://quickchart.io/chart?c=${encodeURIComponent(document.getElementById("cfg").value)}`};document.getElementById("make").click();</script></body></html>
