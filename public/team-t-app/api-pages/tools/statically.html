<!DOCTYPE html>
<!-- Statically紹介ページ: CDN変換URLを作る。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Statically CDN URL Builder</title><style>body{font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;margin:0;min-height:100vh;background:#f6f7fb;color:#202536}main{width:min(900px,100%);margin:auto;padding:34px 18px}.panel{background:#fff;border:1px solid #dde5ef;border-radius:15px;padding:18px}input,button{width:100%;font:inherit;border-radius:10px;padding:11px 12px;margin-top:10px}input{border:1px solid #dde5ef}button{border:0;background:#1f8a70;color:#fff;font-weight:700}.url{margin-top:14px;padding:14px;border-radius:12px;background:#172033;color:#dbe8ff;word-break:break-all}p{color:#667086;line-height:1.7}a{color:#1f8a70}</style></head><body><main><h1>Statically CDN URL Builder</h1><p>GitHubや画像URLをCDN配信用URLへ変換するサービス候補です。</p><section class="panel"><input id="url" value="https://raw.githubusercontent.com/jquery/jquery/main/README.md"><button id="build">URL生成</button><div class="url" id="out"></div><p>Docs: <a href="https://statically.io/" target="_blank" rel="noreferrer">statically.io</a></p></section></main><script>document.getElementById("build").onclick=()=>{const u=document.getElementById("url").value;document.getElementById("out").textContent=`https://cdn.statically.io/gh/${u.replace(/^https:\/\/raw\.githubusercontent\.com\//,"").replace(/\/main\//,"/main/")}`};</script></body></html>
