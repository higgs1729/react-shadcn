<!DOCTYPE html>
<!-- Wandbox紹介ページ: オンラインコンパイラAPI候補。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Wandbox Compile Request</title><style>body{font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;margin:0;min-height:100vh;background:#f6f7fb;color:#202536}main{width:min(900px,100%);margin:auto;padding:34px 18px}.panel{background:#fff;border:1px solid #dde5ef;border-radius:15px;padding:18px}textarea,button{width:100%;font:inherit;border-radius:10px;padding:11px 12px;margin-top:10px}textarea{min-height:220px;border:1px solid #dde5ef;font-family:Consolas,monospace}button{border:0;background:#2f6ef0;color:#fff;font-weight:700}pre{padding:14px;border-radius:12px;background:#172033;color:#dbe8ff;white-space:pre-wrap}p{color:#667086;line-height:1.7}a{color:#2f6ef0}</style></head><body><main><h1>Wandbox Compile Request</h1><p>35以上の言語に対応するオンラインコンパイラAPI候補です。ここではリクエスト形状を表示します。</p><section class="panel"><textarea id="code">print("hello")</textarea><button id="show">リクエスト例</button><pre id="out"></pre><p>Docs: <a href="https://github.com/melpon/wandbox/blob/master/kennel2/API.rst" target="_blank" rel="noreferrer">Wandbox API</a></p></section></main><script>document.getElementById("show").onclick=()=>{document.getElementById("out").textContent=JSON.stringify({endpoint:"https://wandbox.org/api/compile.json",method:"POST",body:{compiler:"cpython-3.10.0",code:document.getElementById("code").value}},null,2)};</script></body></html>
