<!DOCTYPE html>
<!-- Image-Charts紹介ページ: URLパラメータでチャート画像を生成するAPIを試す。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Image-Charts Generator</title><style>
:root{--ink:#202536;--muted:#667086;--line:#dde5ef;--accent:#2f6ef0;--soft:#eaf1ff}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;background:linear-gradient(135deg,#f6f7fb,#eef7ff);color:var(--ink)}main{width:min(980px,100%);margin:auto;padding:32px 18px}h1{margin:0 0 8px;font-size:clamp(24px,4vw,38px);letter-spacing:0}p{margin:0;color:var(--muted);line-height:1.7}a{color:var(--accent)}.grid{display:grid;grid-template-columns:320px 1fr;gap:16px;margin-top:18px}.panel{background:#fff;border:1px solid var(--line);border-radius:15px;padding:18px}label{display:block;margin:12px 0 7px;font-weight:700;font-size:13px}input,button{width:100%;font:inherit;border-radius:10px;padding:11px 12px}input{border:1px solid var(--line)}button{margin-top:14px;border:0;background:var(--accent);color:#fff;font-weight:700}.preview{display:flex;align-items:center;justify-content:center;min-height:340px;background:var(--soft);border-radius:14px}.preview img{max-width:100%;height:auto}@media(max-width:760px){.grid{grid-template-columns:1fr}}</style></head><body><main><h1>Image-Charts Generator</h1><p>URLパラメータだけでチャート画像を生成できるAPIです。静的HTMLから画像として表示しやすいタイプです。</p><section class="grid"><section class="panel"><label>タイトル</label><input id="title" value="API demo"><label>データ</label><input id="data" value="10,25,40,30"><button id="make">チャート生成</button><p style="margin-top:14px;font-size:12px">Docs: <a href="https://documentation.image-charts.com/" target="_blank" rel="noreferrer">Image-Charts docs</a></p></section><section class="panel"><div class="preview"><img id="chart" alt="生成チャート"></div></section></section></main><script>
function build(){const title=encodeURIComponent(document.getElementById("title").value),data=encodeURIComponent(document.getElementById("data").value);return `https://image-charts.com/chart?cht=bvg&chs=600x360&chd=t:${data}&chl=A|B|C|D&chtt=${title}`;}document.getElementById("make").addEventListener("click",()=>{document.getElementById("chart").src=build();});document.getElementById("chart").src=build();
</script></body></html>
