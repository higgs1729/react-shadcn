<!DOCTYPE html>
<!-- QRCode Monkey紹介ページ: ロゴ付きQR作成API候補のリクエスト例。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>QRCode Monkey Request</title><style>body{font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;margin:0;min-height:100vh;background:#f6f7fb;color:#202536}main{width:min(900px,100%);margin:auto;padding:34px 18px}.panel{background:#fff;border:1px solid #dde5ef;border-radius:15px;padding:18px}input,button{width:100%;font:inherit;border-radius:10px;padding:11px 12px;margin-top:10px}input{border:1px solid #dde5ef}button{border:0;background:#2f6ef0;color:#fff;font-weight:700}pre{padding:14px;border-radius:12px;background:#172033;color:#dbe8ff;white-space:pre-wrap}p{color:#667086;line-height:1.7}a{color:#2f6ef0}</style></head><body><main><h1>QRCode Monkey Request</h1><p>カスタムQRコード生成API候補です。ロゴや色を含むPOSTリクエスト例を確認します。</p><section class="panel"><input id="data" value="https://example.com"><button id="show">リクエスト例</button><pre id="out"></pre><p>Docs: <a href="https://www.qrcode-monkey.com/qr-code-api-with-logo/" target="_blank" rel="noreferrer">QRCode Monkey API</a></p></section></main><script>document.getElementById("show").onclick=()=>{document.getElementById("out").textContent=JSON.stringify({endpoint:"https://api.qrcode-monkey.com/qr/custom",method:"POST",body:{data:document.getElementById("data").value,config:{body:"square",eye:"frame0"},size:300,download:false}},null,2)};</script></body></html>
