<!DOCTYPE html>
<!--
  Postman Echo API紹介ページ
  目的: GETパラメータをエコーするテストAPIを使い、HTTPリクエストの基本構造を確認する。
  構成: 概要 / パラメータ入力 / fetch結果 / エラー時のフォールバック表示。
-->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Postman Echo リクエスト検証</title>
  <style>
    :root { --bg:#f5f7fb; --panel:#fff; --ink:#202534; --muted:#647086; --line:#dfe5ef; --accent:#2f6ef0; --soft:#eaf1ff; --danger:#d64545; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:"BIZ UDPGothic","Meiryo UI",sans-serif; background:linear-gradient(135deg,#f5f7fb,#eef6f4); color:var(--ink); }
    main { width:min(980px,100%); margin:0 auto; padding:32px 18px; }
    header { display:flex; justify-content:space-between; gap:18px; align-items:flex-start; margin-bottom:20px; }
    h1 { margin:0 0 8px; font-size:clamp(24px,4vw,38px); letter-spacing:0; }
    p { color:var(--muted); line-height:1.75; margin:0; }
    a { color:var(--accent); }
    .badge { display:inline-flex; align-items:center; gap:8px; padding:8px 12px; border-radius:999px; background:var(--soft); color:var(--accent); font-weight:700; white-space:nowrap; }
    .grid { display:grid; grid-template-columns:360px 1fr; gap:16px; }
    .panel { background:rgba(255,255,255,.92); border:1px solid var(--line); border-radius:14px; box-shadow:0 16px 36px rgba(39,53,82,.08); padding:18px; }
    label { display:block; font-size:13px; font-weight:700; margin:14px 0 7px; }
    input { width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:10px; font:inherit; color:var(--ink); background:#fff; }
    button { width:100%; margin-top:16px; border:0; border-radius:10px; padding:12px 14px; background:var(--accent); color:#fff; font:inherit; font-weight:700; cursor:pointer; }
    button:hover { filter:brightness(.95); }
    .url { margin-top:12px; padding:11px; border-radius:10px; background:#f7f9fc; color:var(--muted); word-break:break-all; font-size:12px; }
    .status { min-height:24px; margin-bottom:12px; color:var(--muted); font-weight:700; }
    .status.error { color:var(--danger); }
    pre { min-height:360px; overflow:auto; margin:0; padding:14px; border-radius:12px; background:#172033; color:#dbe8ff; line-height:1.55; font-size:13px; white-space:pre-wrap; }
    @media (max-width:760px){ header,.grid{grid-template-columns:1fr; display:grid;} .badge{width:max-content;} }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Postman Echo リクエスト検証</h1>
        <p>Postman Echo は送信したクエリやヘッダーをそのまま返すテスト用APIです。GETパラメータを変えて、レスポンスJSONの形を確認できます。</p>
      </div>
      <span class="badge">No Auth / Test API</span>
    </header>

    <section class="grid">
      <form class="panel" id="echo-form">
        <p>2つのクエリパラメータを送信します。API連携の練習や、fetch結果の観察に向いています。</p>
        <label for="key1">パラメータ名 1</label>
        <input id="key1" value="tool" autocomplete="off">
        <label for="value1">値 1</label>
        <input id="value1" value="webapi-gallery" autocomplete="off">
        <label for="key2">パラメータ名 2</label>
        <input id="key2" value="mode" autocomplete="off">
        <label for="value2">値 2</label>
        <input id="value2" value="echo" autocomplete="off">
        <button type="submit">Echo APIへ送信</button>
        <div class="url" id="request-url"></div>
        <p style="margin-top:12px;font-size:12px;">Docs: <a href="https://www.postman-echo.com" target="_blank" rel="noreferrer">https://www.postman-echo.com</a></p>
      </form>

      <section class="panel">
        <div class="status" id="status">未送信です。</div>
        <pre id="output">フォームを送信すると、Postman Echo のJSONレスポンスを表示します。</pre>
      </section>
    </section>
  </main>

  <script>
    const form = document.getElementById("echo-form");
    const statusEl = document.getElementById("status");
    const output = document.getElementById("output");
    const requestUrl = document.getElementById("request-url");

    function buildUrl() {
      const params = new URLSearchParams();
      params.set(document.getElementById("key1").value || "key1", document.getElementById("value1").value || "");
      params.set(document.getElementById("key2").value || "key2", document.getElementById("value2").value || "");
      return `https://postman-echo.com/get?${params.toString()}`;
    }

    async function runEcho(event) {
      event.preventDefault();
      const url = buildUrl();
      requestUrl.textContent = url;
      statusEl.className = "status";
      statusEl.textContent = "送信中...";
      output.textContent = "";
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        statusEl.textContent = "成功: 送信内容がそのまま返ってきました。";
        output.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        statusEl.className = "status error";
        statusEl.textContent = "取得に失敗しました。CORSまたはネットワーク状態を確認してください。";
        output.textContent = JSON.stringify({ fallback: true, tried: url, message: error.message }, null, 2);
      }
    }

    form.addEventListener("submit", runEcho);
    requestUrl.textContent = buildUrl();
  </script>
</body>
</html>
