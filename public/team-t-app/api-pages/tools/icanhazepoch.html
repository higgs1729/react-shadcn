<!DOCTYPE html>
<!-- Icanhazepoch紹介ページ: 現在のUnix epoch時刻を取得する軽量API。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Icanhazepoch Clock</title><style>
:root{--ink:#202536;--muted:#667086;--line:#dde5ef;--accent:#2f6ef0;--soft:#eaf1ff;--danger:#c43d3d}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;background:linear-gradient(135deg,#f6f7fb,#eef7ff);color:var(--ink)}main{width:min(820px,100%);margin:auto;padding:34px 18px;text-align:center}h1{margin:0 0 8px;font-size:clamp(24px,4vw,38px);letter-spacing:0}p{margin:0;color:var(--muted);line-height:1.7}a{color:var(--accent)}button{margin:18px 0;border:0;border-radius:10px;padding:12px 16px;background:var(--accent);color:#fff;font:inherit;font-weight:700}.num{padding:24px;border-radius:16px;background:var(--soft);font-size:clamp(36px,10vw,76px);font-weight:800;color:var(--accent);word-break:break-all}.status{font-weight:700;color:var(--muted);margin-bottom:12px}.status.error{color:var(--danger)}</style></head><body><main><h1>Icanhazepoch Clock</h1><p>Unix epoch秒を返すシンプルな時刻APIです。</p><button id="load">現在epochを取得</button><p class="status" id="status">未取得です。</p><div class="num" id="num">-</div><p style="margin-top:14px;font-size:12px">Docs: <a href="https://icanhazepoch.com" target="_blank" rel="noreferrer">https://icanhazepoch.com</a></p></main><script>
document.getElementById("load").addEventListener("click",async()=>{const s=document.getElementById("status"),n=document.getElementById("num");try{s.className="status";s.textContent="取得中...";const r=await fetch("https://icanhazepoch.com");if(!r.ok)throw new Error(`HTTP ${r.status}`);n.textContent=(await r.text()).trim();s.textContent="APIから取得しました。";}catch(e){s.className="status error";s.textContent="API取得不可のためローカル時刻を表示します。";n.textContent=Math.floor(Date.now()/1000);}});
</script></body></html>
