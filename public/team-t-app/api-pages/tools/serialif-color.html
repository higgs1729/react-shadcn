<!DOCTYPE html>
<!-- Serialif Color紹介ページ: 色変換・補色・グレースケールAPI候補。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Serialif Color Tool</title><style>body{font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;margin:0;min-height:100vh;background:#f6f7fb;color:#202536}main{width:min(900px,100%);margin:auto;padding:34px 18px}.panel{background:#fff;border:1px solid #dde5ef;border-radius:15px;padding:18px}input,button{width:100%;font:inherit;border-radius:10px;padding:11px 12px;margin-top:10px}button{border:0;background:#2f6ef0;color:#fff;font-weight:700}.swatch{height:160px;border-radius:14px;margin-top:16px;border:1px solid #dde5ef}pre{padding:14px;border-radius:12px;background:#172033;color:#dbe8ff;white-space:pre-wrap}p{color:#667086;line-height:1.7}a{color:#2f6ef0}</style></head><body><main><h1>Serialif Color Tool</h1><p>色変換・補色・コントラスト判定API候補です。</p><section class="panel"><input id="color" value="#2f6ef0"><button id="run">色を解析</button><div class="swatch" id="swatch"></div><pre id="out"></pre><p>Docs: <a href="https://color.serialif.com/" target="_blank" rel="noreferrer">color.serialif.com</a></p></section></main><script>document.getElementById("run").onclick=()=>{const c=document.getElementById("color").value;document.getElementById("swatch").style.background=c;document.getElementById("out").textContent=JSON.stringify({input:c,complement:"API取得不可時はCSSで表示",docs:"https://color.serialif.com/"},null,2)};document.getElementById("run").click();</script></body></html>
