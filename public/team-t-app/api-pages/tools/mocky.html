<!DOCTYPE html>
<!-- Mocky紹介ページ: ユーザー定義レスポンスのモックAPI作成サービス。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Mocky Response Builder</title><style>body{margin:0;min-height:100vh;font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;background:linear-gradient(135deg,#f6f7fb,#eef7ff);color:#202536}main{width:min(900px,100%);margin:auto;padding:34px 18px}.panel{background:#fff;border:1px solid #dde5ef;border-radius:15px;padding:18px}textarea,button{width:100%;font:inherit;border-radius:10px;padding:11px 12px;margin-top:10px}textarea{min-height:210px;border:1px solid #dde5ef;font-family:Consolas,monospace}button{border:0;background:#2f6ef0;color:#fff;font-weight:700}pre{padding:14px;border-radius:12px;background:#172033;color:#dbe8ff;white-space:pre-wrap}p{color:#667086;line-height:1.7}a{color:#2f6ef0}</style></head><body><main><h1>Mocky Response Builder</h1><p>任意JSONを返すモックURLを作成できるサービスです。ここではレスポンス内容と作成手順を確認します。</p><section class="panel"><textarea id="json">{"message":"hello mock api","ok":true}</textarea><button id="show">Mock作成リクエスト例</button><pre id="out"></pre><p>Docs: <a href="https://designer.mocky.io/" target="_blank" rel="noreferrer">Mocky designer</a></p></section></main><script>document.getElementById("show").onclick=()=>{document.getElementById("out").textContent=JSON.stringify({service:"Mocky",body:JSON.parse(document.getElementById("json").value),note:"designer.mocky.ioでモックURLを作成"},null,2)};</script></body></html>
