<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>RandomDog Viewer</title><style>
/* RandomDog Viewer: RandomDog を紹介し、ライブ取得とフォールバック表示を行う単体HTMLテンプレート。 */
:root{--bg:#eef5f3;--ink:#1f2933;--muted:#64706d;--panel:#fff;--line:#cfd9d5;--accent:#2d8c78;--soft:#dcebe7;--shadow:0 16px 36px rgba(26,42,48,.16)}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"Segoe UI",system-ui,sans-serif;color:var(--ink);background:linear-gradient(135deg,#eef5f3,#f7efe0)}main{width:min(980px,calc(100% - 28px));margin:0 auto;padding:28px 0 34px}.hero{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:16px;align-items:end;margin-bottom:14px}h1{margin:0;font-size:clamp(2rem,5vw,4.4rem);line-height:1;letter-spacing:0}.lead{margin:10px 0 0;color:var(--muted);max-width:620px}.docs{color:var(--ink);text-decoration:none;border:1px solid var(--line);background:var(--panel);border-radius:8px;padding:10px 12px;white-space:nowrap}.board{display:grid;grid-template-columns:.8fr 1.2fr;gap:12px}.side,.viewer{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);overflow:hidden}.side{padding:18px}.api{display:grid;gap:10px;margin-top:16px}.api span{font-size:.78rem;color:var(--muted);font-weight:700;text-transform:uppercase}.endpoint{background:var(--soft);border:1px solid var(--line);border-radius:7px;padding:10px;word-break:break-all;font-family:Consolas,monospace;font-size:.86rem}.actions{display:flex;gap:10px;align-items:end;flex-wrap:wrap;margin-top:16px}.mini{display:grid;gap:5px;color:var(--muted);font-size:.82rem}.mini input{width:116px;border:1px solid var(--line);border-radius:7px;padding:10px;font:inherit}button{border:0;border-radius:7px;background:var(--accent);color:#fff;font-weight:800;padding:11px 16px;cursor:pointer}.status{padding:12px 16px;border-bottom:1px solid var(--line);color:var(--muted);font-size:.9rem}.result{min-height:460px;display:grid;place-items:center;padding:16px;background:linear-gradient(180deg,#fff,#f7fbfa)}figure{margin:0;width:100%;display:grid;gap:10px}img{width:100%;max-height:390px;object-fit:cover;border-radius:8px;background:var(--soft)}figcaption{display:flex;justify-content:space-between;gap:8px;color:var(--muted)}.fact{width:100%;background:#fff;border:1px solid var(--line);border-radius:8px;padding:22px}.fact b{display:block;font-size:1.35rem;margin-bottom:10px}.fact p{margin:0;color:var(--muted);line-height:1.75}.empty{color:var(--muted)}.open{display:inline-block;margin-top:14px;color:var(--accent);font-weight:800}.inline-img{margin-top:14px;max-height:230px}audio{width:100%;margin-top:16px}@media(max-width:760px){.hero,.board{grid-template-columns:1fr}.docs{justify-self:start}.result{min-height:360px}}
</style></head><body><main><section class="hero"><div><h1>RandomDog Viewer</h1><p class="lead">ランダムな犬画像や動画を表示。APIのライブ取得に失敗した場合も、用途が分かるサンプル表示に切り替えます。</p></div><a class="docs" href="https://random.dog/woof.json" target="_blank" rel="noreferrer">公式ページ</a></section><section class="board"><aside class="side"><h2>RandomDog</h2><p>ランダムな犬画像や動画を表示。登録不要で試せる範囲をHTMLだけで確認できます。</p><div class="api"><span>Endpoint</span><div class="endpoint" id="endpointLabel"></div></div><div class="actions"><button id="loadBtn" type="button">データを取得</button></div></aside><section class="viewer"><div class="status" id="status">待機中</div><div class="result" id="result"><div class="empty">ボタンを押して取得</div></div></section></section></main><script>
const cfg={title:'RandomDog Viewer',api:'RandomDog',docs:'https://random.dog/woof.json',endpoint:'https://random.dog/woof.json',kind:'randomdog',image:'',fallbackTitle:'RandomDog',fallbackText:'犬の画像または動画URLをランダムに返します。'};
const result=document.getElementById('result'),status=document.getElementById('status');document.getElementById('endpointLabel').textContent=cfg.endpoint||'APIキーまたは公式ドキュメントを参照';function setLoading(){status.textContent='取得中...';result.innerHTML='<div class="empty">データを読み込んでいます</div>'}function fallback(m){status.textContent=m||'フォールバック表示';result.innerHTML='<div class="fact"><b>'+cfg.fallbackTitle+'</b><p>'+cfg.fallbackText+'</p></div>'}function showFact(t,txt,extra){status.textContent='取得完了';result.innerHTML='<div class="fact"><b>'+t+'</b><p>'+txt+'</p>'+(extra||'')+'</div>'}function showImage(src,t,txt){status.textContent='表示完了';result.innerHTML='<figure><img src="'+src+'" alt="'+t+'"><figcaption><b>'+t+'</b><span>'+(txt||'')+'</span></figcaption></figure>'}async function loadData(){setLoading();try{if(cfg.kind==='imageDirect'||cfg.kind==='placeholder'){showImage(cfg.image+(cfg.kind==='imageDirect'?'?t='+Date.now():''),cfg.api,cfg.fallbackText);return}if(cfg.kind==='statusDog'){const code=document.getElementById('statusCode').value||'404';showImage('https://http.dog/'+code+'.jpg','HTTP '+code,'コードを変えて表示できます');return}if(cfg.kind==='keyNeeded'){fallback('APIキーが必要');return}const res=await fetch(cfg.endpoint,{cache:'no-store'});if(!res.ok)throw new Error('HTTP '+res.status);const data=await res.json();if(cfg.kind==='catninja')showFact('Cat fact',data.fact||cfg.fallbackText,'<small> length: '+(data.length||'-')+'</small>');else if(cfg.kind==='dogapi')showFact('Dog fact',data.data?.[0]?.attributes?.body||cfg.fallbackText);else if(cfg.kind==='arrayFact')showFact('Dog fact',Array.isArray(data)?(data[0]?.fact||data[0]||cfg.fallbackText):cfg.fallbackText);else if(cfg.kind==='fact')showFact('Cat fact',data.text||data.fact||cfg.fallbackText);else if(cfg.kind==='meow')showFact('Meow fact',data.data?.[0]||cfg.fallbackText);else if(cfg.kind==='randomdog'){const url=data.url||'';if(url.match(/\.mp4$/))showFact('RandomDog video','動画URLを取得しました。','<a class="open" href="'+url+'" target="_blank" rel="noreferrer">動画を開く</a>');else showImage(url,'RandomDog','')}else if(cfg.kind==='shibe')showImage(Array.isArray(data)?data[0]:'','Shibe Online','');else if(cfg.kind==='fish'){const item=Array.isArray(data)?data[Math.floor(Math.random()*data.length)]:null;const img=item?.['Species Illustration Photo']?.src||item?.['Image Gallery']?.[0]?.src;showFact(item?.['Species Name']||'FishWatch species',item?.Habitat||item?.Taste||cfg.fallbackText,img?'<img class="inline-img" src="'+img+'" alt="fish">':'')}else if(cfg.kind==='movebank')showFact('Movebank',cfg.fallbackText);else if(cfg.kind==='xeno'){const rec=data.recordings?.[0];showFact(rec?(rec.en||rec.gen+' '+rec.sp):'xeno-canto',rec?((rec.loc||'')+' / '+(rec.cnt||'')):cfg.fallbackText,rec?.file?'<audio controls src="'+rec.file+'"></audio>':'')}else if(cfg.kind==='json')showFact(cfg.api,JSON.stringify(data).slice(0,260));else fallback()}catch(err){console.error(err);fallback('取得失敗')}}document.getElementById('loadBtn').addEventListener('click',loadData);loadData();
</script></body></html>
