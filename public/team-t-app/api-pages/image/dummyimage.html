<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DummyImage Maker</title>
  
  <style>
    /* DummyImage Maker: DummyImage を紹介し、取得・生成・フォールバック表示を行う自己完結HTML。 */
    :root{--bg:#f2f4ef;--ink:#20242a;--muted:#66716c;--panel:#fff;--line:#d8ddd3;--accent:#2f7d76;--accent2:#d9893d;--soft:#e7ece4;--shadow:0 18px 40px rgba(37,45,48,.16)}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"Segoe UI",system-ui,sans-serif;color:var(--ink);background:linear-gradient(135deg,#f2f4ef,#f6eadc)}main{width:min(1120px,calc(100% - 28px));margin:0 auto;padding:28px 0}.hero{display:grid;grid-template-columns:1fr auto;gap:16px;align-items:end;margin-bottom:14px}h1{margin:0;font-size:clamp(2rem,5vw,4rem);line-height:1;letter-spacing:0}.lead{margin:10px 0 0;color:var(--muted);max-width:680px}.docs{color:var(--ink);text-decoration:none;background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:10px 12px}.shell{display:grid;grid-template-columns:320px 1fr;gap:12px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);overflow:hidden}.controls{padding:18px}.field{display:grid;gap:6px;margin:12px 0;color:var(--muted);font-size:.84rem;font-weight:700}input,select{width:100%;border:1px solid var(--line);border-radius:7px;padding:10px;font:inherit;color:var(--ink);background:#fff}button{border:0;border-radius:7px;background:var(--accent);color:white;font-weight:800;padding:11px 14px;cursor:pointer}button:hover{filter:brightness(.94)}.status{padding:12px 16px;border-bottom:1px solid var(--line);color:var(--muted)}.result{min-height:520px;padding:16px;display:grid;gap:12px;align-content:start;background:linear-gradient(180deg,#fff,#f9fbf8)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px}.card{border:1px solid var(--line);border-radius:8px;background:#fff;overflow:hidden}.card img{width:100%;height:170px;object-fit:cover;background:var(--soft)}.card .body{padding:12px}.card b{display:block;margin-bottom:5px}.muted{color:var(--muted);line-height:1.55}.palette{display:grid;grid-template-columns:repeat(5,1fr);height:130px;border-radius:8px;overflow:hidden;border:1px solid var(--line)}.swatch{display:grid;place-items:end center;color:#fff;text-shadow:0 1px 8px rgba(0,0,0,.5);font-size:.8rem;padding:8px}.preview{width:100%;min-height:320px;border:1px solid var(--line);border-radius:8px;background:var(--soft);display:grid;place-items:center;overflow:hidden}.preview img{max-width:100%;max-height:420px}.emoji{font-size:7rem;line-height:1}.empty{color:var(--muted);text-align:center;padding:40px 10px}.noise{width:100%;height:360px;border-radius:8px;border:1px solid var(--line)}lord-icon{width:220px;height:220px}@media(max-width:820px){.hero,.shell{grid-template-columns:1fr}.docs{justify-self:start}.result{min-height:360px}}
  </style>
</head>
<body>
<main>
  <section class="hero"><div><h1>DummyImage Maker</h1><p class="lead">サイズと色を指定してダミー画像を生成。ライブ取得に失敗した場合は、用途が分かるサンプル表示へ切り替えます。</p></div><a class="docs" href="https://dummyimage.com/" target="_blank" rel="noreferrer">公式ページ</a></section>
  <section class="shell"><aside class="panel controls"><h2>DummyImage</h2><p class="muted">サイズと色を指定してダミー画像を生成。HTMLだけで試せる軽量テンプレートです。</p><div id="dynamicControls"></div><button id="loadBtn" type="button">表示する</button></aside><section class="panel"><div class="status" id="status">待機中</div><div class="result" id="result"><div class="empty">表示するボタンを押してください</div></div></section></section>
</main>
<script>
const cfg={id:'dummyimage',kind:'dummyimage',title:'DummyImage Maker',api:'DummyImage'};
const result=document.getElementById('result'),statusEl=document.getElementById('status'),controls=document.getElementById('dynamicControls');
const samplePalettes=[[39,87,87],[242,183,92],[217,128,80],[91,111,99],[245,238,220]];
function setStatus(t){statusEl.textContent=t}function esc(v){return String(v??'').replace(/[&<>]/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[s]))}function palette(colors){return '<div class="palette">'+colors.map(c=>{const hex=Array.isArray(c)?'#'+c.map(v=>Number(v).toString(16).padStart(2,'0')).join(''):c;return '<div class="swatch" style="background:'+hex+'">'+hex+'</div>'}).join('')+'</div>'}function fallback(msg){setStatus(msg||'サンプル表示');result.innerHTML='<div class="card"><div class="body"><b>'+cfg.title+'</b><p class="muted">APIが利用できない場合に備えたサンプル表示です。公式ページの仕様を確認しながら差し替えできます。</p></div></div>'+palette(samplePalettes)}
function setup(){if(cfg.kind==='dummyimage'){controls.innerHTML='<label class="field">サイズ<input id="size" value="640x360"></label><label class="field">背景色<input id="bg" value="2f7d76"></label><label class="field">文字<input id="text" value="teamT API"></label>'}else if(cfg.kind==='iconhorse'){controls.innerHTML='<label class="field">ドメイン<input id="domain" value="openai.com"></label>'}else if(cfg.kind==='icons8'){controls.innerHTML='<label class="field">アイコン名<input id="iconName" value="search"></label><label class="field">スタイル<select id="style"><option>fluency</option><option>ios-filled</option><option>color</option></select></label>'}else if(cfg.kind==='met'||cfg.kind==='artic'){controls.innerHTML='<label class="field">検索語<input id="query" value="cat"></label>'}else if(cfg.kind==='emojihub'){controls.innerHTML='<label class="field">カテゴリ<select id="emojiCat"><option value="random">random</option><option value="random/category/animals-and-nature">animals and nature</option><option value="random/category/food-and-drink">food and drink</option><option value="random/category/activities">activities</option></select></label>'}else if(cfg.kind==='lordicon'){controls.innerHTML='<label class="field">アイコン<select id="lord"><option value="https://cdn.lordicon.com/xyboiuok.json">palette</option><option value="https://cdn.lordicon.com/wloilxuq.json">sparkles</option><option value="https://cdn.lordicon.com/jectmwqf.json">image</option></select></label>'}else if(cfg.kind==='noise'){controls.innerHTML='<label class="field">濃さ<input id="opacity" type="range" min="5" max="45" value="18"></label><label class="field">色<input id="noiseColor" value="2f7d76"></label>'}else if(cfg.kind==='pixel'){controls.innerHTML='<label class="field">種別<select id="pixelType"><option value="basic/monsters/random">monster</option><option value="basic/svgmonsters/random">svg monster</option></select></label>'}else if(cfg.kind==='xcolors'){controls.innerHTML='<label class="field">モード<select id="xmode"><option value="random">random</option><option value="random?number=5">random palette</option></select></label>'}}
async function load(){setStatus('処理中...');try{if(cfg.kind==='dummyimage'){const size=document.getElementById('size').value||'640x360',bg=document.getElementById('bg').value||'2f7d76',text=encodeURIComponent(document.getElementById('text').value||'sample');result.innerHTML='<div class="preview"><img src="https://dummyimage.com/'+size+'/'+bg+'/ffffff.png&text='+text+'" alt="dummy"></div>';setStatus('生成完了');return}if(cfg.kind==='iconhorse'){const d=document.getElementById('domain').value.trim()||'openai.com';result.innerHTML='<div class="preview"><img style="width:180px;height:180px" src="https://icon.horse/icon/'+encodeURIComponent(d)+'" alt="favicon"></div><p class="muted">https://icon.horse/icon/'+esc(d)+'</p>';setStatus('取得完了');return}if(cfg.kind==='icons8'){const name=encodeURIComponent(document.getElementById('iconName').value||'search'),style=document.getElementById('style').value;result.innerHTML='<div class="preview"><img style="width:160px;height:160px" src="https://img.icons8.com/'+style+'/160/'+name+'.png" alt="icon"></div>';setStatus('表示完了');return}if(cfg.kind==='lordicon'){const src=document.getElementById('lord').value;result.innerHTML='<div class="preview"><lord-icon src="'+src+'" trigger="loop" colors="primary:#2f7d76,secondary:#d9893d"></lord-icon></div>';setStatus('表示完了');return}if(cfg.kind==='noise'){const o=document.getElementById('opacity').value,c=document.getElementById('noiseColor').value||'2f7d76';result.innerHTML='<div class="noise" style="background-color:#'+esc(c)+';background-image:radial-gradient(rgba(255,255,255,.'+o+') 1px, transparent 1px);background-size:6px 6px"></div>';setStatus('生成完了');return}if(cfg.kind==='pixel'){const type=document.getElementById('pixelType').value;result.innerHTML='<div class="preview"><img src="https://app.pixelencounter.com/api/'+type+'?t='+Date.now()+'" alt="pixel"></div>';setStatus('表示完了');return}if(cfg.kind==='colormind'){const res=await fetch('http://colormind.io/api/',{method:'POST',body:JSON.stringify({model:'default'})});const data=await res.json();result.innerHTML=palette(data.result||samplePalettes);setStatus('取得完了');return}if(cfg.kind==='colourlovers'){const res=await fetch('http://www.colourlovers.com/api/palettes/top?format=json&numResults=1');const data=await res.json();const cols=(data[0]?.colors||[]).map(x=>'#'+x);result.innerHTML=palette(cols.length?cols:samplePalettes)+'<p class="muted">'+esc(data[0]?.title||'Popular palette')+'</p>';setStatus('取得完了');return}if(cfg.kind==='emojihub'){const ep=document.getElementById('emojiCat').value;const res=await fetch('https://emojihub.yurace.pro/api/'+ep);const e=await res.json();result.innerHTML='<div class="card"><div class="body"><div class="emoji">'+(e.htmlCode?.[0]||'&#10024;')+'</div><b>'+esc(e.name)+'</b><p class="muted">'+esc(e.category)+' / '+esc(e.group)+'</p></div></div>';setStatus('取得完了');return}if(cfg.kind==='artic'){const q=encodeURIComponent(document.getElementById('query').value||'cat');const res=await fetch('https://api.artic.edu/api/v1/artworks/search?q='+q+'&query[term][is_public_domain]=true&fields=id,title,artist_display,date_display,image_id&limit=8');const data=await res.json();const base=data.config?.iiif_url||'https://www.artic.edu/iiif/2';const cards=(data.data||[]).filter(x=>x.image_id).map(x=>'<article class="card"><img src="'+base+'/'+x.image_id+'/full/400,/0/default.jpg"><div class="body"><b>'+esc(x.title)+'</b><p class="muted">'+esc(x.artist_display||'')+'</p></div></article>').join('');result.innerHTML='<div class="grid">'+(cards||'<div class="empty">該当作品なし</div>')+'</div>';setStatus('取得完了');return}if(cfg.kind==='met'){const q=encodeURIComponent(document.getElementById('query').value||'cat');const s=await fetch('https://collectionapi.metmuseum.org/public/collection/v1/search?hasImages=true&q='+q);const ids=(await s.json()).objectIDs?.slice(0,8)||[];const items=await Promise.all(ids.map(id=>fetch('https://collectionapi.metmuseum.org/public/collection/v1/objects/'+id).then(r=>r.json())));result.innerHTML='<div class="grid">'+items.map(x=>'<article class="card"><img src="'+esc(x.primaryImageSmall||x.primaryImage||'')+'"><div class="body"><b>'+esc(x.title)+'</b><p class="muted">'+esc(x.artistDisplayName||x.department||'')+'</p></div></article>').join('')+'</div>';setStatus('取得完了');return}if(cfg.kind==='xcolors'){const mode=document.getElementById('xmode').value;const res=await fetch('https://x-colors.yurace.pro/api/'+mode);const data=await res.json();const colors=Array.isArray(data)?data.map(x=>x.hex):[data.hex||'#2f7d76','#d9893d','#20242a','#e7ece4','#66716c'];result.innerHTML=palette(colors);setStatus('取得完了');return}}catch(e){console.error(e);fallback('取得失敗')}}setup();document.getElementById('loadBtn').addEventListener('click',load);load();
</script>
</body>
</html>
