<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waifu Gallery</title>

<style>
body{
    background:#1e1e1e;
    color:white;
    font-family:sans-serif;
    text-align:center;
    margin:0;
    padding:20px;
}

h1{
    margin-bottom:20px;
}

select,button{
    padding:10px;
    font-size:16px;
    border:none;
    border-radius:8px;
    margin:5px;
}

button{
    cursor:pointer;
}

img{
    margin-top:20px;
    max-width:500px;
    width:90%;
    border-radius:15px;
    box-shadow:0 0 15px rgba(255,255,255,0.2);
}

.info{
    margin-top:15px;
    color:#ccc;
}
</style>
</head>
<body>

<h1>🎀 Waifu Random Gallery 🎀</h1>

<select id="category">
    <option value="waifu">通常</option>
    </select>

<button onclick="loadImage()">
    ランダム表示
</button>

<div>
    <img id="waifuImage" src="" alt="画像">
</div>

<div class="info" id="info"></div>

<script>
async function loadImage() {

    const category =
        document.getElementById("category").value;

    let url = "https://api.waifu.im/images";

    if(category === "nsfw"){
        url += "?is_nsfw=true";
    } else {
        url += "?included_tags=" + category;
    }

    try {

        const response = await fetch(url);
        const data = await response.json();

        console.log(data);

        if(!data.items || data.items.length === 0){
            alert("画像が見つかりません");
            return;
        }

        const image = data.items[0];

        document.getElementById("waifuImage").src = image.url;

        document.getElementById("info").textContent =
            image.tags
                ? image.tags.map(tag => tag.name).join(", ")
                : category;

    } catch(error) {
        console.error(error);
        alert("取得失敗");
    }
}

loadImage();
</script>

</body>
</html>
