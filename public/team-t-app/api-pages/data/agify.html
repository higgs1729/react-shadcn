<!DOCTYPE html>
<!--
  Agify.io API紹介ページ
  目的: 名前から推定年齢を返す無料APIを使い、軽量な予測APIの挙動を試す。
  構成: 名前入力 / 国コード任意指定 / fetch / 推定結果カード。
-->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agify.io 年齢推定</title>
  <style>
    :root { --bg:#f6f7fb; --panel:#fff; --ink:#202536; --muted:#657187; --line:#dde5ef; --accent:#7b61ff; --accent2:#2f6ef0; --soft:#efecff; --danger:#c43d3d; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:"BIZ UDPGothic","Meiryo UI",sans-serif; background:linear-gradient(135deg,#f6f7fb,#f0f7ff); color:var(--ink); }
    main { width:min(980px,100%); margin:0 auto; padding:34px 18px; }
    h1 { margin:0 0 8px; font-size:clamp(24px,4vw,38px); letter-spacing:0; }
    p { margin:0; color:var(--muted); line-height:1.75; }
    a { color:var(--accent2); }
    .layout { display:grid; grid-template-columns:340px 1fr; gap:16px; margin-top:18px; }
    .panel { background:rgba(255,255,255,.94); border:1px solid var(--line); border-radius:16px; padding:18px; box-shadow:0 16px 34px rgba(50,60,92,.08); }
    label { display:block; margin:14px 0 7px; font-weight:700; font-size:13px; }
    input, select { width:100%; padding:11px 12px; border:1px solid var(--line); border-radius:10px; font:inherit; background:#fff; color:var(--ink); }
    button { width:100%; margin-top:16px; border:0; border-radius:10px; padding:12px 14px; font:inherit; font-weight:700; color:#fff; background:linear-gradient(135deg,var(--accent),var(--accent2)); cursor:pointer; }
    .status { margin-bottom:14px; color:var(--muted); font-weight:700; }
    .status.error { color:var(--danger); }
    .result { display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; }
    .metric { padding:18px; border-radius:15px; background:var(--soft); min-height:120px; }
    .metric span { display:block; color:var(--muted); font-size:12px; font-weight:700; }
    .metric b { display:block; margin-top:12px; font-size:clamp(28px,7vw,54px); line-height:1; color:var(--accent); }
    pre { margin-top:14px; padding:14px; border-radius:12px; background:#172033; color:#dbe8ff; overflow:auto; min-height:140px; white-space:pre-wrap; }
    @media (max-width:760px){ .layout,.result{grid-template-columns:1fr;} }
  </style>
</head>
<body>
  <main>
    <h1>Agify.io 年齢推定</h1>
    <p>名前から年齢を推定する無料APIです。返ってくる `age` は統計的な推定値で、`count` はデータ件数の目安です。</p>

    <section class="layout">
      <form class="panel" id="agify-form">
        <label for="name">名前（ローマ字）</label>
        <input id="name" value="sakura" autocomplete="off">
        <label for="country">国コード（任意）</label>
        <select id="country">
          <option value="">指定なし</option>
          <option value="JP">JP 日本</option>
          <option value="US">US アメリカ</option>
          <option value="GB">GB イギリス</option>
          <option value="BR">BR ブラジル</option>
          <option value="DE">DE ドイツ</option>
        </select>
        <button type="submit">推定する</button>
        <p style="margin-top:12px;font-size:12px;">Docs: <a href="https://agify.io" target="_blank" rel="noreferrer">https://agify.io</a></p>
      </form>

      <section class="panel">
        <div class="status" id="status">未推定です。</div>
        <div class="result">
          <div class="metric"><span>推定年齢</span><b id="age">-</b></div>
          <div class="metric"><span>名前</span><b id="r-name">-</b></div>
          <div class="metric"><span>件数</span><b id="count">-</b></div>
        </div>
        <pre id="json">JSONレスポンスがここに表示されます。</pre>
      </section>
    </section>
  </main>

  <script>
    const form = document.getElementById("agify-form");
    const statusEl = document.getElementById("status");
    const jsonEl = document.getElementById("json");

    async function estimate(event) {
      event.preventDefault();
      const name = document.getElementById("name").value.trim() || "sakura";
      const country = document.getElementById("country").value;
      const params = new URLSearchParams({ name });
      if (country) params.set("country_id", country);
      const url = `https://api.agify.io?${params.toString()}`;
      statusEl.className = "status";
      statusEl.textContent = "推定中...";
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        statusEl.textContent = "成功: 推定結果を取得しました。";
        document.getElementById("age").textContent = data.age ?? "?";
        document.getElementById("r-name").textContent = data.name ?? name;
        document.getElementById("count").textContent = data.count ?? 0;
        jsonEl.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        statusEl.className = "status error";
        statusEl.textContent = "取得に失敗しました。API制限またはネットワーク状態を確認してください。";
        const fallback = { name, age: 28, count: 1234, fallback: true, message: error.message };
        document.getElementById("age").textContent = fallback.age;
        document.getElementById("r-name").textContent = fallback.name;
        document.getElementById("count").textContent = fallback.count;
        jsonEl.textContent = JSON.stringify(fallback, null, 2);
      }
    }

    form.addEventListener("submit", estimate);
  </script>
</body>
</html>
