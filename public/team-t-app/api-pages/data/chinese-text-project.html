<!DOCTYPE html>
<!-- Chinese Text Project紹介ページ: 古典中国語文献API候補。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Chinese Text Project Search</title><style>body{font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;margin:0;min-height:100vh;background:#f6f7fb;color:#202536}main{width:min(900px,100%);margin:auto;padding:34px 18px}.panel{background:#fff;border:1px solid #dde5ef;border-radius:15px;padding:18px}input,button{width:100%;font:inherit;border-radius:10px;padding:11px 12px;margin-top:10px}input{border:1px solid #dde5ef}button{border:0;background:#1f8a70;color:#fff;font-weight:700}pre{padding:14px;border-radius:12px;background:#172033;color:#dbe8ff;white-space:pre-wrap}p{color:#667086;line-height:1.7}a{color:#1f8a70}</style></head><body><main><h1>Chinese Text Project Search</h1><p>先秦・漢代などの中国古典テキストを扱う公開API候補です。</p><section class="panel"><input id="q" value="論語"><button id="show">検索例</button><pre id="out"></pre><p>Docs: <a href="https://ctext.org/tools/api" target="_blank" rel="noreferrer">ctext API</a></p></section></main><script>document.getElementById("show").onclick=()=>{document.getElementById("out").textContent=JSON.stringify({query:document.getElementById("q").value,docs:"https://ctext.org/tools/api",note:"API keyや利用条件を公式で確認"},null,2)};</script></body></html>
