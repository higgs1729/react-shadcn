<!DOCTYPE html>
<!-- ReqRes紹介ページ: REST API練習用のユーザー一覧を取得する。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>ReqRes User Browser</title><style>body{font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;margin:0;min-height:100vh;background:#f6f7fb;color:#202536}main{width:min(980px,100%);margin:auto;padding:34px 18px}button{border:0;border-radius:10px;padding:12px 16px;background:#2f6ef0;color:#fff;font:inherit;font-weight:700}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:16px}.card{background:#fff;border:1px solid #dde5ef;border-radius:14px;padding:14px;text-align:center}.card img{width:90px;height:90px;border-radius:50%}p{color:#667086;line-height:1.7}a{color:#2f6ef0}</style></head><body><main><h1>ReqRes User Browser</h1><p>REST API練習用のユーザー一覧を取得します。</p><button id="load">ユーザー取得</button><section class="cards" id="cards"></section><p>Docs: <a href="https://reqres.in/" target="_blank" rel="noreferrer">reqres.in</a></p></main><script>document.getElementById("load").onclick=async()=>{const cards=document.getElementById("cards");try{const r=await fetch("https://reqres.in/api/users?page=1");if(!r.ok)throw new Error(`HTTP ${r.status}`);const d=await r.json();cards.innerHTML=d.data.map(u=>`<article class="card"><img src="${u.avatar}" alt=""><b>${u.first_name} ${u.last_name}</b><p>${u.email}</p></article>`).join("")}catch(e){cards.innerHTML=`<article class="card"><b>fallback</b><p>${e.message}</p></article>`}};</script></body></html>
