<!DOCTYPE html>
<!-- jsDelivr紹介ページ: npmパッケージのCDN統計・ファイル情報API。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>jsDelivr Package Info</title><style>
body{margin:0;min-height:100vh;font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;background:linear-gradient(135deg,#f6f7fb,#fff6ef);color:#202536}main{width:min(980px,100%);margin:auto;padding:34px 18px}h1{font-size:clamp(24px,4vw,38px);letter-spacing:0}form{display:flex;gap:10px;background:#fff;border:1px solid #dde5ef;border-radius:14px;padding:16px}input,button{font:inherit;border-radius:10px;padding:11px 12px}input{flex:1;border:1px solid #dde5ef}button{border:0;background:#f38020;color:#fff;font-weight:700}pre{padding:14px;border-radius:12px;background:#172033;color:#dbe8ff;white-space:pre-wrap;min-height:320px}p{color:#667086;line-height:1.7}a{color:#f38020}@media(max-width:720px){form{display:grid}}</style></head><body><main><h1>jsDelivr Package Info</h1><p>jsDelivrの公開APIからnpmパッケージのファイル情報や統計を確認します。</p><form id="form"><input id="pkg" value="vue"><button>取得</button></form><pre id="out">未取得です。</pre><p>Docs: <a href="https://github.com/jsdelivr/data.jsdelivr.com" target="_blank" rel="noreferrer">data.jsdelivr.com</a></p></main><script>
document.getElementById("form").onsubmit=async e=>{e.preventDefault();const p=document.getElementById("pkg").value,out=document.getElementById("out");try{const r=await fetch(`https://data.jsdelivr.com/v1/package/npm/${encodeURIComponent(p)}`);if(!r.ok)throw new Error(`HTTP ${r.status}`);out.textContent=JSON.stringify(await r.json(),null,2)}catch(err){out.textContent=JSON.stringify({fallback:true,package:p,message:err.message},null,2)}};
</script></body></html>
