<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>💰 ゲームセール検索</title>

<style>
body{
    font-family:sans-serif;
    background:#0f172a;
    color:white;
    padding:20px;
}

h1{
    text-align:center;
}

.search{
    text-align:center;
    margin-bottom:20px;
}

input{
    padding:10px;
    width:250px;
    border-radius:10px;
    border:none;
}

button{
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}

#status{
    text-align:center;
    color:#94a3b8;
}

#grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
    gap:20px;
    margin-top:20px;
}

.card{
    background:#1e293b;
    border-radius:12px;
    overflow:hidden;
}

.card img{
    width:100%;
    height:150px;
    object-fit:cover;
}

.card-body{
    padding:10px;
}

.price{
    display:flex;
    gap:8px;
    align-items:baseline;
}

.now{
    color:#22c55e;
    font-size:18px;
    font-weight:bold;
}

.normal{
    color:#94a3b8;
    text-decoration:line-through;
    font-size:14px;
}

.cut{
    color:#f97316;
    font-size:13px;
}

.store{
    color:#94a3b8;
    font-size:13px;
}

footer{
    margin-top:30px;
    text-align:center;
}

footer a{
    color:#38bdf8;
}
</style>
</head>

<body>

<h1>💰 ゲームセール検索</h1>

<div class="search">
    <input id="keyword" placeholder="ゲームタイトルを検索（例: portal）">
    <button onclick="searchDeals()">検索</button>
</div>

<p id="status">読み込み中...</p>

<div id="grid"></div>

<footer>
    <a href="https://apidocs.cheapshark.com/" target="_blank" rel="noopener">CheapShark API ドキュメント</a>
</footer>

<script>

/* CheapShark の /deals エンドポイントからPCゲームの現在セール情報を取得し、
   カード一覧で表示する。ストア名は /stores を1回だけ取得してIDから逆引きする */

let storeNames = {};

async function loadStores(){

    try{
        const res = await fetch("https://www.cheapshark.com/api/1.0/stores");
        const stores = await res.json();

        stores.forEach(store => {
            storeNames[store.storeID] = store.storeName;
        });
    }catch(err){
        storeNames = {};
    }
}

async function loadDeals(title){

    const status = document.getElementById("status");
    const grid = document.getElementById("grid");

    status.textContent = "読み込み中...";
    grid.innerHTML = "";

    try{
        const url = title
            ? `https://www.cheapshark.com/api/1.0/deals?title=${encodeURIComponent(title)}&pageSize=24`
            : "https://www.cheapshark.com/api/1.0/deals?pageSize=24&sortBy=Deal%20Rating";

        const res = await fetch(url);

        if(!res.ok){
            throw new Error("HTTP " + res.status);
        }

        const deals = await res.json();

        if(deals.length === 0){
            status.textContent = "該当するセールが見つかりませんでした";
            return;
        }

        status.textContent = `${deals.length}件のセールを表示中`;
        showDeals(deals);

    }catch(err){
        status.textContent = "取得に失敗しました。時間をおいて再度お試しください";
    }
}

function showDeals(deals){

    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    deals.forEach(deal => {

        const storeName = storeNames[deal.storeID] || `Store #${deal.storeID}`;
        const cut = Math.round(Number(deal.savings));

        grid.innerHTML += `
        <div class="card">

            <img src="${deal.thumb}" alt="${deal.title}">

            <div class="card-body">

                <h3>${deal.title}</h3>

                <div class="price">
                    <span class="now">$${deal.salePrice}</span>
                    <span class="normal">$${deal.normalPrice}</span>
                    ${cut > 0 ? `<span class="cut">-${cut}%</span>` : ""}
                </div>

                <p class="store">${storeName}</p>

            </div>

        </div>
        `;
    });
}

function searchDeals(){
    const keyword = document.getElementById("keyword").value.trim();
    loadDeals(keyword);
}

document.getElementById("keyword").addEventListener("keydown", e => {
    if(e.key === "Enter"){
        searchDeals();
    }
});

loadStores().then(() => loadDeals(""));

</script>

</body>
</html>
