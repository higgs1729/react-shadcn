<!DOCTYPE html>
<!--
  Arbeitnow API
  目的: Europe/Remote求人を返すArbeitnow Job Board APIを検索・表示する。
  構成: 概要、キーワード入力、求人カード、エラー時サンプル。
-->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arbeitnow Job Board API</title>
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--ink:#172033;--muted:#64748b;--line:#d8e0ec;--accent:#2563eb;--accent2:#10b981}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"Yu Gothic","Meiryo",sans-serif;color:var(--ink);background:linear-gradient(180deg,#fbfdff,var(--bg))}main{width:min(1100px,calc(100% - 28px));margin:auto;padding:28px 0}.hero{display:grid;grid-template-columns:1.2fr .8fr;gap:16px;margin-bottom:16px}.panel{background:var(--card);border:1px solid var(--line);border-radius:8px;box-shadow:0 14px 30px rgba(15,23,42,.08)}.intro{padding:24px;border-top:5px solid var(--accent)}h1{margin:4px 0 10px;font-size:clamp(28px,4vw,40px);letter-spacing:0}.eyebrow{margin:0;color:var(--accent);font-weight:700}.meta{display:grid;gap:10px;padding:16px}.meta div{padding:12px;border:1px solid var(--line);border-radius:8px;background:#fbfdff}.meta strong{display:block;color:var(--muted);font-size:12px}.meta a{color:var(--accent);overflow-wrap:anywhere}.controls{padding:18px;margin-bottom:16px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}label span{display:block;margin-bottom:6px;font-weight:700}input{width:100%;height:42px;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font:inherit}.actions{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:14px}button{min-height:42px;border:0;border-radius:8px;padding:0 18px;background:var(--accent);color:#fff;font-weight:700;cursor:pointer}.secondary{background:#e2e8f0;color:#172033}.status{color:var(--muted)}.url{margin-top:12px;padding:12px;border-radius:8px;background:#111827;color:#d1fae5;font-family:Consolas,monospace;overflow-wrap:anywhere}.results{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px}.item{padding:16px;border-top:4px solid var(--accent2)}.item h2{margin:0 0 8px;font-size:19px}.item p{margin:0;color:var(--muted);line-height:1.7}@media(max-width:760px){.hero,.grid{grid-template-columns:1fr}main{width:min(100% - 22px,1100px)}}
  </style>
</head>
<body>
<main>
  <section class="hero">
    <div class="panel intro"><p class="eyebrow">Jobs / REST</p><h1>Arbeitnow Job Board API</h1><p>Europe/Remote中心の求人データを取得し、キーワードで絞り込んで表示します。</p></div>
    <aside class="panel meta"><div><strong>公式URL</strong><a href="https://documenter.getpostman.com/view/18545278/UVJbJdKh" target="_blank" rel="noreferrer">Postman docs</a></div><div><strong>サンプルEndpoint</strong>https://www.arbeitnow.com/api/job-board-api</div></aside>
  </section>
  <section class="panel controls">
    <div class="grid"><label><span>取得URL</span><input id="endpoint" value="https://www.arbeitnow.com/api/job-board-api"></label><label><span>キーワード</span><input id="keyword" value="remote"></label></div>
    <div class="actions"><button id="loadBtn">取得する</button><button id="sampleBtn" class="secondary">サンプル表示</button><span id="status" class="status"></span></div>
    <div id="requestUrl" class="url"></div>
  </section>
  <section id="results" class="results" aria-live="polite"></section>
</main>
<script>
const sample=[{title:"Remote Backend Engineer",company_name:"Example GmbH",location:"Remote / Europe",url:"https://www.arbeitnow.com/"},{title:"AI Platform Developer",company_name:"Sample Labs",location:"Berlin",url:"https://www.arbeitnow.com/"}];
const $=id=>document.getElementById(id);function esc(v){return String(v||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function render(list,msg){$("status").textContent=msg;const key=$("keyword").value.toLowerCase();const rows=list.filter(j=>!key||JSON.stringify(j).toLowerCase().includes(key)).slice(0,24);$("results").innerHTML=rows.length?rows.map(j=>`<article class="panel item"><h2>${esc(j.title)}</h2><p>${esc(j.company_name||j.company||"")}</p><p>${esc(j.location||"")}</p><p><a href="${esc(j.url)}" target="_blank" rel="noreferrer">求人ページ</a></p></article>`).join(""):`<article class="panel item"><h2>結果なし</h2><p>キーワードを変えてください。</p></article>`}
async function loadData(){const url=$("endpoint").value.trim();$("requestUrl").textContent=url;$("status").textContent="取得中...";try{const r=await fetch(url);if(!r.ok)throw new Error("HTTP "+r.status);const data=await r.json();render(data.data||data.jobs||data,"取得しました");}catch(e){render(sample,"取得できないためサンプルを表示しています: "+e.message)}}
$("loadBtn").addEventListener("click",loadData);$("sampleBtn").addEventListener("click",()=>render(sample,"サンプル表示"));render(sample,"サンプル表示");$("requestUrl").textContent=$("endpoint").value;
</script>
</body>
</html>
