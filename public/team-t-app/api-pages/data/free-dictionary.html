<!DOCTYPE html>
<!-- Free Dictionary紹介ページ: 英単語の定義・発音を取得。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Free Dictionary Lookup</title><style>body{font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;margin:0;min-height:100vh;background:#f6f7fb;color:#202536}main{width:min(960px,100%);margin:auto;padding:34px 18px}form{display:flex;gap:10px;background:#fff;border:1px solid #dde5ef;border-radius:14px;padding:16px}input,button{font:inherit;border-radius:10px;padding:11px 12px}input{flex:1;border:1px solid #dde5ef}button{border:0;background:#2f6ef0;color:#fff;font-weight:700}.cards{display:grid;gap:12px;margin-top:16px}.card{background:#fff;border:1px solid #dde5ef;border-radius:14px;padding:16px}p{color:#667086;line-height:1.7}a{color:#2f6ef0}@media(max-width:720px){form{display:grid}}</style></head><body><main><h1>Free Dictionary Lookup</h1><p>英単語の定義・発音・品詞を取得します。</p><form id="form"><input id="word" value="example"><button>検索</button></form><section class="cards" id="cards"></section><p>Docs: <a href="https://dictionaryapi.dev/" target="_blank" rel="noreferrer">dictionaryapi.dev</a></p></main><script>document.getElementById("form").onsubmit=async e=>{e.preventDefault();const w=document.getElementById("word").value,cards=document.getElementById("cards");try{const r=await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${encodeURIComponent(w)}`);if(!r.ok)throw new Error(`HTTP ${r.status}`);const d=await r.json();cards.innerHTML=d[0].meanings.slice(0,5).map(m=>`<article class="card"><b>${m.partOfSpeech}</b><p>${m.definitions[0]?.definition||""}</p></article>`).join("")}catch(err){cards.innerHTML=`<article class="card"><b>fallback</b><p>${err.message}</p></article>`}};</script></body></html>
