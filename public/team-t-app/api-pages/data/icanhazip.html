<!DOCTYPE html>
<!-- Icanhazip紹介ページ: クライアントのグローバルIPを返す軽量API。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Icanhazip Viewer</title><style>
:root{--ink:#202536;--muted:#667086;--line:#dde5ef;--accent:#1f8a70;--soft:#e8f6f2;--danger:#c43d3d}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;background:linear-gradient(135deg,#f6f7fb,#eef8f4);color:var(--ink)}main{width:min(820px,100%);margin:auto;padding:34px 18px;text-align:center}h1{margin:0 0 8px;font-size:clamp(24px,4vw,38px);letter-spacing:0}p{margin:0;color:var(--muted);line-height:1.7}a{color:var(--accent)}button{margin:18px 0;border:0;border-radius:10px;padding:12px 16px;background:var(--accent);color:#fff;font:inherit;font-weight:700}.ip{padding:24px;border-radius:16px;background:var(--soft);font-size:clamp(28px,8vw,56px);font-weight:800;color:var(--accent);word-break:break-all}.status{font-weight:700;color:var(--muted);margin-bottom:12px}.status.error{color:var(--danger)}</style></head><body><main><h1>Icanhazip Viewer</h1><p>アクセス元のグローバルIPアドレスを返すシンプルなAPIです。</p><button id="load">IPを取得</button><p class="status" id="status">未取得です。</p><div class="ip" id="ip">-</div><p style="margin-top:14px;font-size:12px">Docs: <a href="https://major.io/icanhazip-com-faq/" target="_blank" rel="noreferrer">Icanhazip FAQ</a></p></main><script>
document.getElementById("load").addEventListener("click",async()=>{const s=document.getElementById("status"),ip=document.getElementById("ip");try{s.className="status";s.textContent="取得中...";const r=await fetch("https://icanhazip.com");if(!r.ok)throw new Error(`HTTP ${r.status}`);ip.textContent=(await r.text()).trim();s.textContent="APIから取得しました。";}catch(e){s.className="status error";s.textContent="取得不可。ブラウザからIP APIへアクセスできませんでした。";ip.textContent="unknown";}});
</script></body></html>
