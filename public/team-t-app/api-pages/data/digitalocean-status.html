<!DOCTYPE html>
<!-- DigitalOcean Status API紹介ページ: statuspage.io互換APIからサービス状態を表示する。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>DigitalOcean Status</title><style>
:root{--bg:#f5f7fb;--panel:#fff;--ink:#202536;--muted:#667086;--line:#dde5ef;--accent:#0069ff;--soft:#eaf1ff;--danger:#c43d3d}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;background:linear-gradient(135deg,#f5f7fb,#eef7ff);color:var(--ink)}main{width:min(1080px,100%);margin:auto;padding:32px 18px}h1{margin:0 0 8px;font-size:clamp(24px,4vw,38px);letter-spacing:0}p{margin:0;color:var(--muted);line-height:1.7}a{color:var(--accent)}button{margin:18px 0;border:0;border-radius:10px;padding:12px 16px;background:var(--accent);color:#fff;font:inherit;font-weight:700;cursor:pointer}.status{font-weight:700;color:var(--muted);margin-bottom:12px}.status.error{color:var(--danger)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}.card{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px}.card b{display:block;margin-bottom:8px}.chip{display:inline-flex;padding:5px 8px;border-radius:999px;background:var(--soft);color:var(--accent);font-size:12px;font-weight:700}
</style></head><body><main><h1>DigitalOcean Status</h1><p>DigitalOceanの公開ステータスAPIから、全体状態とコンポーネント状態を取得します。</p><button id="load">状態を読み込む</button><p class="status" id="status">未取得です。</p><section class="grid" id="grid"></section><p style="margin-top:14px;font-size:12px">Docs: <a href="https://status.digitalocean.com/api" target="_blank" rel="noreferrer">https://status.digitalocean.com/api</a></p></main><script>
const grid=document.getElementById("grid"),statusEl=document.getElementById("status");document.getElementById("load").addEventListener("click",async()=>{statusEl.className="status";statusEl.textContent="取得中...";try{const [s,c]=await Promise.all([fetch("https://status.digitalocean.com/api/v2/status.json"),fetch("https://status.digitalocean.com/api/v2/components.json")]);if(!s.ok||!c.ok)throw new Error(`HTTP ${s.status}/${c.status}`);const status=await s.json(), comps=await c.json();statusEl.textContent=`全体状態: ${status.status.description}`;grid.innerHTML=comps.components.slice(0,12).map(x=>`<article class="card"><b>${x.name}</b><p>${x.group?x.group_id:"component"}</p><span class="chip">${x.status}</span></article>`).join("")}catch(e){statusEl.className="status error";statusEl.textContent="取得に失敗しました。";grid.innerHTML=`<article class="card"><b>fallback</b><p>${e.message}</p><span class="chip">status api</span></article>`}})</script></body></html>
