<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHODAN Intelligence OSINT Terminal</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap');
        body { font-family: 'Fira Code', monospace; }
    </style>
</head>
<body class="bg-zinc-950 text-emerald-400 min-h-screen p-6 selection:bg-emerald-800 selection:text-white">

    <div class="max-w-4xl mx-auto space-y-6">
        <!-- ヘッダー -->
        <header class="border border-emerald-800 bg-zinc-900/50 p-4 rounded-lg shadow-2xl shadow-emerald-950/20">
            <h1 class="text-xl font-bold tracking-widest text-emerald-500 animate-pulse">⚡ SHODAN // INTEL_SEARCH_v1.0</h1>
            <p class="text-xs text-emerald-600 mt-1">インターネットに露出したアセットの隠れたポートと情報をスキャンします</p>
        </header>

        <!-- 設定・入力フォーム -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <div class="md:col-span-1 border border-zinc-800 bg-zinc-900 p-4 rounded-lg">
                <label class="block text-xs uppercase tracking-wider text-zinc-500 mb-2">1. Shodan API KEY</label>
                <input type="password" id="apiKey" placeholder="SHODAN_API_KEY" 
                    class="w-full bg-zinc-950 border border-zinc-800 rounded px-3 py-2 text-sm text-emerald-300 focus:outline-none focus:border-emerald-500">
                <p class="text-[10px] text-zinc-500 mt-1">※キーはローカルブラウザ内でのみ通信に使用されます。</p>
            </div>
            
            <div class="md:col-span-2 border border-zinc-800 bg-zinc-900 p-4 rounded-lg flex items-end gap-3">
                <div class="flex-1">
                    <label class="block text-xs uppercase tracking-wider text-zinc-500 mb-2">2. ターゲット IP アドレス</label>
                    <input type="text" id="targetIp" value="8.8.8.8" placeholder="e.g. 8.8.8.8" 
                        class="w-full bg-zinc-950 border border-zinc-800 rounded px-3 py-2 text-sm text-emerald-300 focus:outline-none focus:border-emerald-500">
                </div>
                <button onclick="scanIP()" class="bg-emerald-900 hover:bg-emerald-800 text-emerald-100 font-semibold px-6 py-2 rounded text-sm tracking-wider border border-emerald-600 transition-all cursor-pointer h-[38px]">
                    EXECUTE_SCAN
                </button>
            </div>
        </div>

        <!-- ローディング表示 -->
        <div id="loading" class="hidden text-center py-12 border border-dashed border-zinc-800 rounded-lg">
            <span class="inline-block animate-spin mr-2">⏳</span> データベースからターゲットの裏情報を抽出中...
        </div>

        <!-- エラー表示 -->
        <div id="error" class="hidden bg-red-950/30 border border-red-800 text-red-400 p-4 rounded-lg text-sm"></div>

        <!-- 結果表示画面 -->
        <div id="result" class="hidden grid grid-cols-1 md:grid-cols-3 gap-6">
            <!-- 基本情報 -->
            <div class="md:col-span-1 space-y-4">
                <div class="border border-zinc-800 bg-zinc-900 p-4 rounded-lg">
                    <h3 class="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-3">📍 Target Profile</h3>
                    <div class="space-y-2 text-sm">
                        <div class="flex justify-between"><span class="text-zinc-500">組織 (ISP):</span> <span id="resOrg" class="text-zinc-200">-</span></div>
                        <div class="flex justify-between"><span class="text-zinc-500">国名 / 都市:</span> <span id="resGeo" class="text-zinc-200">-</span></div>
                        <div class="flex justify-between"><span class="text-zinc-500">OS判定:</span> <span id="resOs" class="text-zinc-200">-</span></div>
                    </div>
                </div>

                <div class="border border-zinc-800 bg-zinc-900 p-4 rounded-lg">
                    <h3 class="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-3">🔓 Open Ports</h3>
                    <!-- ポート番号のバッジがここに並ぶ -->
                    <div id="resPorts" class="flex flex-wrap gap-2"></div>
                </div>
            </div>

            <!-- バナー生データ（Shodanが拾った機器の応答） -->
            <div class="md:col-span-2 border border-zinc-800 bg-zinc-900 p-4 rounded-lg flex flex-col">
                <h3 class="text-xs font-bold text-zinc-400 uppercase tracking-wider mb-3">📡 Raw Banner Leak (露出データ)</h3>
                <pre id="resRaw" class="flex-1 bg-zinc-950 p-3 rounded text-xs text-zinc-400 overflow-x-auto max-h-[400px] whitespace-pre-wrap font-mono border border-zinc-900"></pre>
            </div>
        </div>
    </div>

    <script>
        async function scanIP() {
            const apiKey = document.getElementById('apiKey').value.trim();
            const ip = document.getElementById('targetIp').value.trim();
            
            const loading = document.getElementById('loading');
            const errorDiv = document.getElementById('error');
            const resultDiv = document.getElementById('result');

            // バリデーション
            if (!apiKey) {
                alert('Shodan API KEY を入力してください。');
                return;
            }
            if (!ip) {
                alert('IPアドレスを入力してください。');
                return;
            }

            // 画面リセット
            loading.classList.remove('hidden');
            errorDiv.classList.add('hidden');
            resultDiv.classList.add('hidden');

            try {
                // Shodanの公開ホスト検索APIを直接叩く（CORS回避のために公式が用意しているエンドポイント）
                const response = await fetch(`https://api.shodan.io/shodan/host/${ip}?key=${apiKey}`);
                
                if (!response.ok) {
                    if (response.status === 404) throw new Error('指定されたIPのアセット情報はShodanに登録されていません。');
                    if (response.status === 401) throw new Error('APIキーが無効、または期限切れです。');
                    throw new Error(`エラーが発生しました (Status: ${response.status})`);
                }

                const data = await response.json();

                // データのマッピング
                document.getElementById('resOrg').textContent = data.org || 'Unknown';
                document.getElementById('resGeo').textContent = `${data.country_name || '-'} / ${data.city || '-'}`;
                document.getElementById('resOs').textContent = data.os || '検出不能';

                // 開放ポートのバッジ生成
                const portsDiv = document.getElementById('resPorts');
                portsDiv.innerHTML = '';
                if (data.ports && data.ports.length > 0) {
                    data.ports.sort((a, b) => a - b).forEach(port => {
                        const badge = document.createElement('span');
                        badge.className = 'bg-emerald-950/80 border border-emerald-600 text-emerald-300 text-xs font-semibold px-2 py-1 rounded';
                        badge.textContent = `PORT ${port}`;
                        portsDiv.appendChild(badge);
                    });
                } else {
                    portsDiv.innerHTML = '<span class="text-zinc-500 text-sm">開放ポートなし</span>';
                }

                // 生データ（最初のデータのプレビュー）
                if (data.data && data.data.length > 0) {
                    // 読みやすくするために、各ポートのバナー情報を整形して表示
                    const bannerSnippet = data.data.map(item => `[Port ${item.port}]\n${item.data.trim()}`).join('\n\n-------------------\n\n');
                    document.getElementById('resRaw').textContent = bannerSnippet;
                } else {
                    document.getElementById('resRaw').textContent = 'バナーデータはありません。';
                }

                // 結果を表示
                resultDiv.classList.remove('hidden');

            } catch (err) {
                errorDiv.textContent = `⚠️ SCAN_FAILED: ${err.message}`;
                errorDiv.classList.remove('hidden');
            } finally {
                loading.classList.add('hidden');
            }
        }
    </script>
</body>
</html>
