<!DOCTYPE html>
<!-- License-API紹介ページ: choosealicense系ライセンス情報API候補。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>License API Lookup</title><style>
body{margin:0;min-height:100vh;font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;background:linear-gradient(135deg,#f6f7fb,#eef8f4);color:#202536}main{width:min(900px,100%);margin:auto;padding:34px 18px}.panel{background:#fff;border:1px solid #dde5ef;border-radius:15px;padding:18px}select,button{width:100%;font:inherit;border-radius:10px;padding:11px 12px;margin-top:10px}select{border:1px solid #dde5ef}button{border:0;background:#1f8a70;color:#fff;font-weight:700}pre{padding:14px;border-radius:12px;background:#172033;color:#dbe8ff;white-space:pre-wrap}p{color:#667086;line-height:1.7}a{color:#1f8a70}</style></head><body><main><h1>License API Lookup</h1><p>OSSライセンス情報を取得する非公式API候補です。取得不可時は代表的な説明を表示します。</p><section class="panel"><select id="lic"><option>mit</option><option>apache-2.0</option><option>gpl-3.0</option></select><button id="load">取得</button><pre id="out">未取得です。</pre><p>Docs: <a href="https://github.com/cmccandless/license-api/blob/master/README.md" target="_blank" rel="noreferrer">license-api README</a></p></section></main><script>
document.getElementById("load").onclick=async()=>{const id=document.getElementById("lic").value,out=document.getElementById("out");try{const r=await fetch(`https://licenseapi.herokuapp.com/licenses/${id}`);if(!r.ok)throw new Error(`HTTP ${r.status}`);out.textContent=JSON.stringify(await r.json(),null,2)}catch(e){out.textContent=JSON.stringify({id,fallback:true,note:"choosealicense.comで詳細確認",message:e.message},null,2)}};
</script></body></html>
