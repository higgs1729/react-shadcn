<!--
  Purpose: Monster Hunter World database explorer for the WebAPI gallery.
  Structure: monster search filters, live list cards, and sample fallback data.
-->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>モンハンワールド図鑑</title>
<style>
:root{--bg:#09131f;--card:#0d1727cc;--line:#24354b;--text:#e6edf6;--muted:#9eb2c8;--accent:#f97316;--accent2:#22c55e}
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 0 0,rgba(249,115,22,.2),transparent 28%),radial-gradient(circle at 100% 0,rgba(34,197,94,.18),transparent 25%),linear-gradient(135deg,#020617 0%,#09131f 58%,#0f172a 100%);color:var(--text)}main{max-width:1180px;margin:0 auto;padding:32px 20px 48px}.hero,.panel{background:linear-gradient(180deg,rgba(13,23,39,.92),rgba(13,23,39,.82));border:1px solid rgba(158,178,200,.16);box-shadow:0 24px 60px rgba(2,6,23,.36);backdrop-filter:blur(14px);border-radius:24px}.hero{padding:28px}.kicker{display:inline-flex;gap:8px;align-items:center;padding:6px 12px;border-radius:999px;background:rgba(249,115,22,.14);color:#fdba74;font-size:12px;letter-spacing:.08em;text-transform:uppercase}.hero h1{margin:14px 0 10px;font-size:clamp(32px,5vw,54px);line-height:1.05}.hero p{margin:0;max-width:820px;color:var(--muted);line-height:1.8}.hero-foot{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-top:20px}.link{color:#fdba74;text-decoration:none}.chip,.tag{display:inline-flex;align-items:center;gap:6px;padding:9px 12px;border-radius:999px;background:rgba(148,163,184,.12);color:var(--text);border:1px solid rgba(148,163,184,.16)}.panel{margin-top:18px;padding:18px}.controls{display:grid;grid-template-columns:minmax(0,1fr) 180px 180px auto;gap:12px;align-items:end}.field{display:grid;gap:8px}.field label{font-size:12px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}.field input,.field select{width:100%;padding:14px 14px;border-radius:16px;border:1px solid var(--line);background:#08111d;color:var(--text)}button{padding:14px 16px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--accent),#fb923c);color:#111827;font-weight:800;cursor:pointer;box-shadow:0 14px 30px rgba(249,115,22,.2)}.summary{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px;color:var(--muted)}.status{margin-top:16px;padding:14px 16px;border-radius:16px;background:rgba(15,23,42,.76);border:1px solid rgba(158,178,200,.16);color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-top:18px}.card{background:rgba(13,23,39,.82);border:1px solid rgba(158,178,200,.16);border-radius:20px;overflow:hidden;box-shadow:0 18px 40px rgba(2,6,23,.28)}.art{height:148px;background:linear-gradient(135deg,rgba(249,115,22,.28),rgba(34,197,94,.16));display:flex;align-items:flex-end;padding:16px;border-bottom:1px solid rgba(158,178,200,.16)}.meta{padding:16px}.meta h3{margin:0 0 8px;font-size:20px}.meta p{margin:0;color:var(--muted);line-height:1.7;font-size:14px}.meta .row{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.empty{padding:24px;border:1px dashed rgba(158,178,200,.22);border-radius:20px;color:var(--muted);text-align:center}.details{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-top:14px}.stat{padding:12px;border-radius:16px;background:#08111d;border:1px solid rgba(158,178,200,.14)}.stat span{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;letter-spacing:.04em;text-transform:uppercase}.stat strong{font-size:18px}.text-box{margin-top:14px;padding:14px;border-radius:16px;background:rgba(15,23,42,.9);border:1px solid rgba(158,178,200,.14);color:#dce7f2;line-height:1.8}.section-title{display:flex;justify-content:space-between;gap:10px;align-items:center;margin:18px 0 10px}.section-title strong{font-size:16px}.section-title span{color:var(--muted)}.note{margin-top:18px;color:var(--muted);font-size:13px;line-height:1.7}
@media (max-width:980px){.controls{grid-template-columns:1fr 1fr}.controls button{grid-column:1/-1}}@media (max-width:720px){.controls{grid-template-columns:1fr}.hero,.panel{border-radius:20px}}
</style>
</head>
<body>
<main>
  <section class="hero">
    <span class="kicker">data / monster archive</span>
    <h1>モンハンワールド図鑑</h1>
    <p>Monster Hunter World のモンスター一覧を読み込み、名前・種類・生息地・弱点をまとめて検索します。ライブ API が失敗したときは、代表モンスターのサンプルで確認できます。</p>
    <div class="hero-foot"><a class="link" href="https://docs.mhw-db.com/" target="_blank" rel="noreferrer">API ドキュメント</a><span class="tag">無料 / 認証なし</span><span class="tag">monsters ライブ一覧</span></div>
  </section>
  <section class="panel">
    <div class="controls">
      <div class="field"><label for="search">モンスター名</label><input id="search" type="text" value="" placeholder="Rathalos, Vaal Hazak ..."></div>
      <div class="field"><label for="type">type</label><select id="type"><option value="all">all</option><option value="large">large</option><option value="small">small</option></select></div>
      <div class="field"><label for="species">species</label><select id="species"><option value="all">all</option><option value="elder dragon">elder dragon</option><option value="flying wyvern">flying wyvern</option><option value="brute wyvern">brute wyvern</option><option value="herbivore">herbivore</option></select></div>
      <button id="refreshButton">再読み込み</button>
    </div>
    <div class="summary" id="summary"></div>
    <div class="status" id="status">モンスター一覧を取得しています。</div>
    <div class="section-title"><strong>モンスター一覧</strong><span>検索と絞り込みはページ内で即時反映します。</span></div>
    <div class="grid" id="results"></div>
  </section>
  <p class="note">API は monsters を一括取得してから、ページ内で検索・絞り込みしています。取得失敗時はサンプルの大型モンスターを表示します。</p>
</main>
<script>
const SEARCH=document.getElementById("search"),TYPE=document.getElementById("type"),SPECIES=document.getElementById("species"),STATUS=document.getElementById("status"),SUMMARY=document.getElementById("summary"),RESULTS=document.getElementById("results");
const SAMPLE=[{name:"Rathalos",type:"large",species:"flying wyvern",description:"空の王者。火属性を操る代表的な大型モンスター。",locations:[{name:"Ancient Forest"}],weaknesses:[{element:"thunder",stars:2}],elements:["fire"]},{name:"Vaal Hazak",type:"large",species:"elder dragon",description:"瘴気をまとった古龍。状態異常との相性を表示できます。",locations:[{name:"Rotten Vale"}],weaknesses:[{element:"fire",stars:3}],elements:["dragon"]},{name:"Anjanath",type:"large",species:"brute wyvern",description:"強靭な顎と脚力を持つ大型獣竜。",locations:[{name:"Ancient Forest"}],weaknesses:[{element:"ice",stars:3}],elements:["fire"]},{name:"Mernos",type:"small",species:"bird wyvern",description:"小型の鳥竜種。観察対象として扱いやすい。",locations:[{name:"Wildspire Waste"}],weaknesses:[{element:"thunder",stars:1}],elements:[]}];
let monsters=SAMPLE;function setStatus(message){STATUS.textContent=message}function safeText(value){return value?String(value):"-"}function chipList(items,fallback="-"){return(items||[]).length?items.map((item)=>item.name||item.element||item).join(" / "):fallback}function matches(monster){const term=SEARCH.value.trim().toLowerCase();if(term){const haystack=[monster.name,monster.type,monster.species,monster.description,chipList(monster.locations),chipList(monster.weaknesses),chipList(monster.elements)].join(" ").toLowerCase();if(!haystack.includes(term))return false}if(TYPE.value!=="all"&&monster.type!==TYPE.value)return false;if(SPECIES.value!=="all"&&monster.species!==SPECIES.value)return false;return true}
function render(source){const filtered=monsters.filter(matches).slice(0,12);const largeCount=monsters.filter((monster)=>monster.type==="large").length;const smallCount=monsters.filter((monster)=>monster.type==="small").length;SUMMARY.innerHTML=`<span class="chip"><strong>${monsters.length}</strong> 件</span><span class="chip">large ${largeCount}</span><span class="chip">small ${smallCount}</span><span class="chip">ソース: ${source}</span>`;if(!filtered.length){RESULTS.innerHTML='<div class="empty">条件に合うモンスターが見つかりませんでした。</div>';return}RESULTS.innerHTML=filtered.map((monster)=>`<article class="card"><div class="art"><strong>${safeText(monster.name)}</strong></div><div class="meta"><h3>${safeText(monster.name)}</h3><p>${safeText(monster.description)}</p><div class="details"><div class="stat"><span>type</span><strong>${safeText(monster.type)}</strong></div><div class="stat"><span>species</span><strong>${safeText(monster.species)}</strong></div><div class="stat"><span>locations</span><strong>${chipList(monster.locations)}</strong></div><div class="stat"><span>weakness</span><strong>${chipList(monster.weaknesses,"-")}</strong></div></div><div class="row" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:12px"><span class="chip">${chipList(monster.elements,"no elements")}</span></div></div></article>`).join("")}
async function loadMonsters(){setStatus("モンスター一覧を取得中です...");try{const response=await fetch("https://mhw-db.com/monsters");if(!response.ok)throw new Error(`HTTP ${response.status}`);const data=await response.json();if(!Array.isArray(data)||!data.length)throw new Error("モンスターが見つかりませんでした");monsters=data;setStatus(`ライブ API から ${data.length} 件取得しました。`);render("ライブ API")}catch(error){monsters=SAMPLE;setStatus(`ライブ API に失敗したためサンプルを表示しています。(${error.message})`);render(`サンプル / ${error.message}`)}}
document.getElementById("refreshButton").addEventListener("click",loadMonsters);SEARCH.addEventListener("input",()=>render("ライブ / フィルタ"));TYPE.addEventListener("change",()=>render("ライブ / フィルタ"));SPECIES.addEventListener("change",()=>render("ライブ / フィルタ"));loadMonsters();
</script></body></html>
