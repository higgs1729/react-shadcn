<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ランダムユーザー生成器</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 30px;
            width: 350px;
            text-align: center;
            transition: transform 0.2s;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #3b82f6;
            object-fit: cover;
            margin-bottom: 15px;
        }
        .name {
            font-size: 24px;
            font-weight: bold;
            color: #1f2937;
            margin: 10px 0 5px 0;
        }
        .info {
            font-size: 14px;
            color: #6b7280;
            margin: 5px 0;
            word-break: break-all;
        }
        .badge {
            display: inline-block;
            background-color: #e5e7eb;
            color: #374151;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            margin-top: 10px;
            font-weight: 600;
        }
        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 25px;
            width: 100%;
            font-weight: bold;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #2563eb;
        }
        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="card">
        <img id="avatar" class="avatar" src="https://via.placeholder.com/120" alt="プロフィール写真">
        <div id="name" class="name">ユーザー名</div>
        <div id="nat" class="badge">国籍</div>
        <div id="email" class="info" style="margin-top: 15px;">example@email.com</div>
        <div id="phone" class="info">000-0000-0000</div>

        <button id="btn">別のユーザーを読み込む</button>
    </div>

    <script>
        // HTML要素を取得
        const avatarImg = document.getElementById('avatar');
        const nameDiv = document.getElementById('name');
        const natSpan = document.getElementById('nat');
        const emailDiv = document.getElementById('email');
        const phoneDiv = document.getElementById('phone');
        const btn = document.getElementById('btn');

        // APIからデータを取得する関数
        async function fetchUser() {
            try {
                // ボタンを一時的に無効化（連打対策）
                btn.textContent = '読み込み中...';
                btn.disabled = true;

                // APIを叩く
                const response = await fetch('https://randomuser.me/api/');
                const data = await response.json();
                
                // 取得したデータから最初の1人を取り出す
                const user = data.results[0];

                // HTMLの表示を更新
                avatarImg.src = user.picture.large;
                nameDiv.textContent = `${user.name.first} ${user.name.last}`;
                natSpan.textContent = `📍 ${user.nat}`;
                emailDiv.textContent = `✉️ ${user.email}`;
                phoneDiv.textContent = `📞 ${user.phone}`;

            } catch (error) {
                console.error('データの取得に失敗しました:', error);
                nameDiv.textContent = 'エラーが発生しました';
            } finally {
                // ボタンを元に戻す
                btn.textContent = '別のユーザーを読み込む';
                btn.disabled = false;
            }
        }

        // ページが読み込まれた時に最初の1人を表示
        window.addEventListener('DOMContentLoaded', fetchUser);

        // ボタンがクリックされた時に新しいユーザーを表示
        btn.addEventListener('click', fetchUser);
    </script>
</body>
</html>
