<!DOCTYPE html>
<!-- npm Registry紹介ページ: npmパッケージ情報を取得する。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>npm Registry Package Lookup</title><style>body{margin:0;min-height:100vh;font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;background:#f6f7fb;color:#202536}main{width:min(980px,100%);margin:auto;padding:32px 18px}form{display:flex;gap:10px;background:#fff;border:1px solid #dde5ef;border-radius:14px;padding:16px}input,button{font:inherit;border-radius:10px;padding:11px 12px}input{flex:1;border:1px solid #dde5ef}button{border:0;background:#cb3837;color:#fff;font-weight:700}pre{padding:14px;border-radius:12px;background:#172033;color:#dbe8ff;white-space:pre-wrap;min-height:320px}p{color:#667086;line-height:1.7}a{color:#cb3837}@media(max-width:720px){form{display:grid}}</style></head><body><main><h1>npm Registry Package Lookup</h1><p>npm Registry APIからパッケージ名・バージョン・説明を取得します。</p><form id="form"><input id="pkg" value="vite"><button>取得</button></form><pre id="out">未取得です。</pre><p>Docs: <a href="https://github.com/npm/registry/blob/master/docs/REGISTRY-API.md" target="_blank" rel="noreferrer">npm Registry API</a></p></main><script>document.getElementById("form").onsubmit=async e=>{e.preventDefault();const p=document.getElementById("pkg").value,out=document.getElementById("out");try{const r=await fetch(`https://registry.npmjs.org/${encodeURIComponent(p)}`);if(!r.ok)throw new Error(`HTTP ${r.status}`);const d=await r.json();out.textContent=JSON.stringify({name:d.name,description:d.description,latest:d["dist-tags"]?.latest,homepage:d.homepage},null,2)}catch(err){out.textContent=JSON.stringify({fallback:true,package:p,message:err.message},null,2)}};</script></body></html>
