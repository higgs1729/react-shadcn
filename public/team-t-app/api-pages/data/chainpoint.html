<!DOCTYPE html>
<!--
  Chainpoint Proof Guide
  目的: Chainpoint のタイムスタンプ証明API/ツールを紹介し、証明フローを体験できるようにする。
  構成: ハッシュ入力 / デモ証明生成 / 用語カード / 公式リンク。
-->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chainpoint Proof Guide</title>
  <style>
    :root{--bg:#fbfaf7;--ink:#22252b;--muted:#6b7280;--panel:#fff;--line:#e5e0d8;--accent:#0f766e;--accent2:#b45309}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"Segoe UI",Meiryo,sans-serif;color:var(--ink);background:linear-gradient(135deg,#fffaf0,#eefdf8)}
    main{width:min(1080px,calc(100% - 28px));margin:auto;padding:28px 0 42px}.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:22px;box-shadow:0 14px 34px rgba(65,48,26,.08)}.layout{display:grid;grid-template-columns:1fr 1fr;gap:16px}.tag{font-size:12px;letter-spacing:.08em;color:var(--accent);font-weight:700;text-transform:uppercase}h1{font-size:clamp(28px,4vw,44px);margin:12px 0 10px;line-height:1.1}.lead{color:var(--muted);line-height:1.8;margin:0}.form{display:grid;gap:10px;margin-top:16px}input,button{min-height:44px;border-radius:8px;font:inherit}input{border:1px solid var(--line);padding:0 12px}button{border:0;background:var(--accent);color:#fff;font-weight:700;cursor:pointer}.result{border:1px solid var(--line);background:#fbfdfc;border-radius:8px;padding:14px;margin-top:14px;word-break:break-all}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.card{border:1px solid var(--line);border-radius:8px;padding:14px;background:#fff}.card small{display:block;color:var(--accent2);font-weight:700;margin-bottom:6px}.card p{margin:0;color:var(--muted);line-height:1.65}.link{display:inline-flex;margin-top:14px;color:var(--accent);font-weight:700;text-decoration:none}@media(max-width:820px){.layout,.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="layout">
    <section class="panel">
      <div class="tag">chainpoint</div>
      <h1>データのハッシュをブロックチェーン証明として考える</h1>
      <p class="lead">Chainpoint は、データそのものではなくハッシュ値を使ってタイムスタンプ証明を作るオープン標準です。現在のブラウザデモでは、API接続の代わりに証明JSONの形を生成して流れを確認します。</p>
      <div class="form">
        <input id="hashInput" value="2cf24dba5fb0a30e26e83b2ac5b9e29e1b161e5c1fa7425e73043362938b9824" aria-label="SHA-256 hash">
        <button id="makeBtn" type="button">証明サンプルを生成</button>
      </div>
      <pre id="result" class="result"></pre>
      <a class="link" href="https://tierion.com/chainpoint/" target="_blank" rel="noreferrer">公式ページを開く</a>
    </section>
    <section class="panel">
      <div class="grid" id="cards"></div>
    </section>
  </main>
  <script>
    const steps = [
      ["Hash", "元データからSHA-256などのハッシュを作り、原文を外へ出さずに証明対象を表します。"],
      ["Anchor", "複数のハッシュをまとめ、Bitcoinなどのブロックチェーンへアンカーします。"],
      ["Proof", "後から検証できるように、Merkle pathやアンカー情報を証明として保存します。"],
      ["Verify", "同じハッシュと証明を使い、改ざんされていないことを検証します。"]
    ];
    document.getElementById("cards").innerHTML = steps.map(([title, text])=>`<article class="card"><small>${title}</small><p>${text}</p></article>`).join("");
    function makeProof(){
      const hash = document.getElementById("hashInput").value.trim();
      const proof = { "@context":"https://w3id.org/chainpoint/v3", type:"Chainpoint", hash, hash_id:`demo-${Date.now()}`, anchors:[{type:"BTCOpReturn", sourceId:"sample-block-tx"}], note:"ブラウザ用の紹介サンプルです。実運用では公式Gateway APIまたはツールで作成します。" };
      document.getElementById("result").textContent = JSON.stringify(proof, null, 2);
    }
    document.getElementById("makeBtn").addEventListener("click", makeProof);
    makeProof();
  </script>
</body>
</html>
