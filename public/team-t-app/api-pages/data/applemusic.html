<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Search</title>

<style>
    body {
        margin: 0;
        font-family: "Arial", sans-serif;
        background: linear-gradient(135deg, #89f7fe, #66a6ff);
        color: #333;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    h1 {
        margin-top: 40px;
        color: white;
        text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .search-box {
        margin-top: 20px;
        display: flex;
        gap: 10px;
        background: white;
        padding: 10px;
        border-radius: 50px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    input {
        border: none;
        outline: none;
        padding: 10px 15px;
        font-size: 16px;
        width: 250px;
        border-radius: 50px;
    }

    button {
        border: none;
        background: #4facfe;
        color: white;
        padding: 10px 20px;
        border-radius: 50px;
        cursor: pointer;
        transition: 0.3s;
        font-weight: bold;
    }

    button:hover {
        background: #00c6ff;
        transform: scale(1.05);
    }

    #results {
        margin-top: 30px;
        width: 90%;
        max-width: 800px;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 15px;
    }

    .card {
        background: white;
        border-radius: 15px;
        padding: 15px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        text-align: center;
        transition: 0.3s;
    }

    .card:hover {
        transform: translateY(-5px);
    }

    .card img {
        border-radius: 10px;
        width: 100px;
        height: 100px;
    }

    .card h3 {
        font-size: 16px;
        margin: 10px 0 5px;
    }

    .card p {
        font-size: 13px;
        color: #666;
    }

    audio {
        width: 100%;
        margin-top: 8px;
    }
</style>
</head>

<body>

<h1>🎵 Music Search</h1>

<div class="search-box">
    <input type="text" id="keyword" placeholder="曲名を入力">
    <button onclick="searchMusic()">検索</button>
</div>

<div id="results"></div>

<script>
async function searchMusic() {

    const keyword =
        document.getElementById("keyword").value;

    const response = await fetch(
        `https://itunes.apple.com/search?term=${encodeURIComponent(keyword)}&entity=song&limit=10`
    );

    const data = await response.json();

    const results =
        document.getElementById("results");

    results.innerHTML = "";

    data.results.forEach(song => {
        results.innerHTML += `
            <div class="card">
                <img src="${song.artworkUrl100}">
                <h3>${song.trackName}</h3>
                <p>${song.artistName}</p>
                <audio controls src="${song.previewUrl}"></audio>
            </div>
        `;
    });
}
</script>

</body>
</html>
