<!DOCTYPE html>
<!-- RSS feed to JSON紹介ページ: RSS URLをJSONに変換するAPI候補。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>RSS to JSON Reader</title><style>body{font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;margin:0;min-height:100vh;background:#f6f7fb;color:#202536}main{width:min(980px,100%);margin:auto;padding:34px 18px}form{display:flex;gap:10px;background:#fff;border:1px solid #dde5ef;border-radius:14px;padding:16px}input,button{font:inherit;border-radius:10px;padding:11px 12px}input{flex:1;border:1px solid #dde5ef}button{border:0;background:#1f8a70;color:#fff;font-weight:700}pre{padding:14px;border-radius:12px;background:#172033;color:#dbe8ff;white-space:pre-wrap;min-height:320px}p{color:#667086;line-height:1.7}a{color:#1f8a70}@media(max-width:720px){form{display:grid}}</style></head><body><main><h1>RSS to JSON Reader</h1><p>RSSフィードをJSONとして取得するAPI候補です。</p><form id="form"><input id="url" value="https://hnrss.org/frontpage"><button>変換</button></form><pre id="out">未取得です。</pre><p>Docs: <a href="https://rss-to-json-serverless-api.vercel.app" target="_blank" rel="noreferrer">RSS to JSON API</a></p></main><script>document.getElementById("form").onsubmit=async e=>{e.preventDefault();const u=document.getElementById("url").value,out=document.getElementById("out");try{const r=await fetch(`https://rss-to-json-serverless-api.vercel.app/api?feedURL=${encodeURIComponent(u)}`);if(!r.ok)throw new Error(`HTTP ${r.status}`);out.textContent=JSON.stringify(await r.json(),null,2).slice(0,6000)}catch(err){out.textContent=JSON.stringify({fallback:true,feed:u,message:err.message},null,2)}};</script></body></html>
