<!DOCTYPE html>
<!-- IPinfo紹介ページ: IP詳細情報API。無料利用は制限があるためフォールバック込み。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>IPinfo Lite</title><style>
body{margin:0;min-height:100vh;font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;background:linear-gradient(135deg,#f6f7fb,#eef8f4);color:#202536}main{width:min(900px,100%);margin:auto;padding:34px 18px}h1{font-size:clamp(24px,4vw,38px);letter-spacing:0}.panel{background:#fff;border:1px solid #dde5ef;border-radius:15px;padding:18px}button{border:0;border-radius:10px;padding:12px 16px;background:#1f8a70;color:#fff;font:inherit;font-weight:700}pre{padding:14px;border-radius:12px;background:#172033;color:#dbe8ff;white-space:pre-wrap;min-height:260px}p{color:#667086;line-height:1.7}a{color:#1f8a70}</style></head><body><main><h1>IPinfo Lite</h1><p>IPの地域・組織などを返すAPIです。トークンが必要な場合があるため、安全なフォールバックを用意しています。</p><section class="panel"><button id="load">IPinfoを取得</button><pre id="out">未取得です。</pre><p>Docs: <a href="https://ipinfo.io/developers" target="_blank" rel="noreferrer">IPinfo developers</a></p></section></main><script>
document.getElementById("load").onclick=async()=>{const out=document.getElementById("out");try{const r=await fetch("https://ipinfo.io/json");if(!r.ok)throw new Error(`HTTP ${r.status}`);out.textContent=JSON.stringify(await r.json(),null,2)}catch(e){out.textContent=JSON.stringify({fallback:true,note:"IPinfoはトークンやCORS制限がある場合があります",message:e.message},null,2)}};
</script></body></html>
