<!--
  Purpose: MMO games directory for the WebAPI gallery.
  Structure: endpoint switcher, filters, live result cards, and fallback states.
-->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MMOゲーム一覧</title>
<style>
:root{--bg:#08101d;--card:#101a2fcc;--line:#25344a;--text:#e3ecf7;--muted:#9db0c7;--accent:#7c3aed;--accent2:#22c55e}
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 0 0,rgba(124,58,237,.22),transparent 30%),radial-gradient(circle at 100% 0,rgba(34,197,94,.18),transparent 25%),linear-gradient(135deg,#020617 0%,#08101d 58%,#111827 100%);color:var(--text)}main{max-width:1180px;margin:0 auto;padding:32px 20px 48px}.hero,.panel{background:linear-gradient(180deg,rgba(16,26,47,.92),rgba(16,26,47,.82));border:1px solid rgba(157,176,199,.16);box-shadow:0 24px 60px rgba(2,6,23,.36);backdrop-filter:blur(14px);border-radius:24px}.hero{padding:28px}.kicker{display:inline-flex;gap:8px;align-items:center;padding:6px 12px;border-radius:999px;background:rgba(124,58,237,.16);color:#c4b5fd;font-size:12px;letter-spacing:.08em;text-transform:uppercase}.hero h1{margin:14px 0 10px;font-size:clamp(32px,5vw,54px);line-height:1.05}.hero p{margin:0;max-width:800px;color:var(--muted);line-height:1.8}.hero-foot{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-top:20px}.link{color:#c4b5fd;text-decoration:none}.chip,.tag{display:inline-flex;align-items:center;gap:6px;padding:9px 12px;border-radius:999px;background:rgba(148,163,184,.12);color:var(--text);border:1px solid rgba(148,163,184,.16)}.panel{margin-top:18px;padding:18px}.controls{display:grid;grid-template-columns:180px 180px minmax(0,1fr) 180px auto;gap:12px;align-items:end}.field{display:grid;gap:8px}.field label{font-size:12px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}.field input,.field select{width:100%;padding:14px 14px;border-radius:16px;border:1px solid var(--line);background:#09111e;color:var(--text)}button{padding:14px 16px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--accent),#8b5cf6);color:white;font-weight:800;cursor:pointer;box-shadow:0 14px 30px rgba(124,58,237,.22)}.summary{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px;color:var(--muted)}.status{margin-top:16px;padding:14px 16px;border-radius:16px;background:rgba(15,23,42,.76);border:1px solid rgba(157,176,199,.16);color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-top:18px}.card{background:rgba(16,26,47,.8);border:1px solid rgba(157,176,199,.16);border-radius:20px;overflow:hidden;box-shadow:0 18px 40px rgba(2,6,23,.26)}.thumb{height:150px;background:linear-gradient(135deg,rgba(124,58,237,.26),rgba(34,197,94,.18));display:flex;align-items:flex-end;padding:16px;border-bottom:1px solid rgba(157,176,199,.16)}.thumb img{width:100%;height:100%;object-fit:cover;border-radius:14px;background:#09111e}.meta{padding:16px}.meta h3{margin:0 0 8px;font-size:20px}.meta p{margin:0;color:var(--muted);line-height:1.7;font-size:14px}.meta .row{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.empty{padding:24px;border:1px dashed rgba(157,176,199,.22);border-radius:20px;color:var(--muted);text-align:center}.section-title{display:flex;justify-content:space-between;gap:10px;align-items:center;margin:18px 0 10px}.section-title strong{font-size:16px}.section-title span{color:var(--muted)}.note{margin-top:18px;color:var(--muted);font-size:13px;line-height:1.7}
@media (max-width:1040px){.controls{grid-template-columns:repeat(2,minmax(0,1fr));}.controls .field:last-of-type{grid-column:1/-1}}@media (max-width:720px){.controls{grid-template-columns:1fr}.hero,.panel{border-radius:20px}}
</style>
</head>
<body>
<main>
  <section class="hero">
    <span class="kicker">data / game portal</span>
    <h1>MMOゲーム一覧</h1>
    <p>MMOBomb の無料 MMO Games API から、ゲーム一覧・最新ニュース・配布情報を切り替えて表示します。プラットフォーム・カテゴリ・並び順の絞り込みにも対応します。</p>
    <div class="hero-foot"><a class="link" href="https://www.mmobomb.com/api" target="_blank" rel="noreferrer">API ドキュメント</a><span class="tag">無料 / 認証なし</span><span class="tag">games / news / giveaways</span></div>
  </section>
  <section class="panel">
    <div class="controls">
      <div class="field"><label for="mode">表示内容</label><select id="mode"><option value="games">ゲーム一覧</option><option value="news">最新ニュース</option><option value="giveaways">配布情報</option></select></div>
      <div class="field"><label for="platform">platform</label><select id="platform"><option value="all">all</option><option value="browser">browser</option><option value="windows">windows</option><option value="android">android</option></select></div>
      <div class="field"><label for="category">category / tag</label><input id="category" type="text" value="mmorpg" placeholder="mmorpg, shooter, pvp ..."></div>
      <div class="field"><label for="sort">sort-by</label><select id="sort"><option value="relevance">relevance</option><option value="alphabetical">alphabetical</option><option value="popularity">popularity</option><option value="release-date">release-date</option></select></div>
      <button id="loadButton">読み込む</button>
    </div>
    <div class="summary" id="summary"></div>
    <div class="status" id="status">MMO データを取得しています。</div>
    <div class="section-title"><strong id="sectionTitle">ゲーム一覧</strong><span id="sectionHint">ライブ API の結果を表示します。</span></div>
    <div class="grid" id="results"></div>
  </section>
  <p class="note">ゲーム一覧は platform / category / sort-by を組み合わせて取得します。ニュースと配布情報は単独エンドポイントを読み込みます。</p>
</main>
<script>
const MODE=document.getElementById("mode"),PLATFORM=document.getElementById("platform"),CATEGORY=document.getElementById("category"),SORT=document.getElementById("sort"),STATUS=document.getElementById("status"),SUMMARY=document.getElementById("summary"),RESULTS=document.getElementById("results"),SECTION_TITLE=document.getElementById("sectionTitle"),SECTION_HINT=document.getElementById("sectionHint");
const FALLBACK={games:[{title:"Sample MMO",genre:"MMORPG",platform:"windows",short_description:"サンプルの MMO ゲーム。",game_url:"https://www.mmobomb.com/",thumbnail:""},{title:"Arena Light",genre:"Action RPG",platform:"browser",short_description:"ライブ API が失敗したときの代替表示。",game_url:"https://www.mmobomb.com/",thumbnail:""}],news:[{title:"Sample News",short_description:"MMOBomb ニュースのサンプル。",article_url:"https://www.mmobomb.com/",thumbnail:""}],giveaways:[{title:"Sample Giveaway",description:"配布情報のサンプル。",open_giveaway_url:"https://www.mmobomb.com/",thumbnail:""}]};
function setStatus(message){STATUS.textContent=message}function safeText(value){return value?String(value):"-"}function normalize(payload,mode){if(Array.isArray(payload))return payload;if(Array.isArray(payload?.data))return payload.data;if(Array.isArray(payload?.games)&&mode==="games")return payload.games;if(Array.isArray(payload?.news)&&mode==="news")return payload.news;if(Array.isArray(payload?.giveaways)&&mode==="giveaways")return payload.giveaways;return[]}function renderItems(mode,items,source){SUMMARY.innerHTML=`<span class="chip"><strong>${items.length}</strong> 件</span><span class="chip">ソース: ${source}</span><span class="chip">mode: ${mode}</span>`;if(!items.length){RESULTS.innerHTML='<div class="empty">表示できるデータがありませんでした。</div>';return}RESULTS.innerHTML=items.slice(0,12).map((item)=>{if(mode==="news")return`<article class="card"><div class="thumb">${item.thumbnail?`<img src="${item.thumbnail}" alt="${safeText(item.title)}">`:`<strong>${safeText(item.title)}</strong>`}</div><div class="meta"><h3>${safeText(item.title)}</h3><p>${safeText(item.short_description||item.description)}</p><div class="row"><a class="link" href="${item.article_url||item.url||item.news_url||"https://www.mmobomb.com/"}" target="_blank" rel="noreferrer">記事を開く</a></div></div></article>`;if(mode==="giveaways")return`<article class="card"><div class="thumb">${item.thumbnail?`<img src="${item.thumbnail}" alt="${safeText(item.title)}">`:`<strong>${safeText(item.title)}</strong>`}</div><div class="meta"><h3>${safeText(item.title)}</h3><p>${safeText(item.description||item.short_description)}</p><div class="row"><span class="chip">${safeText(item.platforms?item.platforms.join(" / "):item.platform)}</span><a class="link" href="${item.open_giveaway_url||item.url||"https://www.mmobomb.com/"}" target="_blank" rel="noreferrer">配布ページ</a></div></div></article>`;return`<article class="card"><div class="thumb">${item.thumbnail?`<img src="${item.thumbnail}" alt="${safeText(item.title)}">`:`<strong>${safeText(item.title)}</strong>`}</div><div class="meta"><h3>${safeText(item.title)}</h3><p>${safeText(item.short_description)}</p><div class="row"><span class="chip">${safeText(item.genre)}</span><span class="chip">${safeText(item.platform)}</span><a class="link" href="${item.game_url||item.url||"https://www.mmobomb.com/"}" target="_blank" rel="noreferrer">ゲーム詳細</a></div></div></article>`}).join("")}
async function loadContent(){const mode=MODE.value,platform=PLATFORM.value,category=CATEGORY.value.trim(),sort=SORT.value;SECTION_TITLE.textContent=mode==="games"?"ゲーム一覧":mode==="news"?"最新ニュース":"配布情報";SECTION_HINT.textContent=mode==="games"?"プラットフォームとカテゴリで絞り込めます。":"単独エンドポイントから最新データを取得します。";setStatus("MMO データを取得中です...");try{const url=mode==="games"?`https://www.mmobomb.com/api1/games?platform=${encodeURIComponent(platform)}${category?`&category=${encodeURIComponent(category)}`:""}&sort-by=${encodeURIComponent(sort)}`:mode==="news"?"https://www.mmobomb.com/api1/latestnews":"https://www.mmobomb.com/api1/giveaways";const response=await fetch(url);if(!response.ok)throw new Error(`HTTP ${response.status}`);const payload=await response.json();const items=normalize(payload,mode);if(!items.length)throw new Error("データが見つかりませんでした");renderItems(mode,items,"ライブ API");setStatus(`ライブ API から ${items.length} 件取得しました。`)}catch(error){renderItems(mode,FALLBACK[mode],`サンプル / ${error.message}`);setStatus(`ライブ API に失敗したためサンプルを表示しています。(${error.message})`)}}
document.getElementById("loadButton").addEventListener("click",loadContent);MODE.addEventListener("change",loadContent);PLATFORM.addEventListener("change",()=>{if(MODE.value==="games")loadContent()});SORT.addEventListener("change",()=>{if(MODE.value==="games")loadContent()});CATEGORY.addEventListener("keydown",(event)=>{if(event.key==="Enter")loadContent()});loadContent();
</script></body></html>
