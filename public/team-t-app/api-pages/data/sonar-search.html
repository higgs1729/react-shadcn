<!DOCTYPE html>
<!-- SonarSearch紹介ページ: Project Sonar DNS列挙API候補。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Sonar DNS Search</title><style>body{font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;margin:0;min-height:100vh;background:#f6f7fb;color:#202536}main{width:min(900px,100%);margin:auto;padding:34px 18px}.panel{background:#fff;border:1px solid #dde5ef;border-radius:15px;padding:18px}input,button{width:100%;font:inherit;border-radius:10px;padding:11px 12px;margin-top:10px}input{border:1px solid #dde5ef}button{border:0;background:#2f6ef0;color:#fff;font-weight:700}pre{padding:14px;border-radius:12px;background:#172033;color:#dbe8ff;white-space:pre-wrap}p{color:#667086;line-height:1.7}a{color:#2f6ef0}</style></head><body><main><h1>Sonar DNS Search</h1><p>Project SonarのDNS列挙API候補です。ドメイン検索リクエスト例を確認します。</p><section class="panel"><input id="domain" value="example.com"><button id="show">検索例</button><pre id="out"></pre><p>Docs: <a href="https://github.com/Cgboal/SonarSearch" target="_blank" rel="noreferrer">SonarSearch GitHub</a></p></section></main><script>document.getElementById("show").onclick=()=>{const d=document.getElementById("domain").value;document.getElementById("out").textContent=JSON.stringify({endpoint:`https://sonar.omnisint.io/subdomains/${d}`,purpose:"DNS enumeration",warning:"対象ドメインの利用規約を確認"},null,2)};</script></body></html>
