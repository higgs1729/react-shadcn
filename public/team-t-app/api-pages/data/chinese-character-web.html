<!DOCTYPE html>
<!-- Chinese Character Web紹介ページ: 漢字の定義・発音API候補。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Chinese Character Lookup</title><style>body{font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;margin:0;min-height:100vh;background:#f6f7fb;color:#202536}main{width:min(900px,100%);margin:auto;padding:34px 18px}.panel{background:#fff;border:1px solid #dde5ef;border-radius:15px;padding:18px}input,button{width:100%;font:inherit;border-radius:10px;padding:11px 12px;margin-top:10px}input{border:1px solid #dde5ef}button{border:0;background:#c96a39;color:#fff;font-weight:700}pre{padding:14px;border-radius:12px;background:#172033;color:#dbe8ff;white-space:pre-wrap}p{color:#667086;line-height:1.7}a{color:#c96a39}</style></head><body><main><h1>Chinese Character Lookup</h1><p>漢字の定義・発音を調べるAPI候補です。HTTPのみのため、リクエスト例とフォールバック表示にしています。</p><section class="panel"><input id="char" value="明"><button id="show">検索例</button><pre id="out"></pre><p>Docs: <a href="http://ccdb.hemiola.com/" target="_blank" rel="noreferrer">ccdb.hemiola.com</a></p></section></main><script>document.getElementById("show").onclick=()=>{const c=document.getElementById("char").value;document.getElementById("out").textContent=JSON.stringify({character:c,endpoint:`http://ccdb.hemiola.com/characters/string/${encodeURIComponent(c)}`,note:"HTTPのみのためHTTPSページでは直接取得できない場合があります"},null,2)};</script></body></html>
