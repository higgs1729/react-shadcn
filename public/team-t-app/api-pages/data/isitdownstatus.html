<!DOCTYPE html>
<!-- isitdownstatus紹介ページ: Webサービス稼働確認候補。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>isitdownstatus Checker</title><style>
body{margin:0;min-height:100vh;font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;background:linear-gradient(135deg,#f6f7fb,#fff0f0);color:#202536}main{width:min(900px,100%);margin:auto;padding:34px 18px}h1{font-size:clamp(24px,4vw,38px);letter-spacing:0}.panel{background:#fff;border:1px solid #dde5ef;border-radius:15px;padding:18px}input,button{width:100%;font:inherit;border-radius:10px;padding:11px 12px;margin-top:10px}input{border:1px solid #dde5ef}button{border:0;background:#d64545;color:#fff;font-weight:700}.box{margin-top:16px;padding:16px;border-radius:12px;background:#fff0f0;color:#667086;line-height:1.7}a{color:#d64545}</style></head><body><main><h1>isitdownstatus Checker</h1><p>Webサイトやサービスのダウン状態を確認するAPI候補です。</p><section class="panel"><input id="service" value="github.com"><button id="check">確認</button><div class="box" id="out">未確認です。</div><p>Docs: <a href="https://isitdownstatus.com" target="_blank" rel="noreferrer">isitdownstatus.com</a></p></section></main><script>
document.getElementById("check").onclick=async()=>{const s=document.getElementById("service").value,out=document.getElementById("out");try{const r=await fetch(`https://isitdownstatus.com/api/check?url=${encodeURIComponent(s)}`);if(!r.ok)throw new Error(`HTTP ${r.status}`);out.textContent=await r.text()}catch(e){out.innerHTML=`API取得不可。<br>確認対象: ${s}<br>理由: ${e.message}`}}
</script></body></html>
