<!DOCTYPE html>
<!--
  TensorFeed API
  目的: AIニュース、モデル情報、サービスステータスを返す無料JSON APIを確認する。
  構成: 概要、エンドポイント選択、結果カード、失敗時サンプル。
-->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TensorFeed API</title>
  <style>
    :root{--bg:#f5f7fb;--card:#fff;--ink:#172033;--muted:#64748b;--line:#d8e0ec;--accent:#dc2626;--accent2:#2563eb}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"Yu Gothic","Meiryo",sans-serif;color:var(--ink);background:linear-gradient(180deg,#fbfdff,var(--bg))}main{width:min(1100px,calc(100% - 28px));margin:auto;padding:28px 0}.hero{display:grid;grid-template-columns:1.2fr .8fr;gap:16px;margin-bottom:16px}.panel{background:var(--card);border:1px solid var(--line);border-radius:8px;box-shadow:0 14px 30px rgba(15,23,42,.08)}.intro{padding:24px;border-top:5px solid var(--accent)}h1{margin:4px 0 10px;font-size:clamp(28px,4vw,40px);letter-spacing:0}.eyebrow{margin:0;color:var(--accent);font-weight:700}.meta{display:grid;gap:10px;padding:16px}.meta div{padding:12px;border:1px solid var(--line);border-radius:8px;background:#fbfdff}.meta strong{display:block;color:var(--muted);font-size:12px}.meta a{color:var(--accent);overflow-wrap:anywhere}.controls{padding:18px;margin-bottom:16px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}label span{display:block;margin-bottom:6px;font-weight:700}input,select{width:100%;height:42px;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font:inherit}.actions{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:14px}button{min-height:42px;border:0;border-radius:8px;padding:0 18px;background:var(--accent);color:#fff;font-weight:700;cursor:pointer}.secondary{background:#e2e8f0;color:#172033}.status{color:var(--muted)}.url{margin-top:12px;padding:12px;border-radius:8px;background:#111827;color:#d1fae5;font-family:Consolas,monospace;overflow-wrap:anywhere}.results{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:14px}.item{padding:16px;border-top:4px solid var(--accent2)}.item h2{margin:0 0 8px;font-size:19px}.item p{margin:0;color:var(--muted);line-height:1.7}.item pre{max-height:160px;overflow:auto;background:#f1f5f9;border-radius:8px;padding:10px;font-size:12px;white-space:pre-wrap}@media(max-width:760px){.hero,.grid{grid-template-columns:1fr}main{width:min(100% - 22px,1100px)}}
  </style>
</head>
<body>
<main>
  <section class="hero">
    <div class="panel intro"><p class="eyebrow">Machine Learning / AI Feeds</p><h1>TensorFeed API</h1><p>AIニュース、AIサービス稼働状況、モデル価格などを返す無料・認証不要のJSON APIを確認します。</p></div>
    <aside class="panel meta"><div><strong>公式URL</strong><a href="https://tensorfeed.ai/developers" target="_blank" rel="noreferrer">https://tensorfeed.ai/developers</a></div><div><strong>Base URL</strong>https://tensorfeed.ai</div></aside>
  </section>
  <section class="panel controls">
    <div class="grid"><label><span>エンドポイント</span><select id="path"><option value="/api/news?limit=6">AIニュース</option><option value="/api/status">サービス状況</option><option value="/api/models">モデル情報</option><option value="/api/meta">API一覧</option></select></label><label><span>Base URL</span><input id="base" value="https://tensorfeed.ai"></label></div>
    <div class="actions"><button id="loadBtn">取得する</button><button id="sampleBtn" class="secondary">サンプル表示</button><span id="status" class="status"></span></div>
    <div id="requestUrl" class="url"></div>
  </section>
  <section id="results" class="results" aria-live="polite"></section>
</main>
<script>
const sample=[{title:"AI news articles",source:"TensorFeed",category:"AI",url:"https://tensorfeed.ai/developers"},{title:"Provider status summary",source:"TensorFeed",category:"Status",url:"https://tensorfeed.ai/developers"}];
const $=id=>document.getElementById(id);function esc(v){return String(v||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function normalize(data){if(Array.isArray(data?.articles))return data.articles;if(Array.isArray(data?.services))return data.services.map(s=>({title:s.name,source:s.provider,category:s.status,url:""}));if(Array.isArray(data?.endpoints))return data.endpoints.map(e=>({title:e.path,source:e.method,category:e.description,url:""}));if(data?.providers)return data.providers.map(p=>({title:p.name,source:"models",category:(p.models||[]).length+" models",url:""}));return sample}
function render(list,msg){$("status").textContent=msg;$("results").innerHTML=list.slice(0,24).map(x=>`<article class="panel item"><h2>${esc(x.title||x.name)}</h2><p>${esc([x.source,x.category].filter(Boolean).join(" / "))}</p><p>${x.url?`<a href="${esc(x.url)}" target="_blank" rel="noreferrer">リンク</a>`:""}</p><pre>${esc(JSON.stringify(x,null,2))}</pre></article>`).join("")}
async function loadData(){const url=$("base").value.replace(/\/$/,"")+$("path").value;$("requestUrl").textContent=url;$("status").textContent="取得中...";try{const r=await fetch(url);if(!r.ok)throw new Error("HTTP "+r.status);render(normalize(await r.json()),"取得しました");}catch(e){render(sample,"取得できないためサンプルを表示しています: "+e.message)}}
$("loadBtn").addEventListener("click",loadData);$("sampleBtn").addEventListener("click",()=>render(sample,"サンプル表示"));render(sample,"サンプル表示");$("requestUrl").textContent=$("base").value+$("path").value;
</script>
</body>
</html>
