<!DOCTYPE html>
<!--
  24 Pull Requests API紹介ページ
  目的: OSS貢献促進サービスの公開JSON APIからプロジェクトやPR統計を取得する。
  構成: エンドポイント選択 / fetch / カード一覧 / APIメモ。
-->
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>24 Pull Requests Explorer</title>
  <style>
    :root { --bg:#f3f6fb; --panel:#fff; --ink:#1f2633; --muted:#667286; --line:#dde5f0; --accent:#2f6ef0; --soft:#eaf1ff; --danger:#c43d3d; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:"BIZ UDPGothic","Meiryo UI",sans-serif; background:linear-gradient(145deg,#f3f6fb,#eef8f0); color:var(--ink); }
    main { width:min(1100px,100%); margin:0 auto; padding:32px 18px; }
    header { display:flex; justify-content:space-between; gap:18px; margin-bottom:18px; }
    h1 { margin:0 0 8px; font-size:clamp(24px,4vw,38px); letter-spacing:0; }
    p { margin:0; color:var(--muted); line-height:1.75; }
    a { color:var(--accent); }
    .badge { padding:8px 12px; border-radius:999px; background:var(--soft); color:var(--accent); font-weight:700; height:max-content; white-space:nowrap; }
    .toolbar { display:flex; gap:10px; align-items:center; padding:16px; background:var(--panel); border:1px solid var(--line); border-radius:14px; box-shadow:0 14px 32px rgba(45,60,90,.08); margin-bottom:16px; }
    select, button { font:inherit; border-radius:10px; padding:11px 12px; }
    select { flex:1; border:1px solid var(--line); background:#fff; color:var(--ink); }
    button { border:0; background:var(--accent); color:#fff; font-weight:700; cursor:pointer; min-width:150px; }
    .status { margin:0 0 12px; font-weight:700; color:var(--muted); }
    .status.error { color:var(--danger); }
    .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(230px,1fr)); gap:12px; }
    .card { min-height:140px; background:rgba(255,255,255,.94); border:1px solid var(--line); border-radius:14px; padding:16px; box-shadow:0 12px 26px rgba(45,60,90,.06); }
    .card h2 { margin:0 0 8px; font-size:16px; }
    .card p { font-size:13px; }
    .tag { display:inline-flex; margin-top:12px; padding:5px 8px; border-radius:999px; background:var(--soft); color:var(--accent); font-size:12px; font-weight:700; }
    .json { margin-top:14px; padding:12px; border-radius:12px; background:#172033; color:#dbe8ff; overflow:auto; max-height:280px; font-size:12px; white-space:pre-wrap; }
    @media (max-width:760px){ header,.toolbar{display:grid;} button{width:100%;} .badge{width:max-content;} }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>24 Pull Requests Explorer</h1>
        <p>12月のOSS貢献を促すサービスのJSON APIです。プロジェクト一覧やPull Requestメタ情報を取得して、公開APIのページングや一覧表示を試せます。</p>
      </div>
      <span class="badge">Open Source Data</span>
    </header>

    <section class="toolbar">
      <select id="endpoint">
        <option value="projects">おすすめプロジェクト</option>
        <option value="meta">Pull Request メタ情報</option>
      </select>
      <button id="load">読み込む</button>
    </section>

    <p class="status" id="status">未読み込みです。</p>
    <section class="cards" id="cards"></section>
    <pre class="json" id="json">取得したJSONの先頭を表示します。</pre>
    <p style="margin-top:14px;font-size:12px;">Docs: <a href="https://24pullrequests.com/api" target="_blank" rel="noreferrer">https://24pullrequests.com/api</a></p>
  </main>

  <script>
    const endpointEl = document.getElementById("endpoint");
    const statusEl = document.getElementById("status");
    const cards = document.getElementById("cards");
    const json = document.getElementById("json");

    function card(title, text, tag) {
      return `<article class="card"><h2>${title}</h2><p>${text || "説明なし"}</p><span class="tag">${tag}</span></article>`;
    }

    async function loadData() {
      const type = endpointEl.value;
      const url = type === "projects"
        ? "https://24pullrequests.com/projects.json"
        : "https://24pullrequests.com/pull_requests/meta.json";
      statusEl.className = "status";
      statusEl.textContent = "読み込み中...";
      cards.innerHTML = "";
      json.textContent = "";
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        statusEl.textContent = `成功: ${url}`;
        json.textContent = JSON.stringify(data, null, 2).slice(0, 5000);
        if (Array.isArray(data)) {
          cards.innerHTML = data.slice(0, 12).map(item =>
            card(item.name || item.github_url || item.repo_name || "Project", item.description || item.body, item.main_language || "OSS")
          ).join("");
        } else {
          cards.innerHTML = Object.entries(data).map(([key, value]) =>
            card(key, String(value), "meta")
          ).join("");
        }
      } catch (error) {
        statusEl.className = "status error";
        statusEl.textContent = "取得に失敗しました。APIが一時停止中、またはCORS制限の可能性があります。";
        cards.innerHTML = [
          card("24 Pull Requests", "JSON APIは projects.json / pull_requests.json / users.json などを公開しています。", "fallback"),
          card("ページング対応", "複数件を返すAPIは page パラメータでページ指定できます。", "docs")
        ].join("");
        json.textContent = JSON.stringify({ fallback: true, tried: url, message: error.message }, null, 2);
      }
    }

    document.getElementById("load").addEventListener("click", loadData);
  </script>
</body>
</html>
