<!DOCTYPE html>
<!-- MY IP紹介ページ: IP情報API候補。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>MY IP Lookup</title><style>body{margin:0;min-height:100vh;font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;background:linear-gradient(135deg,#f6f7fb,#eef8f4);color:#202536}main{width:min(900px,100%);margin:auto;padding:34px 18px}.panel{background:#fff;border:1px solid #dde5ef;border-radius:15px;padding:18px}button{border:0;border-radius:10px;padding:12px 16px;background:#1f8a70;color:#fff;font:inherit;font-weight:700}pre{padding:14px;border-radius:12px;background:#172033;color:#dbe8ff;white-space:pre-wrap}p{color:#667086;line-height:1.7}a{color:#1f8a70}</style></head><body><main><h1>MY IP Lookup</h1><p>IPアドレス情報を返すAPI候補です。取得できない場合は公式ドキュメントURLを表示します。</p><section class="panel"><button id="load">取得</button><pre id="out">未取得です。</pre><p>Docs: <a href="https://www.myip.com/api-docs/" target="_blank" rel="noreferrer">MY IP API docs</a></p></section></main><script>document.getElementById("load").onclick=async()=>{const out=document.getElementById("out");try{const r=await fetch("https://api.myip.com");if(!r.ok)throw new Error(`HTTP ${r.status}`);out.textContent=JSON.stringify(await r.json(),null,2)}catch(e){out.textContent=JSON.stringify({fallback:true,docs:"https://www.myip.com/api-docs/",message:e.message},null,2)}};</script></body></html>
