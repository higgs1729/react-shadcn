<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global ADS-B Tracking Terminal</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Leaflet Map CSS/JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body { font-family: 'Share Tech Mono', monospace; }
        .leaflet-container { background: #09090b !important; }
    </style>
</head>
<body class="bg-zinc-950 text-sky-400 min-h-screen p-4 flex flex-col">

    <!-- ヘッダー -->
    <header class="border border-sky-900 bg-zinc-900/40 p-4 rounded-lg mb-4 flex justify-between items-center shadow-lg shadow-sky-950/20">
        <div>
            <h1 class="text-xl font-bold tracking-widest text-sky-400 animate-pulse">🛰️ GLOBAL ADS-B // AIR_TRAFFIC_MONITOR</h1>
            <p class="text-xs text-sky-700 mt-0.5">OpenSky Network API を使用して上空の航空機データをインターセプトしています</p>
        </div>
        <div class="text-right">
            <button onclick="fetchFlightData()" class="bg-sky-950 hover:bg-sky-900 text-sky-300 border border-sky-700 px-4 py-2 rounded text-xs font-bold tracking-wider transition-all cursor-pointer">
                REFRESH_DATA 🔄
            </button>
        </div>
    </header>

    <!-- メインコンテンツ -->
    <div class="grid grid-cols-1 lg:grid-cols-4 gap-4 flex-1">
        
        <!-- 地図エリア -->
        <div class="lg:col-span-3 border border-zinc-800 bg-zinc-900 rounded-lg overflow-hidden relative h-[550px] lg:h-auto">
            <div id="map" class="w-full h-full"></div>
            <!-- ローディングオーバーレイ -->
            <div id="loading" class="absolute inset-0 bg-zinc-950/80 z-[1000] flex items-center justify-center text-sm tracking-widest text-sky-300">
                <span class="animate-spin mr-3">🌀</span> INTERCEPTING ADS-B SIGNALS...
            </div>
        </div>

        <!-- サイドバー情報パネル -->
        <div class="lg:col-span-1 border border-zinc-800 bg-zinc-900 p-4 rounded-lg flex flex-col justify-between space-y-4">
            <div>
                <h3 class="text-xs font-bold text-zinc-500 uppercase tracking-wider mb-2">📊 トラフィックサマリー</h3>
                <div class="bg-zinc-950 p-3 rounded border border-zinc-800 space-y-2 text-xs">
                    <div class="flex justify-between"><span class="text-zinc-500">捕捉した航空機数:</span> <span id="count" class="text-zinc-200 font-bold">0</span></div>
                    <div class="flex justify-between"><span class="text-zinc-500">データソース:</span> <span class="text-emerald-500">OpenSky REST API</span></div>
                    <div class="flex justify-between"><span class="text-zinc-500">最終更新:</span> <span id="timestamp" class="text-zinc-400">--:--:--</span></div>
                </div>
            </div>

            <!-- 選択された機体の詳細 -->
            <div class="flex-1 mt-4">
                <h3 class="text-xs font-bold text-zinc-500 uppercase tracking-wider mb-2">✈️ 選択中の機体情報</h3>
                <div id="details" class="bg-zinc-950 p-3 rounded border border-zinc-800 text-xs space-y-2 h-[250px] overflow-y-auto text-zinc-400">
                    <p class="text-zinc-600 italic">地図上の飛行機アイコンをクリックすると、トランスポンダの生データがここに展開されます。</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 地図の初期化（日本周辺をデフォルトに設定）
        const map = L.map('map').setView([35.6812, 139.7671], 6);

        // ダークモード用のマップタイル（CartoDB Dark Matter）
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap &copy; CartoDB'
        }).addTo(map);

        // 飛行機アイコンの定義
        const planeIcon = L.divIcon({
            html: `<span style="font-size: 20px; display: inline-block; transform: rotate(0deg); color: #38bdf8;">✈️</span>`,
            className: 'plane-marker',
            iconSize: [20, 20],
            iconAnchor: [10, 10]
        });

        let markerLayer = L.layerGroup().addTo(map);

        // OpenSky Network APIからデータを取得
        async function fetchFlightData() {
            document.getElementById('loading').classList.remove('hidden');
            
            // 地図の表示範囲（緯度経度の境界）を取得してAPIのクエリに投げる
            const bounds = map.getBounds();
            const lamin = bounds.getSouth();
            const lomin = bounds.getWest();
            const lamax = bounds.getNorth();
            const lomax = bounds.getEast();

            // 範囲内の機体を取得するOpenSkyのオープンURL
            const url = `https://opensky-network.org/api/states/all?lamin=${lamin}&lomin=${lomin}&lamax=${lamax}&lomax=${lomax}`;

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error('API制限、またはサーバーが混雑しています。');
                
                const data = await response.json();
                
                // マーカーをクリア
                markerLayer.clearLayers();

                if (!data.states) {
                    document.getElementById('count').textContent = '0';
                    document.getElementById('details').innerHTML = '<p class="text-amber-500">このエリア上空に現在飛行中の機体は見つかりませんでした。</p>';
                    return;
                }

                document.getElementById('count').textContent = data.states.length;
                document.getElementById('timestamp').textContent = new Date().toLocaleTimeString();

                // 取得した航空機データをプロット
                data.states.forEach(flight => {
                    const icao24 = flight[0];     // icao24アドレス
                    const callsign = flight[1] ? flight[1].trim() : 'UNKNOWN'; // コールサイン
                    const origin = flight[2];     // 出発国
                    const longitude = flight[5];  // 経度
                    const latitude = flight[6];   // 緯度
                    const altitude = flight[7];   // 高度 (メートル)
                    const velocity = flight[9];   // 速度 (m/s)
                    const heading = flight[10] || 0; // 飛行方位 (度)

                    if (latitude && longitude) {
                        // 方位角（マシンの向き）に合わせてアイコンを回転させるカスタムDivIcon
                        const rotatedIcon = L.divIcon({
                            html: `<div style="transform: rotate(${heading - 45}deg); font-size: 18px; cursor: pointer; text-shadow: 0 0 8px #0284c7;">✈️</div>`,
                            className: 'custom-plane',
                            iconSize: [20, 20],
                            iconAnchor: [10, 10]
                        });

                        const marker = L.marker([latitude, longitude], { icon: rotatedIcon });
                        
                        // クリックした時の詳細表示処理
                        marker.on('click', () => {
                            const detailsHtml = `
                                <div class="text-sky-400 font-bold border-b border-zinc-800 pb-1 mb-2">CALLSIGN: ${callsign}</div>
                                <div><span class="text-zinc-600">ICAO24:</span> <span class="text-zinc-300">${icao24}</span></div>
                                <div><span class="text-zinc-600">登録国:</span> <span class="text-zinc-300">${origin}</span></div>
                                <div><span class="text-zinc-600">現在位置:</span> <span class="text-zinc-300">${latitude.toFixed(4)}, ${longitude.toFixed(4)}</span></div>
                                <div><span class="text-zinc-600">巡航高度:</span> <span class="text-amber-500">${Math.round(altitude || 0)} m</span></div>
                                <div><span class="text-zinc-600">対地速度:</span> <span class="text-emerald-500">${Math.round((velocity || 0) * 3.6)} km/h</span></div>
                                <div><span class="text-zinc-600">進行方位:</span> <span class="text-zinc-300">${Math.round(heading)}°</span></div>
                            `;
                            document.getElementById('details').innerHTML = detailsHtml;
                        });

                        markerLayer.addLayer(marker);
                    }
                });

            } catch (err) {
                console.error(err);
                document.getElementById('details').innerHTML = `<p class="text-red-500">⚠️ SIGNAL_LOST: ${err.message}<br><br><span class="text-zinc-500">※OpenSky APIは10秒に1回以上の高頻度リクエスト、または広範囲すぎるリクエストを送ると一時的にロックされます。少し待ってから再度お試しください。</span></p>`;
            } finally {
                document.getElementById('loading').classList.add('hidden');
            }
        }

        // 地図の移動が終わったら自動でそのエリアのデータを再取得
        map.on('moveend', fetchFlightData);

        // 初回起動
        fetchFlightData();
    </script>
</body>
</html>
