<!DOCTYPE html>
<!-- host-t.com紹介ページ: DNS over HTTP候補を使い、ドメイン名のDNS問い合わせを試す。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>host-t DNS Query</title><style>
:root{--ink:#202536;--muted:#667086;--line:#dde5ef;--accent:#2f6ef0;--danger:#c43d3d}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;background:linear-gradient(135deg,#f6f7fb,#eef7ff);color:var(--ink)}main{width:min(900px,100%);margin:auto;padding:34px 18px}h1{margin:0 0 8px;font-size:clamp(24px,4vw,38px);letter-spacing:0}p{margin:0;color:var(--muted);line-height:1.7}a{color:var(--accent)}form{display:grid;grid-template-columns:1fr 130px 120px;gap:10px;margin:18px 0;background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px}input,select,button{font:inherit;border-radius:10px;padding:11px 12px}input,select{border:1px solid var(--line)}button{border:0;background:var(--accent);color:#fff;font-weight:700}.status{font-weight:700;color:var(--muted);margin-bottom:10px}.status.error{color:var(--danger)}pre{padding:14px;border-radius:12px;background:#172033;color:#dbe8ff;white-space:pre-wrap;min-height:260px}@media(max-width:760px){form{grid-template-columns:1fr}}
</style></head><body><main><h1>host-t DNS Query</h1><p>HTTP GETでDNS問い合わせを行うAPI候補です。CORS制限時は問い合わせURLと代替説明を表示します。</p><form id="form"><input id="domain" value="example.com"><select id="type"><option>A</option><option>AAAA</option><option>MX</option><option>TXT</option></select><button>問い合わせ</button></form><p class="status" id="status">未実行です。</p><pre id="out"></pre><p style="font-size:12px">Docs: <a href="https://host-t.com" target="_blank" rel="noreferrer">https://host-t.com</a></p></main><script>
document.getElementById("form").addEventListener("submit",async e=>{e.preventDefault();const domain=document.getElementById("domain").value,type=document.getElementById("type").value,url=`https://host-t.com/dns/${type}/${encodeURIComponent(domain)}`,status=document.getElementById("status"),out=document.getElementById("out");try{status.className="status";status.textContent="問い合わせ中...";const r=await fetch(url);if(!r.ok)throw new Error(`HTTP ${r.status}`);out.textContent=await r.text();status.textContent="成功: DNS結果を取得しました。";}catch(err){status.className="status error";status.textContent="取得不可。問い合わせURLを表示します。";out.textContent=JSON.stringify({url,type,domain,fallback:true,message:err.message},null,2);}});
</script></body></html>
