<!--
  Purpose: Animal Crossing: New Horizons encyclopedia page for the WebAPI gallery.
  Structure: category switcher, search field, card grid, and graceful fallback samples.
-->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>どうぶつの森 図鑑</title>
<style>
:root{--bg:#0f172a;--card:#111827cc;--line:#314155;--text:#e2e8f0;--muted:#94a3b8;--accent:#22c55e;--accent2:#38bdf8}
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 0 0,rgba(34,197,94,.18),transparent 26%),radial-gradient(circle at 100% 0,rgba(56,189,248,.14),transparent 22%),linear-gradient(135deg,#020617 0%,#0f172a 55%,#111827 100%);color:var(--text)}main{max-width:1180px;margin:0 auto;padding:32px 20px 48px}.hero,.panel{background:linear-gradient(180deg,rgba(17,24,39,.92),rgba(17,24,39,.82));border:1px solid rgba(148,163,184,.16);box-shadow:0 24px 60px rgba(2,6,23,.36);backdrop-filter:blur(14px);border-radius:24px}.hero{padding:28px}.kicker{display:inline-flex;gap:8px;align-items:center;padding:6px 12px;border-radius:999px;background:rgba(34,197,94,.14);color:#86efac;font-size:12px;letter-spacing:.08em;text-transform:uppercase}.hero h1{margin:14px 0 10px;font-size:clamp(32px,5vw,54px);line-height:1.05}.hero p{margin:0;max-width:820px;color:var(--muted);line-height:1.8}.hero-foot{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-top:20px}.link{color:#86efac;text-decoration:none}.chip,.tag{display:inline-flex;align-items:center;gap:6px;padding:9px 12px;border-radius:999px;background:rgba(148,163,184,.12);color:var(--text);border:1px solid rgba(148,163,184,.16)}.panel{margin-top:18px;padding:18px}.controls{display:grid;grid-template-columns:220px minmax(0,1fr) 180px auto;gap:12px;align-items:end}.field{display:grid;gap:8px}.field label{font-size:12px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}.field input,.field select{width:100%;padding:14px 14px;border-radius:16px;border:1px solid var(--line);background:#08111d;color:var(--text)}button{padding:14px 16px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#04111f;font-weight:800;cursor:pointer;box-shadow:0 14px 30px rgba(34,197,94,.18)}.summary{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px;color:var(--muted)}.status{margin-top:16px;padding:14px 16px;border-radius:16px;background:rgba(15,23,42,.76);border:1px solid rgba(148,163,184,.16);color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-top:18px}.card{background:rgba(17,24,39,.8);border:1px solid rgba(148,163,184,.16);border-radius:20px;overflow:hidden;box-shadow:0 18px 40px rgba(2,6,23,.28)}.art{height:150px;background:linear-gradient(135deg,rgba(34,197,94,.24),rgba(56,189,248,.18)),linear-gradient(160deg,#1f2937,#0f172a);display:flex;align-items:flex-end;padding:16px;border-bottom:1px solid rgba(148,163,184,.16)}.art img{width:100%;height:100%;object-fit:cover;border-radius:14px;background:#0f172a}.meta{padding:16px}.meta h3{margin:0 0 8px;font-size:20px}.meta p{margin:0;color:var(--muted);line-height:1.7;font-size:14px}.meta .row{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.empty{padding:24px;border:1px dashed rgba(148,163,184,.22);border-radius:20px;color:var(--muted);text-align:center}.note{margin-top:18px;color:var(--muted);font-size:13px;line-height:1.7}
@media (max-width:980px){.controls{grid-template-columns:1fr 1fr}.controls button{grid-column:1/-1}}@media (max-width:720px){.controls{grid-template-columns:1fr}.hero,.panel{border-radius:20px}}
</style>
</head>
<body>
<main>
  <section class="hero">
    <span class="kicker">data / life sim</span>
    <h1>どうぶつの森 図鑑</h1>
    <p>Animal Crossing: New Horizons の住民・魚・虫・化石などをカテゴリ別に検索します。画像付きカードで見せつつ、ライブ API が失敗した場合はサンプル図鑑で見られます。</p>
    <div class="hero-foot"><a class="link" href="https://acnhapi.com/" target="_blank" rel="noreferrer">API ドキュメント</a><span class="tag">無料 / 認証なし</span><span class="tag">villagers / bugs / fish / fossils</span></div>
  </section>
  <section class="panel">
    <div class="controls">
      <div class="field"><label for="resource">カテゴリ</label><select id="resource"><option value="villagers">villagers</option><option value="bugs">bugs</option><option value="fish">fish</option><option value="fossils">fossils</option><option value="art">art</option><option value="music">music</option></select></div>
      <div class="field"><label for="query">検索語</label><input id="query" type="text" value="" placeholder="Raymond, snapping turtle ..."></div>
      <div class="field"><label for="sort">並び順</label><select id="sort"><option value="name">name</option><option value="alt">alternate</option><option value="price">price / value</option></select></div>
      <button id="loadButton">読み込む</button>
    </div>
    <div class="summary" id="summary"></div>
    <div class="status" id="status">どうぶつの森データを取得しています。</div>
    <div class="grid" id="results"></div>
  </section>
  <p class="note">リソースはページ内で切り替えます。レコード構造がカテゴリごとに少し違うため、表示は共通カードへ正規化しています。</p>
</main>
<script>
const RESOURCE=document.getElementById("resource"),QUERY=document.getElementById("query"),SORT=document.getElementById("sort"),STATUS=document.getElementById("status"),SUMMARY=document.getElementById("summary"),RESULTS=document.getElementById("results");
const SAMPLE={villagers:[{name:"Raymond",species:"cat",personality:"Smug",image_uri:"",icon_uri:"",birthday_string:"10/1"},{name:"Marina",species:"octopus",personality:"Normal",image_uri:"",icon_uri:"",birthday_string:"6/26"}],bugs:[{name:"Emperor butterfly",availability:"all day",catch_phrase:"I caught an emperor butterfly!",museum_phrase:"Butterflies are ...",price:4000,image_uri:""}],fish:[{name:"Stringfish",availability:"Dec-Mar",catch_phrase:"I caught a stringfish!",price:15000,image_uri:""}],fossils:[{name:"T. rex skull",price:6000,museum_phrase:"A rare fossil."}],art:[{name:"Mystic statue",buy_price:4200,hasFake:true,description:"美術品のサンプル。"}],music:[{name:"K.K. House",buy_price:320,description:"サンプルミュージック。"}]};
function setStatus(message){STATUS.textContent=message}function safeText(value){return value?String(value):"-"}function normalize(json){if(Array.isArray(json))return json; if(json&&typeof json==="object")return Object.values(json); return []}function getTitle(item){return item.name||item.title||item["file-name"]||item.id||"-"}function getMeta(item){return item.species||item.personality||item.availability||item.buy_price||item.price||item.value||""}function getImage(item){return item.image_uri||item.icon_uri||""}function matches(item){const term=QUERY.value.trim().toLowerCase();if(!term)return true;return [item.name,item.species,item.personality,item.catch_phrase,item.museum_phrase,item.description].join(" ").toLowerCase().includes(term)}function render(items,source){let list=items.filter(matches);if(SORT.value==="name")list=[...list].sort((a,b)=>getTitle(a).localeCompare(getTitle(b),"en"));else if(SORT.value==="price")list=[...list].sort((a,b)=>(b.buy_price||b.price||b.value||0)-(a.buy_price||a.price||a.value||0));SUMMARY.innerHTML=`<span class="chip"><strong>${items.length}</strong> 件</span><span class="chip">表示 ${list.length} 件</span><span class="chip">ソース: ${source}</span>`;if(!list.length){RESULTS.innerHTML='<div class="empty">一致するデータがありませんでした。</div>';return}RESULTS.innerHTML=list.slice(0,12).map((item)=>{const image=getImage(item);return`<article class="card"><div class="art">${image?`<img src="${image}" alt="${safeText(getTitle(item))}">`:`<strong>${safeText(getTitle(item))}</strong>`}</div><div class="meta"><h3>${safeText(getTitle(item))}</h3><p>${safeText(item.species||item.personality||item.museum_phrase||item.description||item.catch_phrase||getMeta(item))}</p><div class="row"><span class="chip">${safeText(item.species||item.personality||item.availability||item.type||item.hasFake||"-")}</span><span class="chip">${safeText(item.birthday_string||item.price||item.buy_price||"-")}</span></div></div></article>`}).join("")}
async function loadData(){const resource=RESOURCE.value;setStatus("どうぶつの森データを取得中です...");try{const response=await fetch(`https://acnhapi.com/v1/${resource}`);if(!response.ok)throw new Error(`HTTP ${response.status}`);const json=await response.json();const items=normalize(json);if(!items.length)throw new Error("データが見つかりませんでした");setStatus(`ライブ API から ${items.length} 件取得しました。`);render(items,"ライブ API")}catch(error){setStatus(`ライブ API に失敗したためサンプルを表示しています。(${error.message})`);render(SAMPLE[resource],`サンプル / ${error.message}`)}}
document.getElementById("loadButton").addEventListener("click",loadData);RESOURCE.addEventListener("change",loadData);QUERY.addEventListener("keydown",(event)=>{if(event.key==="Enter")loadData()});SORT.addEventListener("change",()=>render(SAMPLE[RESOURCE.value],"サンプル / ソート"));loadData();
</script></body></html>
