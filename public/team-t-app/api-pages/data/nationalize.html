<!DOCTYPE html>
<!-- Nationalize.io紹介ページ: 名前から国籍確率を推定するAPI。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Nationalize.io Predictor</title><style>body{margin:0;min-height:100vh;font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;background:linear-gradient(135deg,#f6f7fb,#eef7ff);color:#202536}main{width:min(900px,100%);margin:auto;padding:34px 18px}form{display:flex;gap:10px;background:#fff;border:1px solid #dde5ef;border-radius:14px;padding:16px}input,button{font:inherit;border-radius:10px;padding:11px 12px}input{flex:1;border:1px solid #dde5ef}button{border:0;background:#2f6ef0;color:#fff;font-weight:700}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-top:16px}.card{background:#fff;border:1px solid #dde5ef;border-radius:12px;padding:14px}p{color:#667086;line-height:1.7}a{color:#2f6ef0}@media(max-width:720px){form{display:grid}}</style></head><body><main><h1>Nationalize.io Predictor</h1><p>名前から国籍の確率を推定する無料APIです。</p><form id="form"><input id="name" value="sakura"><button>推定</button></form><section class="cards" id="cards"></section><p>Docs: <a href="https://nationalize.io" target="_blank" rel="noreferrer">nationalize.io</a></p></main><script>document.getElementById("form").onsubmit=async e=>{e.preventDefault();const name=document.getElementById("name").value,cards=document.getElementById("cards");try{const r=await fetch(`https://api.nationalize.io?name=${encodeURIComponent(name)}`);if(!r.ok)throw new Error(`HTTP ${r.status}`);const d=await r.json();cards.innerHTML=(d.country||[]).map(x=>`<article class="card"><b>${x.country_id}</b><p>${Math.round(x.probability*100)}%</p></article>`).join("")}catch(err){cards.innerHTML=`<article class="card"><b>fallback</b><p>${err.message}</p></article>`}};</script></body></html>
