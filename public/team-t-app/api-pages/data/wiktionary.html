<!DOCTYPE html>
<!-- Wiktionary紹介ページ: MediaWiki APIで辞書ページを検索する。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Wiktionary Search</title><style>body{font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;margin:0;min-height:100vh;background:#f6f7fb;color:#202536}main{width:min(960px,100%);margin:auto;padding:34px 18px}form{display:flex;gap:10px;background:#fff;border:1px solid #dde5ef;border-radius:14px;padding:16px}input,button{font:inherit;border-radius:10px;padding:11px 12px}input{flex:1;border:1px solid #dde5ef}button{border:0;background:#2f6ef0;color:#fff;font-weight:700}pre{padding:14px;border-radius:12px;background:#172033;color:#dbe8ff;white-space:pre-wrap;min-height:320px}p{color:#667086;line-height:1.7}a{color:#2f6ef0}@media(max-width:720px){form{display:grid}}</style></head><body><main><h1>Wiktionary Search</h1><p>WiktionaryのMediaWiki APIから辞書ページの概要を取得します。</p><form id="form"><input id="q" value="example"><button>検索</button></form><pre id="out">未検索です。</pre><p>Docs: <a href="https://en.wiktionary.org/w/api.php" target="_blank" rel="noreferrer">Wiktionary API</a></p></main><script>document.getElementById("form").onsubmit=async e=>{e.preventDefault();const q=document.getElementById("q").value,out=document.getElementById("out");try{const params=new URLSearchParams({origin:"*",action:"query",format:"json",prop:"extracts",exintro:"1",titles:q});const r=await fetch(`https://en.wiktionary.org/w/api.php?${params}`);if(!r.ok)throw new Error(`HTTP ${r.status}`);out.textContent=JSON.stringify(await r.json(),null,2).slice(0,6000)}catch(err){out.textContent=JSON.stringify({fallback:true,query:q,message:err.message},null,2)}};</script></body></html>
