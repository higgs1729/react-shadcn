<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>天気アプリ（気象庁版）</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:sans-serif;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-size:cover;
background-position:center;
transition:1s;
}
body::before{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.4);
z-index:-1;
}
.container{ text-align:center; width:90%; max-width:400px; }
.card{
backdrop-filter:blur(15px);
background:rgba(255,255,255,0.1);
border-radius:20px;
padding:20px;
box-shadow:0 8px 30px rgba(0,0,0,0.3);
}
input{
width:70%;
padding:10px;
border:none;
border-radius:10px;
}
button{
padding:10px;
border:none;
border-radius:10px;
background:rgba(255,255,255,0.3);
color:white;
cursor:pointer;
}
button:hover{ background:rgba(255,255,255,0.6); }
.error{ color:#ffb3b3; margin-top:10px; }
.datetime{ margin-bottom:10px; }
@media(max-width:500px){ input{width:100%;} }
</style>

</head>

<body>

<div class="container">
<div class="datetime" id="datetime"></div>

<div class="card">
    <h2>天気検索</h2>
    <input id="pref" placeholder="例：東京 / 大阪">
    <br><br>
    <button onclick="getWeather()">検索</button>

    <div id="result"></div>
    <div class="error" id="error"></div>
</div>
</div>

<script>

// ===== 正規化 =====
function normalizePref(input){
    let clean = input.trim().replace(/\s/g,"");

    if (clean === "北海道") return "北海道";
    if (clean === "東京") return "東京都";
    if (clean === "大阪" || clean === "京都") return clean + "府";

    if (!/[都道府県]$/.test(clean)) {
        return clean + "県";
    }

    return clean;
}

// ===== 背景 =====
function setBg(text){
    let type="sunny";

    if(text.includes("晴")) type="sunny";
    else if(text.includes("曇")) type="cloud";
    else if(text.includes("雨")) type="rain";
    else if(text.includes("雪")) type="snow";

    const map={
        sunny:"https://images.unsplash.com/photo-1501973801540-537f08ccae7b",
        cloud:"https://images.unsplash.com/photo-1501630834273-4b5604d2ee31",
        rain:"https://images.unsplash.com/photo-1501696461441-8e7d5b1c95a7",
        snow:"https://images.unsplash.com/photo-1608889175157-2c7d9cba6c61"
    };

    document.body.style.backgroundImage=`url(${map[type]})`;
}

// ===== 天気取得（気象庁）=====
async function getWeather(){
    const raw = document.getElementById("pref").value;
    const error = document.getElementById("error");
    const result = document.getElementById("result");

    error.textContent="";
    result.innerHTML="";

    if(!raw){
        error.textContent="入力してください";
        return;
    }

    const input = normalizePref(raw);

    // ===== 都道府県コード =====
    const PREF_CODE = {
        "北海道":"016000","青森県":"020000","岩手県":"030000","宮城県":"040000",
        "秋田県":"050000","山形県":"060000","福島県":"070000",
        "茨城県":"080000","栃木県":"090000","群馬県":"100000",
        "埼玉県":"110000","千葉県":"120000","東京都":"130000","神奈川県":"140000",
        "新潟県":"150000","富山県":"160000","石川県":"170000","福井県":"180000",
        "山梨県":"190000","長野県":"200000",
        "岐阜県":"210000","静岡県":"220000","愛知県":"230000","三重県":"240000",
        "滋賀県":"250000","京都府":"260000","大阪府":"270000","兵庫県":"280000",
        "奈良県":"290000","和歌山県":"300000",
        "鳥取県":"310000","島根県":"320000","岡山県":"330000","広島県":"340000","山口県":"350000",
        "徳島県":"360000","香川県":"370000","愛媛県":"380000","高知県":"390000",
        "福岡県":"400000","佐賀県":"410000","長崎県":"420000","熊本県":"430000",
        "大分県":"440000","宮崎県":"450000","鹿児島県":"460000","沖縄県":"470000"
    };

    if(!PREF_CODE[input]){
        error.textContent="都道府県が見つかりません";
        return;
    }

    try{
        const res = await fetch(
            `https://www.jma.go.jp/bosai/forecast/data/forecast/${PREF_CODE[input]}.json`
        );
        const data = await res.json();

        const area = data[0].timeSeries[0].areas[0];

        const weather = area.weathers[0];
        const wind = area.winds[0];

        setBg(weather);

        result.innerHTML = `
        <h3>${input}</h3>
        <div style="font-size:40px">🌤</div>
        <p>${weather}</p>
        <p>💨 ${wind}</p>
        <p>🕒 ${data[0].reportDatetime}</p>
        `;
    }catch(e){
        error.textContent="通信エラー";
        console.error(e);
    }
}

// ===== 時計 =====
function updateTime(){
    const now=new Date();
    document.getElementById("datetime").innerHTML=
        now.toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric",weekday:"short"})
        +"<br>"+now.toLocaleTimeString();
}
setInterval(updateTime,1000);
updateTime();

</script>

</body>
</html>
