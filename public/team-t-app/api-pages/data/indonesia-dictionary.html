<!DOCTYPE html>
<!-- Indonesia Dictionary紹介ページ: KBBI系インドネシア語辞書API候補。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Indonesia Dictionary Lookup</title><style>body{font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;margin:0;min-height:100vh;background:#f6f7fb;color:#202536}main{width:min(900px,100%);margin:auto;padding:34px 18px}.panel{background:#fff;border:1px solid #dde5ef;border-radius:15px;padding:18px}input,button{width:100%;font:inherit;border-radius:10px;padding:11px 12px;margin-top:10px}input{border:1px solid #dde5ef}button{border:0;background:#c43d3d;color:#fff;font-weight:700}pre{padding:14px;border-radius:12px;background:#172033;color:#dbe8ff;white-space:pre-wrap}p{color:#667086;line-height:1.7}a{color:#c43d3d}</style></head><body><main><h1>Indonesia Dictionary Lookup</h1><p>インドネシア語辞書API候補です。サービス停止時に備えてリクエスト例を表示します。</p><section class="panel"><input id="word" value="rumah"><button id="show">検索例</button><pre id="out"></pre><p>Docs: <a href="https://new-kbbi-api.herokuapp.com/" target="_blank" rel="noreferrer">KBBI API</a></p></section></main><script>document.getElementById("show").onclick=()=>{const w=document.getElementById("word").value;document.getElementById("out").textContent=JSON.stringify({endpoint:`https://new-kbbi-api.herokuapp.com/cari/${encodeURIComponent(w)}`,word:w,fallback:true},null,2)};</script></body></html>
