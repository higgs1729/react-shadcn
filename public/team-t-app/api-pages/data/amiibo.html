<!--
  Purpose: Amiibo browser for the WebAPI gallery.
  Structure: search controls, hero summary, result cards, and fallback samples.
-->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amiibo検索</title>
<style>
:root{--bg:#0b1020;--card:#111a2dcc;--line:#28354b;--text:#e6edf6;--muted:#9db0c7;--accent:#f97316;--accent2:#fb7185}
*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 0 0,rgba(249,115,22,.18),transparent 26%),radial-gradient(circle at 100% 0,rgba(251,113,133,.16),transparent 22%),linear-gradient(135deg,#020617 0%,#0b1020 56%,#111827 100%);color:var(--text)}main{max-width:1180px;margin:0 auto;padding:32px 20px 48px}.hero,.panel{background:linear-gradient(180deg,rgba(17,26,45,.92),rgba(17,26,45,.82));border:1px solid rgba(157,176,199,.16);box-shadow:0 24px 60px rgba(2,6,23,.36);backdrop-filter:blur(14px);border-radius:24px}.hero{padding:28px}.kicker{display:inline-flex;gap:8px;align-items:center;padding:6px 12px;border-radius:999px;background:rgba(249,115,22,.14);color:#fdba74;font-size:12px;letter-spacing:.08em;text-transform:uppercase}.hero h1{margin:14px 0 10px;font-size:clamp(32px,5vw,54px);line-height:1.05}.hero p{margin:0;max-width:820px;color:var(--muted);line-height:1.8}.hero-foot{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-top:20px}.link{color:#fdba74;text-decoration:none}.chip,.tag{display:inline-flex;align-items:center;gap:6px;padding:9px 12px;border-radius:999px;background:rgba(148,163,184,.12);color:var(--text);border:1px solid rgba(148,163,184,.16)}.panel{margin-top:18px;padding:18px}.controls{display:grid;grid-template-columns:minmax(0,1fr) 200px 180px auto;gap:12px;align-items:end}.field{display:grid;gap:8px}.field label{font-size:12px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}.field input,.field select{width:100%;padding:14px 14px;border-radius:16px;border:1px solid var(--line);background:#08111d;color:var(--text)}button{padding:14px 16px;border:none;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#111827;font-weight:800;cursor:pointer;box-shadow:0 14px 30px rgba(249,115,22,.2)}.summary{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px;color:var(--muted)}.status{margin-top:16px;padding:14px 16px;border-radius:16px;background:rgba(15,23,42,.76);border:1px solid rgba(157,176,199,.16);color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:14px;margin-top:18px}.card{background:rgba(17,26,45,.8);border:1px solid rgba(157,176,199,.16);border-radius:20px;overflow:hidden;box-shadow:0 18px 40px rgba(2,6,23,.28)}.art{height:164px;background:linear-gradient(135deg,rgba(249,115,22,.26),rgba(251,113,133,.2)),linear-gradient(160deg,#1f2937,#0f172a);display:flex;align-items:flex-end;padding:16px;border-bottom:1px solid rgba(157,176,199,.16)}.art img{width:100%;height:100%;object-fit:cover;border-radius:14px;background:#0f172a}.meta{padding:16px}.meta h3{margin:0 0 8px;font-size:20px}.meta p{margin:0;color:var(--muted);line-height:1.7;font-size:14px}.meta .row{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}.empty{padding:24px;border:1px dashed rgba(157,176,199,.22);border-radius:20px;color:var(--muted);text-align:center}.note{margin-top:18px;color:var(--muted);font-size:13px;line-height:1.7}
@media (max-width:920px){.controls{grid-template-columns:1fr 1fr}.controls button{grid-column:1/-1}}@media (max-width:720px){.controls{grid-template-columns:1fr}.hero,.panel{border-radius:20px}}
</style>
</head>
<body>
<main>
  <section class="hero">
    <span class="kicker">data / collectibles</span>
    <h1>Amiibo検索</h1>
    <p>Nintendo Amiibo をキャラクター名やシリーズ名で検索して、画像・種類・発売情報を見やすく確認します。ライブ API が失敗しても、サンプルカードで雰囲気を保てるようにしています。</p>
    <div class="hero-foot"><a class="link" href="https://amiiboapi.com/" target="_blank" rel="noreferrer">API ドキュメント</a><span class="tag">無料 / 認証なし</span><span class="tag">name / series / type 検索</span></div>
  </section>
  <section class="panel">
    <div class="controls">
      <div class="field"><label for="query">検索語</label><input id="query" type="text" value="mario" placeholder="mario, zelda ..."></div>
      <div class="field"><label for="filter">絞り込み</label><select id="filter"><option value="name">name</option><option value="character">character</option><option value="amiiboSeries">amiiboSeries</option><option value="gameSeries">gameSeries</option><option value="type">type</option></select></div>
      <button id="searchButton">検索</button>
    </div>
    <div class="summary" id="summary"></div>
    <div class="status" id="status">Amiibo を取得しています。</div>
    <div class="grid" id="results"></div>
  </section>
  <p class="note">検索は `api/amiibo/?name=` を使います。フィルターはページ内で追加絞り込みを行います。</p>
</main>
<script>
const QUERY=document.getElementById("query"),FILTER=document.getElementById("filter"),STATUS=document.getElementById("status"),SUMMARY=document.getElementById("summary"),RESULTS=document.getElementById("results");
const SAMPLE=[{name:"Mario",character:"Mario",gameSeries:"Super Mario",amiiboSeries:"Super Smash Bros.",type:"Figure",image:"",release:{na:"2014-11-21"}},{name:"Link",character:"Link",gameSeries:"The Legend of Zelda",amiiboSeries:"Super Smash Bros.",type:"Figure",image:"",release:{na:"2014-12-14"}},{name:"Inkling Girl",character:"Inkling Girl",gameSeries:"Splatoon",amiiboSeries:"Splatoon Collection",type:"Figure",image:"",release:{na:"2016-05-28"}}];
function setStatus(message){STATUS.textContent=message}function safeText(value){return value?String(value):"-"}function normalize(json){if(Array.isArray(json?.amiibo))return json.amiibo;if(Array.isArray(json))return json;return[]}function matches(item){const term=QUERY.value.trim().toLowerCase();const key=FILTER.value;const haystack=[item.name,item.character,item.gameSeries,item.amiiboSeries,item.type,item.head,item.tail].join(" ").toLowerCase();return !term||haystack.includes(term)||String(item[key]||"").toLowerCase().includes(term)}function render(items,source){const list=items.filter(matches).slice(0,12);window.__amiiboList=list;SUMMARY.innerHTML=`<span class="chip"><strong>${items.length}</strong> 件</span><span class="chip">表示 ${list.length} 件</span><span class="chip">ソース: ${source}</span>`;if(!list.length){RESULTS.innerHTML='<div class="empty">一致する Amiibo が見つかりませんでした。</div>';return}RESULTS.innerHTML=list.map((item)=>{const image=item.image?`<div class="art"><img src="${item.image}" alt="${safeText(item.name)}"></div>`:`<div class="art"><strong>${safeText(item.name)}</strong></div>`;return`<article class="card">${image}<div class="meta"><h3>${safeText(item.name)}</h3><p>${safeText(item.character)} / ${safeText(item.gameSeries)}</p><div class="row"><span class="chip">${safeText(item.amiiboSeries)}</span><span class="chip">${safeText(item.type)}</span><span class="chip">${safeText(item.release?.na||item.release?.eu||item.release?.jp||"-")}</span></div></div></article>`}).join("")}
async function loadAmiibo(){const term=QUERY.value.trim();setStatus("Amiibo を取得中です...");try{const url=term?`https://www.amiiboapi.com/api/amiibo/?name=${encodeURIComponent(term)}`:"https://www.amiiboapi.com/api/amiibo/";const response=await fetch(url);if(!response.ok)throw new Error(`HTTP ${response.status}`);const json=await response.json();const items=normalize(json);if(!items.length)throw new Error("Amiibo が見つかりませんでした");setStatus(`ライブ API から ${items.length} 件取得しました。`);render(items,"ライブ API")}catch(error){setStatus(`ライブ API に失敗したためサンプルを表示しています。(${error.message})`);render(SAMPLE,`サンプル / ${error.message}`)}}
document.getElementById("searchButton").addEventListener("click",loadAmiibo);QUERY.addEventListener("keydown",(event)=>{if(event.key==="Enter")loadAmiibo()});FILTER.addEventListener("change",()=>{const source=Array.isArray(window.__amiiboList)?window.__amiiboList:SAMPLE;render(source,"フィルタ")});loadAmiibo();
</script></body></html>
