<!DOCTYPE html>
<!-- Hipsum紹介ページ: ヒップスター風ダミーテキスト生成API候補を紹介し、取得不可時はローカル生成する。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Hipsum Text Generator</title><style>
:root{--ink:#202536;--muted:#667086;--line:#dde5ef;--accent:#c96a39;--soft:#fff2e8;--danger:#c43d3d}*{box-sizing:border-box}body{margin:0;min-height:100vh;font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;background:linear-gradient(135deg,#f7f5f2,#fff2e8);color:var(--ink)}main{width:min(900px,100%);margin:auto;padding:34px 18px}h1{margin:0 0 8px;font-size:clamp(24px,4vw,38px);letter-spacing:0}p{margin:0;color:var(--muted);line-height:1.7}a{color:var(--accent)}.panel{margin-top:18px;background:#fff;border:1px solid var(--line);border-radius:15px;padding:18px}button{border:0;border-radius:10px;padding:12px 16px;background:var(--accent);color:#fff;font:inherit;font-weight:700}.status{font-weight:700;color:var(--muted);margin:14px 0}.status.error{color:var(--danger)}.text{padding:16px;border-radius:12px;background:var(--soft);line-height:1.8}</style></head><body><main><h1>Hipsum Text Generator</h1><p>デザインモック向けのヒップスター風ダミーテキストを生成するAPI候補です。</p><section class="panel"><button id="load">文章を生成</button><p class="status" id="status">未生成です。</p><div class="text" id="out"></div><p style="margin-top:14px;font-size:12px">Docs: <a href="https://hipsum.co" target="_blank" rel="noreferrer">https://hipsum.co</a></p></section></main><script>
const local=["Artisan cold brew vinyl pop-up microdosing brunch.","Synthwave bicycle rights kombucha, tote bag everyday carry.","Retro API gallery text for layout testing."];document.getElementById("load").addEventListener("click",async()=>{const status=document.getElementById("status"),out=document.getElementById("out");try{status.className="status";status.textContent="取得中...";const r=await fetch("https://hipsum.co/api/?type=hipster-centric&paras=2");if(!r.ok)throw new Error(`HTTP ${r.status}`);const d=await r.json();status.textContent="成功: APIから生成しました。";out.textContent=d.join("\n\n");}catch(e){status.className="status error";status.textContent="API取得不可のためローカル文を表示します。";out.textContent=local.join("\n\n");}});
</script></body></html>
