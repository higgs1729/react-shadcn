<!DOCTYPE html>
<!-- SHOUTCLOUD紹介ページ: 入力テキストを大文字化するAPI候補。 -->
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>SHOUTCLOUD</title><style>body{font-family:"BIZ UDPGothic","Meiryo UI",sans-serif;margin:0;min-height:100vh;background:#fff7ef;color:#202536}main{width:min(900px,100%);margin:auto;padding:34px 18px}.panel{background:#fff;border:1px solid #dde5ef;border-radius:15px;padding:18px}textarea,button{width:100%;font:inherit;border-radius:10px;padding:11px 12px;margin-top:10px}textarea{min-height:140px;border:1px solid #dde5ef}button{border:0;background:#c96a39;color:#fff;font-weight:700}.result{font-size:34px;font-weight:800;margin-top:18px;word-break:break-word}p{color:#667086;line-height:1.7}a{color:#c96a39}</style></head><body><main><h1>SHOUTCLOUD</h1><p>ALL-CAPS AS A SERVICE。文章を大文字に変換します。</p><section class="panel"><textarea id="text">hello webapi gallery</textarea><button id="run">叫ぶ</button><div class="result" id="out"></div><p>Docs: <a href="http://shoutcloud.io/" target="_blank" rel="noreferrer">shoutcloud.io</a></p></section></main><script>document.getElementById("run").onclick=async()=>{const text=document.getElementById("text").value,out=document.getElementById("out");try{const r=await fetch("https://api.shoutcloud.io/V1/SHOUT",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({INPUT:text})});if(!r.ok)throw new Error(`HTTP ${r.status}`);out.textContent=(await r.json()).OUTPUT}catch(e){out.textContent=text.toUpperCase()}};document.getElementById("run").click();</script></body></html>
