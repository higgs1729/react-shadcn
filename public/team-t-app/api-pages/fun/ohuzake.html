<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Facts - ランダム雑学ジェネレーター</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f0f3f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
            width: 400px;
            box-sizing: border-box;
        }
        h1 {
            font-size: 22px;
            color: #1e293b;
            margin-bottom: 25px;
        }
        .fact-box {
            background-color: #faf5ff; 
            border-left: 4px solid #a855f7; 
            padding: 20px;
            border-radius: 0 8px 8px 0;
            margin-bottom: 25px;
            min-height: 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: left;
            font-size: 16px;
            color: #334155;
            line-height: 1.6;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #a855f7;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s, transform 0.1s;
        }
        button:hover {
            background-color: #9333ea;
        }
        button:active {
            transform: scale(0.98);
        }
        .loading {
            color: #94a3b8;
            font-style: italic;
        }
        .error {
            color: #ef4444;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>世界の雑学・ファクト 🎲</h1>
    
    <div class="fact-box">
        <div id="fact-content" class="loading">データを読み込み中...</div>
    </div>
    
    <button onclick="fetchRandomFact()">別のファクトを見る</button>
</div>

<script>
    // 🌐 英語を日本語に翻訳する関数
    async function translateToJapanese(englishText) {
        try {
            const response = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(englishText)}&langpair=en|ja`);
            if (!response.ok) return englishText; // 翻訳に失敗したら英語のまま返す
            
            const data = await response.json();
            return data.responseData.translatedText || englishText;
        } catch (e) {
            return englishText; // エラーが起きたら英語のまま返す
        }
    }

    // 🌐 ランダムな雑学データを取得して翻訳・表示する関数
    async function fetchRandomFact() {
        const factContent = document.getElementById('fact-content');
        factContent.className = 'loading';
        factContent.textContent = '次の雑学を探しています...';

        const apiUrl = 'https://uselessfacts.jsph.pl/api/v2/facts/random';

        try {
            const response = await fetch(apiUrl);
            
            if (!response.ok) {
                throw new Error(`HTTPエラー! ステータス: ${response.status}`);
            }

            const data = await response.json();
            
            if (data && data.text) {
                // 🟢 取得した英語のテキストを翻訳にかける
                factContent.textContent = '翻訳しています...';
                const japaneseText = await translateToJapanese(data.text);
                
                factContent.className = '';
                factContent.textContent = japaneseText;
            } else {
                factContent.className = '';
                factContent.textContent = 'データの形式が正しくありません。';
            }

        } catch (error) {
            console.error('エラーが発生しました:', error);
            factContent.className = 'error';
            factContent.textContent = 'データの取得に失敗しました。もう一度ボタンを押してみてください。';
        }
    }

    // 最初にページを開いたときにも自動で1回実行
    window.onload = fetchRandomFact;
</script>

</body>
</html>
</html>
