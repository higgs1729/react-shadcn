<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yes / No ディサイダー（意思決定器）</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #0f172a; /* ダークでかっこいい背景色 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #ffffff;
        }
        .container {
            background-color: #1e293b;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 400px;
            box-sizing: border-box;
        }
        h1 {
            font-size: 20px;
            color: #94a3b8;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        /* 答え（YES/NO）の文字スタイル */
        .answer-text {
            font-size: 54px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 2px;
            min-height: 65px;
        }
        /* YESの時は緑、NOの時は赤、読み込み時はグレーにするためのクラス */
        .yes { color: #4ade80; text-shadow: 0 0 10px rgba(74, 222, 128, 0.5); }
        .no { color: #f87171; text-shadow: 0 0 10px rgba(248, 113, 113, 0.5); }
        .loading { color: #64748b; font-size: 24px; }

        /* GIF画像を表示するエリア */
        .image-box {
            background-color: #0f172a;
            border-radius: 8px;
            margin-bottom: 25px;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 2px solid #334155;
        }
        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 枠に合わせてきれいに収める */
            display: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        button:hover {
            background-color: #2563eb;
        }
        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>あなたの運命を決める 🔮</h1>
    
    <div id="answer-display" class="answer-text loading">運命の選択中...</div>
    
    <div class="image-box">
        <img id="result-image" src="" alt="結果の画像">
        <div id="image-placeholder" style="color: #475569;">GIFを読み込み中...</div>
    </div>
    
    <button onclick="askTheOracle()">決断を委ねる！</button>
</div>

<script>
    // 🌐 yesno.wtf APIからデータを取得する関数
    async function askTheOracle() {
        const answerDisplay = document.getElementById('answer-display');
        const resultImage = document.getElementById('result-image');
        const placeholder = document.getElementById('image-placeholder');

        // 読み込み中の表示リセット
        answerDisplay.className = 'answer-text loading';
        answerDisplay.textContent = '思考中...';
        resultImage.style.display = 'none';
        placeholder.style.display = 'block';
        placeholder.textContent = 'GIFを読み込み中...';

        // 🟢 実在する yesno.wtf のAPIエンドポイント
        const apiUrl = 'https://yesno.wtf/api';

        try {
            const response = await fetch(apiUrl);
            
            if (!response.ok) {
                throw new Error(`HTTPエラー! ステータス: ${response.status}`);
            }

            const data = await response.json();
            
            // 🟢 返ってきたJSONデータの「answer」と「image」を使用
            if (data && data.answer && data.image) {
                // 文字の表示と色を変更 (yesなら緑、noなら赤)
                answerDisplay.className = `answer-text ${data.answer}`;
                answerDisplay.textContent = data.answer;
                
                // 画像の切り替え設定
                resultImage.src = data.image;
                
                // 画像の読み込みが完了したらプレースホルダーを消して画像を表示
                resultImage.onload = () => {
                    placeholder.style.display = 'none';
                    resultImage.style.display = 'block';
                };
            }

        } catch (error) {
            console.error('エラーが発生しました:', error);
            answerDisplay.className = 'answer-text no';
            answerDisplay.textContent = 'ERROR';
            placeholder.textContent = 'エラーが発生しました。';
        }
    }

    // 最初にページを開いたときにも自動で1回占う
    window.onload = askTheOracle;
</script>

</body>
</html>
