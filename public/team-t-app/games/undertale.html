<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Undertale風 回避ゲーム - 綺麗ハート修正版</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    flex-direction:column;
    user-select: none;
}

#ui{
    width:500px;
    display:flex;
    justify-content:space-between;
    margin-bottom:10px;
    font-size:20px;
}

#stage-title {
    font-weight: bold;
    color: #fff;
}
#stage-title.ura {
    color: #ff33ff;
    text-shadow: 0 0 10px #ff33ff;
}

#game{
    width:500px;
    height:500px;
    border:6px solid white;
    background:black;
    position:relative;
    overflow:hidden;
}

/* 💖 プレイヤー（ハート）修正版 */
#player{
    position:absolute;
    width:24px;
    height:24px;
    transition: filter 0.1s;
}

#player::before,
#player::after{
    content:"";
    position:absolute;
    width:14px;
    height:22px;
    background:#ff2020;
    border-radius:14px 14px 0 0;
}

#player::before{
    left:11px;
    transform:rotate(-45deg);
    transform-origin: 0% 100%;
}

#player::after{
    left:-1px;
    transform:rotate(45deg);
    transform-origin: 100% 100%;
}

/* 重力警告テキスト */
#gravity-warning {
    position: absolute;
    width: 100%;
    text-align: center;
    top: 200px;
    font-size: 28px;
    color: #ff3333;
    font-weight: bold;
    text-shadow: 0 0 10px #ff0000;
    display: none;
    z-index: 20;
    animation: blink 0.5s infinite alternate;
}

@keyframes blink {
    0% { opacity: 0.2; }
    100% { opacity: 1; }
}

/* ⏱ カウントダウン表示 */
#countdown-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 80px;
    font-weight: bold;
    color: #ffff33;
    text-shadow: 0 0 20px #ffaa00;
    z-index: 90;
    pointer-events: none;
    opacity: 0;
    transform: scale(0.5);
    transition: transform 0.2s ease-out, opacity 0.2s ease-out;
}

#countdown-overlay.show {
    opacity: 1;
    transform: scale(1);
}

.bone{
    position:absolute;
    display:flex;
    align-items:center;
    height:20px;
    transform-origin: center center; 
}

.boneBody{
    background:white;
    height:10px;
    flex:1;
}

.boneHead{
    width:14px;
    height:20px;
    background:white;
    border-radius:5px;
}

.boneHead.left{
    margin-right:-2px;
}

.boneHead.right{
    margin-left:-2px;
}

/* 🏁 スタート画面 & 🏆 リザルト画面の共通ベース */
.overlay-screen {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.9);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.4s ease;
}

.overlay-screen.active {
    opacity: 1;
    pointer-events: auto;
}

.screen-title {
    font-size: 38px;
    font-weight: bold;
    margin-bottom: 25px;
    letter-spacing: 2px;
    text-align: center;
}

.screen-title.start {
    color: #ffffff;
    text-shadow: 0 0 10px #ffffff;
}

.screen-title.gameover {
    color: #ff3333;
    text-shadow: 0 0 15px #ff0000;
}

.screen-title.clear {
    color: #ffff33;
    text-shadow: 0 0 15px #ffff00;
}

.screen-subtitle {
    font-size: 16px;
    color: #aaa;
    margin-bottom: 30px;
    text-align: center;
    line-height: 1.5;
}

#result-details {
    font-size: 20px;
    margin-bottom: 35px;
    color: #eee;
}

.menu-btn {
    padding: 12px 30px;
    font-size: 18px;
    font-weight: bold;
    color: black;
    background: white;
    border: 3px solid white;
    cursor: pointer;
    transition: all 0.2s;
}

.menu-btn:hover {
    background: black;
    color: white;
    border-color: white;
    box-shadow: 0 0 10px white;
}

/* 通常・斜めブラスター */
.blaster{
    position:absolute;
    width:80px;
    height:70px;
    background:white;
    border-radius:50% 50% 45% 45%;
    border:3px solid #ddd;
    box-sizing:border-box;
    z-index: 10;
}

/* 回転発狂ブラスター用 */
.circle-blaster {
    position: absolute;
    width: 60px;
    height: 50px;
    background: white;
    border-radius: 50% 50% 45% 45%;
    border: 2px solid #ddd;
    box-sizing: border-box;
    z-index: 10;
}
.circle-blaster .eye { width: 10px; height: 13px; top: 12px; }
.circle-blaster .eye.left { left: 13px; }
.circle-blaster .eye.right { right: 13px; }
.circle-blaster .nose { width: 8px; height: 6px; left: 24px; top: 25px; }
.circle-blaster .mouth { width: 30px; height: 6px; left: 13px; bottom: 8px; }
.circle-blaster .mouth::before { box-shadow: 4px 0 white, 8px 0 white, 12px 0 white, 16px 0 white, 20px 0 white; }

/* 自由角度ビーム (斜め攻撃・発狂用) */
.custom-beam {
    position: absolute;
    background: #00ffff;
    z-index: 5;
    transform-origin: center left;
    box-shadow: 0 0 15px #00ffff;
}

/* 通常のビーム (幅28px) */
.beam{
    position:absolute;
    background:#00ffff;
    z-index: 5;
    box-shadow: 0 0 15px #00ffff;
}
.beam.top, .beam.bottom{ width:28px; height:500px; }
.beam.left, .beam.right{ width:500px; height:28px; }

.eye{
    position:absolute;
    width:14px;
    height:18px;
    background:black;
    border-radius:50%;
    top:18px;
}
.eye.left{ left:18px; }
.eye.right{ right:18px; }
.nose{
    position:absolute;
    width:10px;
    height:8px;
    background:black;
    left:32px;
    top:34px;
    clip-path:polygon(50% 100%,0 0,100% 0);
}
.mouth{
    position:absolute;
    width:40px;
    height:8px;
    background:black;
    left:17px;
    bottom:12px;
    border-radius:4px;
}
.mouth::before{
    content:"";
    position:absolute;
    left:4px;
    top:0;
    width:3px;
    height:8px;
    background:white;
    box-shadow: 6px 0 white, 12px 0 white, 18px 0 white, 24px 0 white, 30px 0 white;
}

/* スライドするカラーレーザー線 */
.color-line {
    position: absolute;
    width: 15px;
    height: 500px;
    top: 0;
    z-index: 4;
    box-shadow: 0 0 15px currentColor;
}
.color-line.orange {
    background: #ff9900;
    color: #ff9900;
}
.color-line.blue {
    background: #0066ff;
    color: #0066ff;
}
</style>

</head>
<body>

<div id="ui">
<div id="stage-title">NORMAL STAGE</div>
<div>HP：<span id="hp">5</span></div>
<div>TIME：<span id="time">0</span></div>
</div>

<div id="game">
<div id="gravity-warning">WARNING: GRAVITY CHANGE</div>
<div id="countdown-overlay"></div>
<div id="player"></div>

<!-- 🏁 スタート画面 -->
<div id="start-screen" class="overlay-screen active">
    <div class="screen-title start">EVADE GAME</div>
    <div class="screen-subtitle">矢印キー or WASDで移動して攻撃を避けろ！</div>
    <button class="menu-btn" onclick="pressStartButton()">GAME START</button>
</div>

<!-- 🏆 リザルト画面 -->
<div id="result-screen" class="overlay-screen">
    <div id="result-title" class="screen-title">GAME OVER</div>
    <div id="result-details">0秒生存</div>
    <button class="menu-btn" onclick="triggerRestart()">もう一度挑戦する</button>
    <button class="menu-btn" id="back-btn" style="margin-top:12px; display:none;" onclick="pressBackButton()">戻る</button>
</div>
</div>

<script>
// ========================================================
// 🔧 ゲーム設定エリア
// ========================================================
const NORMAL_HP = 5;
const NORMAL_SPEED = 4;

const URA_HP = 15;
const URA_SPEED = 5;

const COIN_REWARD = 2;     // クリア報酬（難易度: 普）
// ========================================================

// 終了処理: クリア/ゲームオーバー時に親(fronted-v2/js/game.js)へ game:ended を通知
// coin 0 = ゲームオーバー / 1以上 = クリアで獲得枚数
function notifyGameEnded(coin) {
    try { window.parent.postMessage({ type: 'game:ended', coin: coin }, '*'); } catch(e){}
}

const game=document.getElementById("game");
const player=document.getElementById("player");
const gravityWarning=document.getElementById("gravity-warning");
const countdownOverlay=document.getElementById("countdown-overlay");
const startScreen=document.getElementById("start-screen");
const resultScreen=document.getElementById("result-screen");
const resultTitle=document.getElementById("result-title");
const resultDetails=document.getElementById("result-details");

// プレイヤー位置と速度管理
let px=240;
let py=430;
let currentSpeed = NORMAL_SPEED; 

let hp=NORMAL_HP;
let time=0;

let keys={};
let bones=[];
let colorLines=[];

let playing=false;        
let isCountingDown=false;  
let isUraStage = false; 
let clearNormal = false; 
let lastSpaceTime = 0;   

let blasterStarted = false;
let beamInterval = null;
let colorLineInterval = null;
let madnessInterval = null; 
let progressInterval = null;

// 重力ギミック用変数
let hasGravity = false;
let vy = 0;              
const GRAVITY = 0.45;     
const JUMP_FORCE = -4.7; 
const MAX_JUMP_HOLD = 18; 
let jumpHoldTimer = 0;
let isGrounded = false;  

// プレイヤーが現在動いているかのフラグ
let isMoving = false;

document.addEventListener("keydown",e=>{ 
    if(isCountingDown) return; 
    if(!playing && !clearNormal) return;

    keys[e.key]=true; 
    
    if(e.key === " " || e.key === "Spacebar"){
        if(clearNormal && !isUraStage){
            const now = Date.now();
            if(now - lastSpaceTime < 1000){ 
                triggerUraStage();
            }
            lastSpaceTime = now;
        }
    }
});
document.addEventListener("keyup",e=>{ keys[e.key]=false; });

function updatePlayer(){
    if(!playing || isCountingDown) return; 

    let moved = false;

    if (!hasGravity) {
        if(keys["ArrowLeft"]||keys["a"]||keys["A"]) { px-=currentSpeed; moved = true; }
        if(keys["ArrowRight"]||keys["d"]||keys["D"]) { px+=currentSpeed; moved = true; }
        if(keys["ArrowUp"]||keys["w"]||keys["W"]) { py-=currentSpeed; moved = true; }
        if(keys["ArrowDown"]||keys["s"]||keys["S"]) { py+=currentSpeed; moved = true; }
        py=Math.max(0,Math.min(476,py));
    } else {
        if(keys["ArrowLeft"]||keys["a"]||keys["A"]) { px-=currentSpeed; moved = true; }
        if(keys["ArrowRight"]||keys["d"]||keys["D"]) { px+=currentSpeed; moved = true; }

        if((keys["ArrowUp"]||keys["w"]||keys["W"])){
            if(isGrounded){
                vy = JUMP_FORCE;
                isGrounded = false;
                jumpHoldTimer = MAX_JUMP_HOLD; 
            } else if(jumpHoldTimer > 0) {
                vy -= 0.42; 
                jumpHoldTimer--;
            }
        } else {
            jumpHoldTimer = 0;
        }

        vy += GRAVITY;
        py += vy;

        if(py >= 476){
            py = 476;
            vy = 0;
            isGrounded = true;
            jumpHoldTimer = 0;
        }
    }

    isMoving = moved;
    px=Math.max(0,Math.min(476,px));

    player.style.left=px+"px";
    player.style.top=py+"px";
}

function spawnColorLine() {
    const line = document.createElement("div");
    const type = Math.random() > 0.5 ? "orange" : "blue";
    line.className = `color-line ${type}`;
    
    const fromLeft = Math.random() > 0.5;
    line.x = fromLeft ? -20 : 500;
    line.vx = fromLeft ? 5 : -5;
    line.type = type;
    line.hasHit = false;

    line.style.left = line.x + "px";
    game.appendChild(line);
    colorLines.push(line);
}

function updateBonesAndLines(){
    for(let i=bones.length-1;i>=0;i--){
        const b=bones[i];
        b.y+=b.vy; b.x+=b.vx;
        b.style.left=b.x+"px"; b.style.top=b.y+"px";
        
        if (!b.isGravityBone) {
            b.angle += b.rotateSpeed;
            b.style.transform = `rotate(${b.angle}deg)`;
        }

        if(hit(b)){
            hp--;
            document.getElementById("hp").textContent=hp;
            game.removeChild(b);
            bones.splice(i,1);
            if(hp<=0) gameOver();
            continue;
        }
        if(b.x<-250 || b.x>520 || b.y<-250 || b.y>520){
            game.removeChild(b);
            bones.splice(i,1);
        }
    }

    for(let i=colorLines.length-1; i>=0; i--){
        const line = colorLines[i];
        line.x += line.vx;
        line.style.left = line.x + "px";

        const lineWidth = 15;
        if(px + 24 > line.x && px < line.x + lineWidth) {
            if(!line.hasHit) {
                if((line.type === "orange" && !isMoving) || (line.type === "blue" && isMoving)) {
                    hp -= 1;
                    line.hasHit = true;
                    if(hp < 0) hp = 0;
                    document.getElementById("hp").textContent = hp;
                    if(hp<=0) gameOver();
                }
            }
        }

        if(line.x < -40 || line.x > 540) {
            line.remove();
            colorLines.splice(i, 1);
        }
    }

    // 💥 通常ビーム(幅28px)の当たり判定
    document.querySelectorAll(".beam").forEach(beam=>{
        if(beam.hasHit) return;

        const rect = beam.getBoundingClientRect();
        const gameRect = game.getBoundingClientRect();
        const bx = rect.left - gameRect.left;
        const by = rect.top - gameRect.top;
        const bw = rect.width;
        const bh = rect.height;

        if(px + 24 > bx && px < bx + bw && py + 24 > by && py < by + bh){
            hp -= 1;
            beam.hasHit = true;
            if(hp < 0) hp = 0;
            document.getElementById("hp").textContent = hp;
            if(hp<=0) gameOver();
        }
    });

    // 斜め/カスタムビーム用の当たり判定
    document.querySelectorAll(".custom-beam").forEach(beam => {
        if (beam.hasHit) return;

        const bx = parseFloat(beam.style.left);
        const by = parseFloat(beam.style.top);
        const angle = beam.angle; 
        const rad = (angle * Math.PI) / 180;
        const beamLength = 700; 

        const ax = bx;
        const ay = by;
        const x2 = bx + Math.cos(rad) * beamLength;
        const y2 = by + Math.sin(rad) * beamLength;

        const pcx = px + 12;
        const pcy = py + 12;

        const abx = x2 - ax;
        const aby = y2 - ay;
        const apx = pcx - ax;
        const apy = pcy - ay;

        const abLenSq = abx * abx + aby * aby;
        let t = 0;
        if (abLenSq > 0) {
            t = (apx * abx + apy * aby) / abLenSq;
        }
        t = Math.max(0, Math.min(1, t));

        const closestX = ax + t * abx;
        const closestY = ay + t * aby;

        const dx = pcx - closestX;
        const dy = pcy - closestY;
        const distSq = dx * dx + dy * dy;

        // 当たり判定の広さ
        if (distSq < 20 * 20) {
            hp -= 1;
            beam.hasHit = true;
            if(hp < 0) hp = 0;
            document.getElementById("hp").textContent = hp;
            if(hp<=0) gameOver();
        }
    });
}

function spawnBone(){
    const dir = Math.floor(Math.random() * 4);
    const bone=document.createElement("div");
    bone.className="bone";
    bone.innerHTML=`<div class="boneHead left"></div><div class="boneBody"></div><div class="boneHead right"></div>`;
    
    const length = 60 + Math.random()*120;
    bone.length = length;

    if(dir<=1){
        bone.isHorizontal = true;
        bone.style.width=length+"px"; bone.style.height="20px";
        bone.querySelector(".boneBody").style.width=(length-28)+"px";
    }else{
        bone.isHorizontal = false;
        bone.style.width="20px"; bone.style.height=length+"px";
        bone.style.flexDirection="column";
        const body=bone.querySelector(".boneBody");
        body.style.width="10px"; body.style.height=(length-28)+"px";
    }

    switch(dir){
        case 0: bone.x=Math.random()*(500-length); bone.y=-20; bone.vx=0; bone.vy=4; break;
        case 1: bone.x=Math.random()*(500-length); bone.y=520; bone.vx=0; bone.vy=-4; break;
        case 2: bone.x=-20; bone.y=Math.random()*(500-length); bone.vx=4; bone.vy=0; break;
        case 3: bone.x=520; bone.y=Math.random()*(500-length); bone.vx=-4; bone.vy=0; break;
    }
    bone.angle = 0;
    bone.rotateSpeed = Math.random() * 6 + 2;
    bone.style.left=bone.x+"px"; bone.style.top=bone.y+"px";
    game.appendChild(bone);
    bones.push(bone);
}

function spawnGravityBone(){
    const fromLeft = Math.random() > 0.5;
    const startX = fromLeft ? -50 : 520;
    const speedX = fromLeft ? 5 : -5;

    const gapHeight = 85; 
    const gapY = 320 + Math.random() * 80; 

    // 1. 上側の骨
    const topBoneLength = gapY;
    const topBone = document.createElement("div");
    topBone.className = "bone";
    topBone.innerHTML = `<div class="boneHead left"></div><div class="boneBody"></div><div class="boneHead right"></div>`;
    topBone.length = topBoneLength;
    topBone.isHorizontal = false;
    topBone.style.width = "20px";
    topBone.style.height = topBoneLength + "px";
    topBone.style.flexDirection = "column";
    topBone.querySelector(".boneBody").style.width = "10px";
    topBone.querySelector(".boneBody").style.height = (topBoneLength - 28) + "px";
    topBone.x = startX;
    topBone.y = 0;
    topBone.vx = speedX;
    topBone.vy = 0;
    topBone.isGravityBone = true;
    topBone.style.left = topBone.x + "px";
    topBone.style.top = topBone.y + "px";
    game.appendChild(topBone);
    bones.push(topBone);

    // 2. 下側の骨
    const bottomBoneLength = 500 - (gapY + gapHeight);
    const bottomBone = document.createElement("div");
    bottomBone.className = "bone";
    bottomBone.innerHTML = `<div class="boneHead left"></div><div class="boneBody"></div><div class="boneHead right"></div>`;
    bottomBone.length = bottomBoneLength;
    bottomBone.isHorizontal = false;
    bottomBone.style.width = "20px";
    bottomBone.style.height = bottomBoneLength + "px";
    bottomBone.style.flexDirection = "column";
    bottomBone.querySelector(".boneBody").style.width = "10px";
    bottomBone.querySelector(".boneBody").style.height = (bottomBoneLength - 28) + "px";
    bottomBone.x = startX;
    bottomBone.y = 500 - bottomBoneLength;
    bottomBone.vx = speedX;
    bottomBone.vy = 0;
    bottomBone.isGravityBone = true;
    bottomBone.style.left = bottomBone.x + "px";
    bottomBone.style.top = bottomBone.y + "px";
    game.appendChild(bottomBone);
    bones.push(bottomBone);
}

// 🎯 当たり判定関数
function hit(b){
    const pr = 10;
    const pcx = px + 12;
    const pcy = py + 12;

    if (b.isGravityBone) {
        const bw = 20;
        const bh = b.length;

        const closestX = Math.max(b.x, Math.min(pcx, b.x + bw));
        const closestY = Math.max(b.y, Math.min(pcy, b.y + bh));

        const dx = pcx - closestX;
        const dy = pcy - closestY;
        const distSq = dx * dx + dy * dy;

        return distSq < (pr * pr);
    }

    const bw = b.isHorizontal ? b.length : 20;
    const bh = b.isHorizontal ? 20 : b.length;

    const bcx = b.x + bw / 2;
    const bcy = b.y + bh / 2;

    const rad = (b.angle * Math.PI) / 180;
    const halfLen = b.length / 2 - 4;

    let dirX = Math.cos(rad);
    let dirY = Math.sin(rad);
    if (!b.isHorizontal) {
        dirX = -Math.sin(rad);
        dirY = Math.cos(rad);
    }

    const ax = bcx - dirX * halfLen;
    const ay = bcy - dirY * halfLen;
    const bx = bcx + dirX * halfLen;
    const by = bcy + dirY * halfLen;

    const abx = bx - ax;
    const aby = by - ay;
    const apx = pcx - ax;
    const apy = pcy - ay;

    const abLenSq = abx * abx + aby * aby;
    let t = 0;
    if (abLenSq > 0) {
        t = (apx * abx + apy * aby) / abLenSq;
    }
    t = Math.max(0, Math.min(1, t));

    const closestX = ax + t * abx;
    const closestY = ay + t * aby;

    const dx = pcx - closestX;
    const dy = pcy - closestY;
    const distSq = dx * dx + dy * dy;

    const hitRadius = 8 + pr; 
    return distSq < (hitRadius * hitRadius);
}

function gameOver(){
    playing=false;
    clearInterval(beamInterval);
    clearInterval(colorLineInterval);
    clearInterval(madnessInterval);
    clearInterval(progressInterval);
    if(uraTimer) clearInterval(uraTimer);
    if(gravitySpawnInterval) clearInterval(gravitySpawnInterval);
    
    const modeText = isUraStage ? "裏ステージ" : "通常ステージ";
    
    resultTitle.textContent = "GAME OVER";
    resultTitle.className = "gameover";
    resultDetails.textContent = `生存時間：${time}秒 (${modeText})`;
    document.getElementById("back-btn").style.display = "none";
    resultScreen.classList.add("active");
    notifyGameEnded(0);
}

function gameClear(isPerfect = false){
    playing = false;
    clearInterval(beamInterval);
    clearInterval(colorLineInterval);
    clearInterval(madnessInterval);
    clearInterval(progressInterval);
    if(uraTimer) clearInterval(uraTimer);
    if(gravitySpawnInterval) clearInterval(gravitySpawnInterval);
    
    resultTitle.textContent = "STAGE CLEAR!";
    resultTitle.className = "clear";
    
    if(isPerfect) {
        resultDetails.textContent = "おめでとうございます！裏ステージを1分間完走しました！";
    } else {
        resultDetails.textContent = "生存時間：30秒 (通常ステージクリア！)";
    }

    // クリア時は即時に親へ通知せず「戻る」ボタン押下まで待つ
    // （通常クリア後はスペース2連打で裏ステージへ入れるため）
    pendingCoin = COIN_REWARD;
    document.getElementById("back-btn").style.display = "block";
    resultScreen.classList.add("active");
}

// 「戻る」ボタン: クリア報酬を確定して親の結果画面へ
let pendingCoin = 0;
function pressBackButton() {
    document.getElementById("back-btn").style.display = "none";
    notifyGameEnded(pendingCoin);
}

// メインループ
setInterval(()=>{
    if(!playing || isCountingDown)return;
    updatePlayer();
    updateBonesAndLines();
},16);

// 骨の自然生成
setInterval(()=>{
    if(!playing || isCountingDown)return;
    if(hasGravity) return; 
    spawnBone();
},600);

// 通常ステージ用進行管理タイマーの起動関数
function startNormalStageTimeline() {
    if(progressInterval) clearInterval(progressInterval);
    progressInterval = setInterval(()=>{
        if(!playing || isUraStage || isCountingDown) return; 

        time++;
        document.getElementById("time").textContent=time;

        if(time === 10) {
            colorLineInterval = setInterval(()=>{
                if(playing && !isUraStage && !isCountingDown) spawnColorLine();
            }, 1500);
        }

        if(time === 20){
            clearInterval(colorLineInterval);
            if(!blasterStarted){
                blasterStarted = true;
                beamInterval = setInterval(()=>{
                    if(playing && !isUraStage && !isCountingDown) startBlasterAttack();
                }, 1200);
            }
        }

        if(time === 25){
            clearInterval(beamInterval); 
            startMadnessCircleAttack(); 
        }

        if(time >= 30){
            clearNormal = true; 
            gameClear(false);
        }
    },1000);
}


/* =======================================================
   ⏱ カウントダウン制御システム
======================================================= */
function runCountdown(callback) {
    isCountingDown = true;
    playing = false;
    let count = 3;

    countdownOverlay.textContent = count;
    countdownOverlay.classList.add("show");

    const timer = setInterval(() => {
        count--;
        if (count > 0) {
            countdownOverlay.textContent = count;
            countdownOverlay.classList.remove("show");
            void countdownOverlay.offsetWidth; 
            countdownOverlay.classList.add("show");
        } else if (count === 0) {
            countdownOverlay.textContent = "START!";
            countdownOverlay.classList.remove("show");
            void countdownOverlay.offsetWidth;
            countdownOverlay.classList.add("show");
        } else {
            clearInterval(timer);
            countdownOverlay.classList.remove("show");
            isCountingDown = false;
            playing = true;
            callback(); 
        }
    }, 1000);
}


/* =======================================================
   🕹 スタートボタン・リスタート・裏突入制御
======================================================= */
function pressStartButton() {
    startScreen.classList.remove("active");
    runCountdown(() => {
        playing = true;
        startNormalStageTimeline();
    });
}

function triggerRestart() {
    resultScreen.classList.remove("active");
    clearAllEntities();
    resetStateOnly();

    runCountdown(() => {
        playing = true;
        startNormalStageTimeline();
    });
}

let uraTimer = null;
let gravitySpawnInterval = null;

function triggerUraStage() {
    resultScreen.classList.remove("active");
    clearAllEntities();
    
    runCountdown(() => {
        startUraStage();
    });
}

function startUraStage() {
    isUraStage = true;
    clearNormal = false; 
    playing = true;
    time = 0;
    
    hp = URA_HP; 
    currentSpeed = URA_SPEED;

    const stageTitle = document.getElementById("stage-title");
    stageTitle.textContent = "★ URA STAGE ★";
    stageTitle.className = "ura";
    document.getElementById("hp").textContent = hp;
    document.getElementById("time").textContent = time;

    blasterStarted = true;
    beamInterval = setInterval(()=>{
        if(playing && isUraStage && !hasGravity && !isCountingDown) startBlasterAttack();
    }, 1200);

    if(uraTimer) clearInterval(uraTimer);
    uraTimer = setInterval(()=>{
        if(!playing || isCountingDown) return;
        time++;
        document.getElementById("time").textContent = time;

        if(time === 30){
            clearInterval(beamInterval);
            clearAllEntities();

            hasGravity = true;
            gravityWarning.style.display = "block";

            gravitySpawnInterval = setInterval(()=>{
                if(playing && hasGravity && !isCountingDown) spawnGravityBone();
            }, 1250); 
        }

        if(time === 43){
            hasGravity = false;
            gravityWarning.style.display = "none";
            clearInterval(gravitySpawnInterval);
            clearAllEntities();

            beamInterval = setInterval(()=>{
                if(playing && isUraStage && !isCountingDown) startBlasterAttack();
            }, 1100); 
        }

        if(time === 50){
            startMadnessCircleAttack();
        }

        if(time >= 60){
            gameClear(true); 
        }

    }, 1000);
}

function clearAllEntities() {
    bones.forEach(b=>b.remove()); bones=[];
    colorLines.forEach(c=>c.remove()); colorLines=[];
    document.querySelectorAll(".blaster").forEach(b=>b.remove());
    document.querySelectorAll(".circle-blaster").forEach(b=>b.remove());
    document.querySelectorAll(".beam").forEach(b=>b.remove());
    document.querySelectorAll(".custom-beam").forEach(b=>b.remove());
    document.querySelectorAll(".color-line").forEach(l=>l.remove());
}

function resetStateOnly(){
    if(beamInterval) clearInterval(beamInterval);
    if(colorLineInterval) clearInterval(colorLineInterval);
    if(madnessInterval) clearInterval(madnessInterval);
    if(progressInterval) clearInterval(progressInterval);
    if(uraTimer) clearInterval(uraTimer);
    if(gravitySpawnInterval) clearInterval(gravitySpawnInterval);

    hp=NORMAL_HP; 
    currentSpeed=NORMAL_SPEED;
    
    time=0; px=240; py=430;
    blasterStarted = false; isMoving = false;
    isUraStage = false;
    clearNormal = false;
    hasGravity = false;
    gravityWarning.style.display = "none";

    const stageTitle = document.getElementById("stage-title");
    stageTitle.textContent = "NORMAL STAGE";
    stageTitle.className = "";

    document.getElementById("hp").textContent=hp;
    document.getElementById("time").textContent=time;
    player.style.left=px+"px"; player.style.top=py+"px";
    keys = {}; 
}

// ⚠️ ロード時点では停止状態にしておく (playing=false)
resetStateOnly();
playing = false; 

// 💥 ブラスター攻撃（縦横ブラスター2門 ＆ 常時、斜めブラスター1〜2門を同時に生成）
function startBlasterAttack(){
    const sides = ["top", "bottom", "left", "right"];
    const chosenSides = sides.sort(() => 0.5 - Math.random()).slice(0, 2);
    chosenSides.forEach(side => createBlaster(side));

    const diagCount = Math.random() > 0.5 ? 2 : 1; 
    for(let i = 0; i < diagCount; i++) {
        spawnDiagonalCornerBlaster(i);
    }
}

function createBlaster(side){
    const skull = document.createElement("div");
    skull.className = "blaster " + side;
    skull.innerHTML = `<div class="eye left"></div><div class="eye right"></div><div class="nose"></div><div class="mouth"></div>`;

    let targetLeft = 0; let targetTop = 0;
    switch(side){
        case "top": targetLeft = Math.random()*400; targetTop = 0; skull.style.left = targetLeft + "px"; skull.style.top = "-70px"; break;
        case "bottom": targetLeft = Math.random()*400; targetTop = 430; skull.style.left = targetLeft + "px"; skull.style.top = "500px"; break;
        case "left": targetLeft = 0; targetTop = Math.random()*400; skull.style.left = "-80px"; skull.style.top = targetTop + "px"; break;
        case "right": targetLeft = 420; targetTop = Math.random()*400; skull.style.left = "500px"; skull.style.top = targetTop + "px"; break;
    }
    game.appendChild(skull);

    setTimeout(() => {
        skull.style.transition = "all 0.3s ease";
        skull.style.left = targetLeft + "px"; skull.style.top = targetTop + "px";
    }, 50);

    setTimeout(()=>{
        if(!playing || isCountingDown) { skull.remove(); return; }
        skull.querySelectorAll(".eye").forEach(e => e.style.backgroundColor = "cyan");
        fireBeam(side, targetLeft, targetTop);
        setTimeout(()=>{ skull.remove(); }, 600);
    }, 1000);
}

// 💥 ビームを射出 (幅28px)
function fireBeam(side, blasterLeft, blasterTop){
    const beam = document.createElement("div");
    beam.className = "beam " + side;
    beam.hasHit = false;

    switch(side){
        case "top": beam.style.left = (blasterLeft + 26) + "px"; beam.style.top = "0px"; break;
        case "bottom": beam.style.left = (blasterLeft + 26) + "px"; beam.style.top = "0px"; break;
        case "left": beam.style.left = "0px"; beam.style.top = (blasterTop + 21) + "px"; break;
        case "right": beam.style.left = "0px"; beam.style.top = (blasterTop + 21) + "px"; break;
    }
    game.appendChild(beam);
    setTimeout(()=>{ beam.remove(); }, 400);
}

// 🔮 四隅狙い撃ち用の斜めブラスター (顔完全反映版)
function spawnDiagonalCornerBlaster(offsetIndex = 0) {
    const corners = [
        { x: 40, y: 40, bx: -10, by: -10, angle: 45 },
        { x: 460, y: 40, bx: 430, by: -10, angle: 135 },
        { x: 40, y: 460, bx: -10, by: 440, angle: -45 },
        { x: 460, y: 460, bx: 430, by: 440, angle: -135 }
    ];
    const targetCorner = corners[(Math.floor(Math.random() * corners.length) + offsetIndex) % corners.length];

    const skull = document.createElement("div");
    skull.className = "blaster";
    skull.innerHTML = `<div class="eye left"></div><div class="eye right"></div><div class="nose"></div><div class="mouth"></div>`;
    
    skull.style.transformOrigin = "center center";

    skull.style.left = (targetCorner.bx - Math.cos((targetCorner.angle * Math.PI)/180)*150) + "px";
    skull.style.top = (targetCorner.by - Math.sin((targetCorner.angle * Math.PI)/180)*150) + "px";
    skull.style.transform = `rotate(${targetCorner.angle - 90}deg)`; 
    game.appendChild(skull);

    setTimeout(() => {
        skull.style.transition = "all 0.3s ease";
        skull.style.left = targetCorner.bx + "px";
        skull.style.top = targetCorner.by + "px";
    }, 50);

    setTimeout(() => {
        if (!playing || isCountingDown) { skull.remove(); return; }
        skull.querySelectorAll(".eye").forEach(e => e.style.backgroundColor = "cyan");
        
        fireMadnessBeam(targetCorner.bx + 40, targetCorner.by + 35, targetCorner.angle);
        
        setTimeout(() => { skull.remove(); }, 600);
    }, 1000);
}

let currentMadnessAngle = 0;

function startMadnessCircleAttack(){
    currentMadnessAngle = 0;
    madnessInterval = setInterval(()=>{
        if(!playing || isCountingDown) return;
        spawnMadnessBlaster(currentMadnessAngle);
        currentMadnessAngle += 40; 
    }, 250);
}

function spawnMadnessBlaster(angleDegree){
    const centerGameX = 250;
    const centerGameY = 250;
    const radius = 180; 

    const rad = (angleDegree * Math.PI) / 180;
    const bx = centerGameX + Math.cos(rad) * radius - 30; 
    const by = centerGameY + Math.sin(rad) * radius - 25; 

    const skull = document.createElement("div");
    skull.className = "circle-blaster";
    skull.innerHTML = `<div class="eye left"></div><div class="eye right"></div><div class="nose"></div><div class="mouth"></div>`;
    
    const faceAngle = angleDegree + 180;
    skull.style.transform = `rotate(${faceAngle}deg)`;
    
    const spawnDistance = radius + 80;
    const startX = centerGameX + Math.cos(rad) * spawnDistance - 30;
    const startY = centerGameY + Math.sin(rad) * spawnDistance - 25;

    skull.style.left = startX + "px";
    skull.style.top = startY + "px";
    game.appendChild(skull);

    setTimeout(() => {
        skull.style.transition = "all 0.2s ease-out";
        skull.style.left = bx + "px";
        skull.style.top = by + "px";
    }, 20);

    setTimeout(()=>{
        if(!playing || isCountingDown) { skull.remove(); return; }
        skull.querySelectorAll(".eye").forEach(e => e.style.backgroundColor = "cyan");

        fireMadnessBeam(bx + 30, by + 25, faceAngle);

        setTimeout(()=>{
            skull.style.opacity = "0";
            skull.style.transform += " scale(0.8)";
            setTimeout(() => skull.remove(), 200);
        }, 300);
    }, 450);
}

function fireMadnessBeam(fromX, fromY, angleDegree){
    const beam = document.createElement("div");
    beam.className = "custom-beam";
    beam.hasHit = false;
    beam.angle = angleDegree; 

    beam.style.width = "700px"; 
    beam.style.height = "24px"; 
    beam.style.left = fromX + "px";
    beam.style.top = (fromY - 12) + "px"; 
    beam.style.transform = `rotate(${angleDegree}deg)`;

    game.appendChild(beam);

    setTimeout(()=>{
        beam.remove();
    }, 300);
}
</script>
