name: checks

on:
  push:
    branches: [master]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Runs the same five-check suite used locally:
      # contracts (ajv) -> lint -> typecheck -> next build -> storybook build
      - run: npm run checks
